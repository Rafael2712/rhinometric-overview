version: '3.8'

services:
  rhinometric-postgres:
    image: postgres:15
    container_name: rhinometric-postgres
    environment:
      POSTGRES_DB: rhinometric_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhinometric2024
    ports:
      - "5432:5432"
    volumes:
      - rhinometric_postgres_data:/var/lib/postgresql/data
    networks:
      - rhinometric-network

  rhinometric-redis:
    image: redis:7-alpine
    container_name: rhinometric-redis
    ports:
      - "6379:6379"
    volumes:
      - rhinometric_redis_data:/data
    networks:
      - rhinometric-network

  rhinometric-grafana:
    image: grafana/grafana:latest
    container_name: rhinometric-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=
    ports:
      - "3003:3000"
    volumes:
      - rhinometric_grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - rhinometric-network

  rhinometric-prometheus:
    image: prom/prometheus:latest
    container_name: rhinometric-prometheus
    ports:
      - "9090:9090"
    volumes:
      - rhinometric_prometheus_data:/prometheus
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - rhinometric-network

  rhinometric-loki:
    image: grafana/loki:latest
    container_name: rhinometric-loki
    ports:
      - "3100:3100"
    volumes:
      - rhinometric_loki_data:/loki
    networks:
      - rhinometric-network

  rhinometric-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rhinometric-api
    environment:
      - NODE_ENV=development
      - DB_HOST=rhinometric-postgres
      - DB_PORT=5432
      - DB_NAME=rhinometric_dev
      - DB_USER=postgres
      - DB_PASSWORD=rhinometric2024
      - REDIS_HOST=rhinometric-redis
      - REDIS_PORT=6379
    ports:
      - "3001:3001"
    depends_on:
      - rhinometric-postgres
      - rhinometric-redis
    networks:
      - rhinometric-network

volumes:
  rhinometric_postgres_data:
  rhinometric_redis_data:
  rhinometric_grafana_data:
  rhinometric_prometheus_data:
  rhinometric_loki_data:

networks:
  rhinometric-network:
    driver: bridge