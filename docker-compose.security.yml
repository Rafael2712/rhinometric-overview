version: '3.8'

services:
  rhinometric-postgres:
    image: postgres:15
    container_name: rhinometric-postgres
    environment:
      POSTGRES_DB: rhinometric_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhinometric123
    ports:
      - "5432:5432"
    networks:
      - rhinometric-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rhinometric_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak Database
  keycloak-postgres:
    image: postgres:15
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secure_123
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - rhinometric-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Security Server
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.1
    container_name: rhinometric-keycloak
    command: start-dev
    environment:
      # Admin credentials
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: keycloak_admin_secure_2024
      
      # Database configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secure_123
      
      # Hostname configuration
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      
      # Health and metrics
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      
      # Logging
      KC_LOG_LEVEL: info
    ports:
      - "8081:8080"
      - "8443:8443"
    networks:
      - rhinometric-network
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - keycloak_data:/opt/keycloak/data

  rhinometric-api:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: rhinometric-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: rhinometric-postgres
      DB_PORT: 5432
      DB_NAME: rhinometric_saas
      DB_USER: postgres
      DB_PASSWORD: rhinometric123
      API_VERSION: v1
      
      # Keycloak Integration
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: rhinometric
      KEYCLOAK_CLIENT_ID: rhinometric-api
      KEYCLOAK_CLIENT_SECRET: your-client-secret-here
      
      # JWT Configuration
      JWT_SECRET: ultra_secure_jwt_secret_2024_rhinometric_production
      JWT_EXPIRATION: 24h
      REFRESH_TOKEN_EXPIRATION: 7d
      
      # Security Headers
      SECURITY_ENABLED: "true"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8081"
      
    ports:
      - "3001:3001"
    networks:
      - rhinometric-network
    depends_on:
      rhinometric-postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  rhinometric-network:
    driver: bridge

volumes:
  postgres_data:
  keycloak_postgres_data:
  keycloak_data: