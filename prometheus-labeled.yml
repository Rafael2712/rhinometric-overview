      - targets:
          - rhinometric-ai-anomaly:8085
        labels:
          tier: intelligence
          service: ai-anomaly
          module: ml-detection
          rhinometric_scope: demo
    scrape_interval: 60s
    metrics_path: /metrics

  - job_name: mqtt-collector
    static_configs:
      - targets:
          - rhinometric-mqtt-collector:9300
        labels:
          tier: iot
          service: mqtt-collector
          module: iot-devices
