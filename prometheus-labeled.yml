global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: production
    version: 2.2.0
    cluster: rhinometric-enterprise
    replica: '1'

rule_files:
  - rules/*.yml
  - rules/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

remote_write:
  - url: http://tempo:3200/api/v1/push
    queue_config:
      capacity: 10000
      max_shards: 10
      min_shards: 1
      max_samples_per_send: 5000
      batch_send_deadline: 5s

scrape_configs:
  # ==================== CORE SERVICES (plataforma interna) ====================
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          tier: core
          service: prometheus
          rhinometric_scope: core
    relabel_configs:
      - target_label: __metrics_path__
        replacement: /metrics

  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000
        labels:
          tier: core
          service: grafana
          rhinometric_scope: core
    metrics_path: /metrics

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          tier: core
          service: alertmanager
          rhinometric_scope: core

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100
        labels:
          tier: core
          service: loki
          rhinometric_scope: core
    metrics_path: /metrics

  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200
        labels:
          tier: core
          service: tempo
          rhinometric_scope: core
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          tier: system
          service: node-exporter
          rhinometric_scope: core
    scrape_interval: 30s

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          tier: system
          service: cadvisor
          rhinometric_scope: core
    scrape_interval: 30s
    metric_relabel_configs:
      - source_labels:
          - container_label_com_docker_compose_service
        target_label: service
      - source_labels:
          - container_label_com_docker_compose_project
        target_label: project

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox-exporter:9115
        labels:
          tier: monitoring
          service: blackbox
          rhinometric_scope: core

  - job_name: promtail
    static_configs:
      - targets:
          - promtail:9080
        labels:
          tier: logs
          service: promtail
          rhinometric_scope: core

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
        labels:
          tier: telemetry
          service: otel-collector
          rhinometric_scope: core
    scrape_interval: 15s

  # ==================== DEMO SERVICES (para mostrar a clientes) ====================
  - job_name: license-server-v2
    static_configs:
      - targets:
          - license-server-v2:5000
        labels:
          tier: application
          service: license-server
          version: 2.2.0
          rhinometric_scope: demo
    metrics_path: /api/metrics
    scrape_interval: 10s

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          tier: database
          service: postgres
          rhinometric_scope: demo
    scrape_interval: 30s

  - job_name: api-proxy
    static_configs:
