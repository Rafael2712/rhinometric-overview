    scrape_interval: 15s
    metrics_path: /metrics

  - job_name: external-apis
    static_configs:
      - targets:
          - api-proxy:8090
        labels:
          tier: external
          api_type: public
          rhinometric_scope: demo
    metrics_path: /api/metrics/prometheus
    scrape_interval: 60s
    relabel_configs:
      - source_labels:
          - __address__
        target_label: proxy
        replacement: api-proxy

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://grafana:3000
          - http://prometheus:9090
          - http://loki:3100/ready
          - http://tempo:3200/ready
          - http://license-server-v2:5000/api/health
          - http://api-proxy:8090/health
          - http://rhinometric-veriverde:9200/health
          - http://rhinometric-ai-anomaly:8085/health
        labels:
          tier: health
          probe_type: http
          rhinometric_scope: demo
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

