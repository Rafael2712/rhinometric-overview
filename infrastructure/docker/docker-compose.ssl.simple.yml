version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: mi-proyecto-nginx-ssl
    ports:
      - "9080:80"
      - "9443:443"
    volumes:
      - ./nginx/nginx.simple.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/ssl.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - rhinometric_network
    restart: unless-stopped

networks:
  rhinometric_network:
    driver: bridge