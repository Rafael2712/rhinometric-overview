global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: prometheus_cluster
    replica: prometheus_${REPLICA_NUMBER}

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    tls_config:
      cert_file: /etc/prometheus/certs/prometheus.crt
      key_file: /etc/prometheus/certs/prometheus.key
      ca_file: /etc/prometheus/certs/ca.crt

  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
    tls_config:
      cert_file: /etc/prometheus/certs/prometheus.crt
      key_file: /etc/prometheus/certs/prometheus.key
      ca_file: /etc/prometheus/certs/ca.crt

remote_write:
  - url: "http://prometheus-replica-1:9090/api/v1/write"
    tls_config:
      cert_file: /etc/prometheus/certs/prometheus.crt
      key_file: /etc/prometheus/certs/prometheus.key
      ca_file: /etc/prometheus/certs/ca.crt
  - url: "http://prometheus-replica-2:9090/api/v1/write"
    tls_config:
      cert_file: /etc/prometheus/certs/prometheus.crt
      key_file: /etc/prometheus/certs/prometheus.key
      ca_file: /etc/prometheus/certs/ca.crt

remote_read:
  - url: "http://prometheus-replica-1:9090/api/v1/read"
    tls_config:
      cert_file: /etc/prometheus/certs/prometheus.crt
      key_file: /etc/prometheus/certs/prometheus.key
      ca_file: /etc/prometheus/certs/ca.crt
  - url: "http://prometheus-replica-2:9090/api/v1/read"
    tls_config:
      cert_file: /etc/prometheus/certs/prometheus.crt
      key_file: /etc/prometheus/certs/prometheus.key
      ca_file: /etc/prometheus/certs/ca.crt