groups:
- name: base
  rules:
  - alert: TargetDown
    expr: up == 0
    for: 2m
    labels: {severity: warning}
    annotations:
      summary: "Target down: {{ $labels.job }} ({{ $labels.instance }})"

  - alert: CPUHigh
    expr: (1 - avg by (instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 85
    for: 5m
    labels: {severity: warning}
    annotations:
      summary: "CPU alta en {{ $labels.instance }}"

  - alert: MemHigh
    expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
    for: 5m
    labels: {severity: warning}
    annotations:
      summary: "Memoria alta en {{ $labels.instance }}"

  - alert: BlackboxHTTPFail
    expr: probe_success{job="blackbox-http"} == 0
    for: 1m
    labels: {severity: critical}
    annotations:
      summary: "HTTP fallando en {{ $labels.instance }}"
