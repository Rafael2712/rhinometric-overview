server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: debug

clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  # Logs desde contenedores Docker
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}  # Parseo automático del JSON de Docker
    relabel_configs:
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

  # Logs desde archivo ayuntamiento.log
  - job_name: mantenimiento
    static_configs:
      - targets:
          - localhost
        labels:
          job: mantenimiento
          __path__: /var/log/ayuntamiento.log
    pipeline_stages:
      - json:
        expressions:
          timestamp: timestamp
          level: level
          message: message
     - output:
         source: message
     - timestamp:
         source: timestamp
         format: RFC3339Nano
     - labels:
         level:

