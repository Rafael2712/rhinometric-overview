[databases]
rhinometric = host=db port=5432 user=admin password=secure_password_123 dbname=rhinometric
pgbouncer = host=db port=5432 user=admin password=secure_password_123 dbname=pgbouncer auth_type=trust

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
admin_users = admin
stats_users = admin
pool_mode = transaction
max_client_conn = 100
ignore_startup_parameters = extra_float_digits
unix_socket_dir = /tmp
stats_period = 60
