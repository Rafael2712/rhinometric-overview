auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  http_server_read_timeout: 300s
  http_server_write_timeout: 300s

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 50  # Reducido de 100MB a 50MB

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

ruler:
  alertmanager_url: http://alertmanager:9093

# Multi-tenant configuration (basic) - TRIAL OPTIMIZADO PARA BAJO ALMACENAMIENTO
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 24h  # Solo 1 día de retención
  max_cache_freshness_per_query: 5m
  split_queries_by_interval: 15m
  max_query_length: 48h  # Máximo 2 días de consulta
  max_query_lookback: 48h  # Lookback de 2 días
  query_timeout: 120s
  ingestion_rate_mb: 5  # Reducido a 5MB/s
  ingestion_burst_size_mb: 10  # Reducido a 10MB
  retention_period: 24h  # Retención explícita de 1 día