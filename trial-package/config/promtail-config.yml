server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://mi-proyecto-loki:3100/loki/api/v1/push
    external_labels:
      host: ${HOSTNAME}

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'service_name'
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_compose_project']
        target_label: 'project'
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'job'
        replacement: 'docker'

  - job_name: api_monitor
    static_configs:
      - targets:
          - localhost
        labels:
          job: api_monitor
          __path__: /var/log/containers/mi-proyecto-api-monitor/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: time
            level: level
            message: msg
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          level:
      - output:
          source: message

  - job_name: ayuntamiento_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: ayuntamiento_logs
          __path__: /var/log/ayuntamiento.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          level:
      - output:
          source: message

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/*.log

  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containers
          __path__: /var/lib/docker/containers/*/*.log

    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
      - output:
          source: log