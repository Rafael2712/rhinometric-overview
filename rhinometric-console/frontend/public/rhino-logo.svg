<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="rhinoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rhino head outline - simplified geometric shape based on logo -->
  <path d="M 20 60 Q 15 50 18 38 Q 20 28 30 20 Q 40 15 50 18 L 55 15 L 58 20 Q 70 25 75 38 Q 78 48 75 58 L 68 65 Q 60 70 50 72 Q 40 70 32 65 Z" 
        stroke="url(#rhinoGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Horn -->
  <path d="M 48 18 L 45 8 L 52 10 Z" fill="url(#rhinoGradient)"/>
  <!-- Ear -->
  <ellipse cx="70" cy="32" rx="6" ry="10" fill="url(#rhinoGradient)" opacity="0.7"/>
  <!-- Eye -->
  <circle cx="42" cy="38" r="2.5" fill="url(#rhinoGradient)"/>
  <!-- Nostril -->
  <circle cx="38" cy="48" r="1.5" fill="#14b8a6"/>
  <!-- Face detail line -->
  <path d="M 35 55 Q 40 58 45 55" stroke="url(#rhinoGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
