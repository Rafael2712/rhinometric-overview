version: '3.8'

services:
  docs-server:
    build:
      context: ../../..
      dockerfile: infrastructure/mi-proyecto/docs-server/Dockerfile
    container_name: rhinometric-docs-server
    restart: unless-stopped
    ports:
      - "8082:80"
    networks:
      - mi-proyecto_rhinometric_network_v22
    volumes:
      - ../../../docs/runbooks:/usr/share/nginx/html/runbooks:ro
      - ../../../docs/anomalies:/usr/share/nginx/html/anomalies:ro
      - ../../../docs/assets:/usr/share/nginx/html/assets:ro
    labels:
      com.rhinometric.service: "docs-server"
      com.rhinometric.description: "Public documentation and runbooks"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  mi-proyecto_rhinometric_network_v22:
    external: true
