version: '3.8'

# ════════════════════════════════════════════════════════════════════
# RHINOMETRIC TRIAL - Docker Compose
# Versión: 1.0 (Trial 180 días)
# Plataforma de Observabilidad Completa
# ════════════════════════════════════════════════════════════════════

services:
  # ═══════════════════════════════════════════════════════════════════
  # TIER 1: BASE DE DATOS
  # ═══════════════════════════════════════════════════════════════════
  
  postgres:
    image: postgres:15-alpine
    container_name: rhinometric-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rhinometric}
      POSTGRES_USER: ${POSTGRES_USER:-rhinometric}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - rhinometric
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rhinometric}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: rhinometric-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rhinometric
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  # ═══════════════════════════════════════════════════════════════════
  # TIER 2: SISTEMA DE LICENCIAS
  # ═══════════════════════════════════════════════════════════════════
  
  license-server:
    build:
      context: ./licensing
      dockerfile: Dockerfile
    container_name: rhinometric-license-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rhinometric}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rhinometric}
      JWT_SECRET: ${JWT_SECRET}
      LICENSE_DURATION_DAYS: 180
      FLASK_ENV: production
    volumes:
      - license_data:/data
    networks:
      - rhinometric
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M

  # ═══════════════════════════════════════════════════════════════════
  # TIER 3: OBSERVABILIDAD CORE
  # ═══════════════════════════════════════════════════════════════════
  
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: rhinometric-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-admin-api'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - rhinometric
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      license-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  loki:
    image: grafana/loki:2.9.3
    container_name: rhinometric-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - rhinometric
    ports:
      - "3100:3100"
    restart: unless-stopped
    depends_on:
      license-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  tempo:
    image: grafana/tempo:2.3.1
    container_name: rhinometric-tempo
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./config/tempo.yml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    networks:
      - rhinometric
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped
    depends_on:
      license-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ═══════════════════════════════════════════════════════════════════
  # TIER 4: VISUALIZACIÓN
  # ═══════════════════════════════════════════════════════════════════
  
  grafana:
    image: grafana/grafana:10.2.3
    container_name: rhinometric-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: ""
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - rhinometric
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G

  # ═══════════════════════════════════════════════════════════════════
  # TIER 5: ALERTING
  # ═══════════════════════════════════════════════════════════════════
  
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: rhinometric-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - rhinometric
    ports:
      - "9093:9093"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # ═══════════════════════════════════════════════════════════════════
  # TIER 6: EXPORTERS (MONITOREO)
  # ═══════════════════════════════════════════════════════════════════
  
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: rhinometric-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    networks:
      - rhinometric
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: rhinometric-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - rhinometric
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # ═══════════════════════════════════════════════════════════════════
  # TIER 7: DASHBOARD DE LICENCIAS
  # ═══════════════════════════════════════════════════════════════════
  
  license-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: rhinometric-license-dashboard
    environment:
      LICENSE_DB_PATH: /data/licenses.db
      DASHBOARD_PORT: 8080
    volumes:
      - license_data:/data:ro
    networks:
      - rhinometric
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      license-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  # ═══════════════════════════════════════════════════════════════════
  # TIER 8: REVERSE PROXY (OPCIONAL)
  # ═══════════════════════════════════════════════════════════════════
  
  nginx:
    image: nginx:1.25-alpine
    container_name: rhinometric-nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rhinometric
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - grafana
      - prometheus
      - license-dashboard
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

# ═══════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════

networks:
  rhinometric:
    driver: bridge
    name: rhinometric-trial

# ═══════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local
  alertmanager_data:
    driver: local
  license_data:
    driver: local

# ═══════════════════════════════════════════════════════════════════
# TRIAL VERSION INFO
# ═══════════════════════════════════════════════════════════════════
# Versión: Trial 180 días
# Servicios: 11 contenedores
# Recursos estimados:
#   - CPU: ~4.5 vCPUs
#   - RAM: ~7.5 GB
#   - Retención: 7 días
