<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhinometric License Dashboard - Trial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1em;
        }

        .trial-badge {
            display: inline-block;
            background: #fbbf24;
            color: #92400e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-left: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 1em;
            margin-top: 5px;
        }

        .licenses-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f3f4f6;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e5e7eb;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:hover {
            background: #f9fafb;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-active {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-expired {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-expiring {
            background: #fed7aa;
            color: #92400e;
        }

        .badge-trial {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-permanent {
            background: #e0e7ff;
            color: #3730a3;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                🦏 Rhinometric License Dashboard
                <span class="trial-badge">TRIAL VERSION</span>
            </h1>
            <p class="subtitle">Monitoreo de licencias en tiempo real</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-licenses">-</div>
                <div class="stat-label">Licencias Totales</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="active-licenses" style="color: #10b981;">-</div>
                <div class="stat-label">Licencias Activas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="trial-licenses" style="color: #3b82f6;">-</div>
                <div class="stat-label">Licencias Trial</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="expired-licenses" style="color: #ef4444;">-</div>
                <div class="stat-label">Licencias Expiradas</div>
            </div>
        </div>

        <div class="licenses-container">
            <button class="refresh-btn" onclick="loadData()">🔄 Actualizar</button>
            <div id="licenses-table"></div>
        </div>

        <footer>
            <p>Rhinometric Observability Platform - Trial Version</p>
            <p>© 2025 Rhinometric - Todos los derechos reservados</p>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                // Cargar estadísticas
                const statsResponse = await fetch('/api/statistics');
                const stats = await statsResponse.json();
                
                document.getElementById('total-licenses').textContent = stats.total || 0;
                document.getElementById('active-licenses').textContent = stats.active || 0;
                document.getElementById('trial-licenses').textContent = stats.trial || 0;
                document.getElementById('expired-licenses').textContent = stats.expired || 0;

                // Cargar licencias
                const licensesResponse = await fetch('/api/licenses');
                const data = await licensesResponse.json();
                
                const container = document.getElementById('licenses-table');
                
                if (data.licenses.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <h3>No hay licencias registradas</h3>
                            <p>Las licencias aparecerán aquí cuando se generen</p>
                        </div>
                    `;
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Tipo</th>
                                <th>Estado</th>
                                <th>Creada</th>
                                <th>Expira</th>
                                <th>Días Restantes</th>
                                <th>Último Check</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.licenses.forEach(license => {
                    const statusBadge = license.is_expired ? 
                        '<span class="badge badge-expired">Expirada</span>' :
                        license.is_expiring_soon ?
                        '<span class="badge badge-expiring">Por Expirar</span>' :
                        '<span class="badge badge-active">Activa</span>';

                    const typeBadge = license.license_type === 'trial' ?
                        '<span class="badge badge-trial">Trial</span>' :
                        '<span class="badge badge-permanent">Comercial</span>';

                    const daysRemaining = license.days_remaining !== null ?
                        (license.is_expired ? `Expiró hace ${Math.abs(license.days_remaining)} días` : `${license.days_remaining} días`) :
                        'N/A';

                    html += `
                        <tr>
                            <td><strong>${license.client_name || 'N/A'}</strong></td>
                            <td>${typeBadge}</td>
                            <td>${statusBadge}</td>
                            <td>${formatDate(license.created_at)}</td>
                            <td>${formatDate(license.expires_at)}</td>
                            <td>${daysRemaining}</td>
                            <td>${formatDate(license.last_check)}</td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                `;

                container.innerHTML = html;

            } catch (error) {
                console.error('Error cargando datos:', error);
                document.getElementById('licenses-table').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Error al cargar datos</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleString('es-ES', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch {
                return dateString;
            }
        }

        // Cargar datos al inicio
        loadData();

        // Auto-refresh cada 30 segundos
        setInterval(loadData, 30000);
    </script>
</body>
</html>
