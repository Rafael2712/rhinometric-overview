[unix_http_server]
file=/var/run/supervisord.sock 
chmod=0700

[supervisord]
logfile=/var/log/supervisor/supervisord.log 
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisord.sock

; --- SERVICIOS DE LA PLATAFORMA ---
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10

[program:plataforma]
; *** DEBES CAMBIAR ESTA LÍNEA ***
; Sustituye '/usr/local/bin/tu-servidor-principal' por el comando real de tu aplicación.
command=/usr/local/bin/plataforma-rhinometric 
directory=/app 
autostart=true
autorestart=true
priority=5
stdout_logfile=/var/log/supervisor/plataforma-stdout.log
stderr_logfile=/var/log/supervisor/plataforma-stderr.log
