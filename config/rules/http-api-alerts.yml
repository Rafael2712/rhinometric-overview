groups:
  - name: http_api_alerts
    interval: 30s
    rules:
      - alert: HighHttpLatencyP95
        expr: >
          histogram_quantile(
            0.95,
            sum by (le, endpoint) (
              rate(http_request_duration_seconds_bucket{job="console-backend"}[5m])
            )
          ) > 1
        for: 5m
        labels:
          severity: warning
          service: console-backend
          component: application
          tier: api
        annotations:
          summary: "High HTTP P95 latency in console-backend"
          description: "P95 HTTP latency is {{ $value | humanizeDuration }} for endpoint {{ $labels.endpoint }} (threshold: 1s)"
          dashboard_link: "http://grafana:3000/d/api-performance-console-backend?var-endpoint={{ $labels.endpoint }}&from=now-1h&to=now"
          runbook_url: "https://docs.rhinometric.com/runbooks/high-http-latency"

      - alert: HighHttpErrorRate
        expr: >
          (
            sum(rate(http_requests_total{job="console-backend",status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="console-backend"}[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          service: console-backend
          component: application
          tier: api
        annotations:
          summary: "High HTTP 5xx error rate in console-backend"
          description: "5xx error rate is {{ $value | humanizePercentage }} in the last 5 minutes (threshold: 5%)"
          dashboard_link: "http://grafana:3000/d/api-performance-console-backend?from=now-15m&to=now"
          runbook_url: "https://docs.rhinometric.com/runbooks/high-error-rate"

      - alert: HighHttpRequestRate
        expr: >
          sum(rate(http_requests_total{job="console-backend"}[1m])) > 100
        for: 5m
        labels:
          severity: info
          service: console-backend
          component: application
          tier: api
        annotations:
          summary: "High HTTP request rate in console-backend"
          description: "Request rate is {{ $value | humanize }} req/s (threshold: 100 req/s)"
          dashboard_link: "http://grafana:3000/d/api-performance-console-backend?from=now-30m&to=now"
