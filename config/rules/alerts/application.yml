groups:
  - name: application_alerts
    interval: 30s
    rules:
      # PostgreSQL Down
      - alert: PostgreSQLDown
        expr: |
          pg_up == 0
        for: 1m
        labels:
          severity: critical
          tier: database
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL instance {{ $labels.instance }} is not responding"
          runbook_url: "https://grafana.rhinometric.com/d/runbooks?var-topic=postgres-down"

      # High PostgreSQL Connections
      - alert: HighPostgreSQLConnections
        expr: |
          sum(pg_stat_activity_count) by (instance) > 80
        for: 5m
        labels:
          severity: warning
          tier: database
        annotations:
          summary: "High number of PostgreSQL connections"
          description: "PostgreSQL has {{ $value }} active connections on {{ $labels.instance }}"
          runbook_url: "https://grafana.rhinometric.com/d/runbooks?var-topic=high-db-connections"

      # Slow PostgreSQL Queries
      - alert: SlowPostgreSQLQueries
        expr: |
          rate(pg_stat_statements_mean_exec_time_seconds[5m]) > 1
        for: 5m
        labels:
          severity: warning
          tier: database
        annotations:
          summary: "Slow queries detected in PostgreSQL"
          description: "Average query time is {{ $value | humanize }}s on {{ $labels.instance }}"
          runbook_url: "https://grafana.rhinometric.com/d/runbooks?var-topic=slow-queries"

      # Grafana Down
      - alert: GrafanaDown
        expr: |
          up{job="grafana"} == 0
        for: 2m
        labels:
          severity: critical
          tier: monitoring
        annotations:
          summary: "Grafana is down"
          description: "Grafana instance {{ $labels.instance }} is not responding"
          runbook_url: "https://grafana.rhinometric.com/d/runbooks?var-topic=grafana-down"

      # Prometheus Down
      - alert: PrometheusDown
        expr: |
          up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          tier: monitoring
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus instance {{ $labels.instance }} is not responding"
          runbook_url: "https://grafana.rhinometric.com/d/runbooks?var-topic=prometheus-down"

      # Loki Down
      - alert: LokiDown
        expr: |
          up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
          tier: monitoring
        annotations:
          summary: "Loki logging service is down"
          description: "Loki instance {{ $labels.instance }} is not responding"
          runbook_url: "https://grafana.rhinometric.com/d/runbooks?var-topic=loki-down"

      # AI Anomaly Service Down
      - alert: AIAnomalyServiceDown
        expr: |
          up{job="ai-anomaly"} == 0
        for: 3m
        labels:
          severity: warning
          tier: intelligence
        annotations:
          summary: "AI Anomaly Detection service is down"
          description: "AI Anomaly service {{ $labels.instance }} is not responding"
          runbook_url: "https://grafana.rhinometric.com/d/runbooks?var-topic=ai-service-down"

      # License Server Issues
      - alert: LicenseValidationFailing
        expr: |
          rate(rhinometric_license_validation_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          tier: licensing
        annotations:
          summary: "License validation errors detected"
          description: "License validation error rate: {{ $value | humanize }}/s"
          runbook_url: "https://grafana.rhinometric.com/d/runbooks?var-topic=license-errors"
