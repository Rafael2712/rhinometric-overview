# ═══════════════════════════════════════════════════════════════════════════
#  PROMETHEUS ALERT RULES - RHINOMETRIC v2.1.0
# ═══════════════════════════════════════════════════════════════════════════

groups:
  - name: rhinometric_services
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 2 minutes."

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.name }}"
          description: "Container {{ $labels.name }} CPU usage is above 80% for 5 minutes."

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.name }}"
          description: "Container {{ $labels.name }} memory usage is above 90%."

      - alert: PrometheusTargetDown
        expr: up{job=~"prometheus|grafana|loki|tempo"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical service {{ $labels.job }} is down"
          description: "Core observability service {{ $labels.job }} is unreachable."
