groups:
  - name: disk_space
    interval: 60s
    rules:
      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 0.80
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk usage on {{ $labels.instance }} is at {{ $value | humanizePercentage }}. Only {{ printf \"node_filesystem_avail_bytes{mountpoint='/'}\" | query | first | value | humanize1024 }}B remaining."
          
      - alert: CriticalDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 0.90
        for: 5m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "CRITICAL: Disk almost full on {{ $labels.instance }}"
          description: "Disk usage on {{ $labels.instance }} is at {{ $value | humanizePercentage }}. Immediate action required. Only {{ printf \"node_filesystem_avail_bytes{mountpoint='/'}\" | query | first | value | humanize1024 }}B remaining."
          
      - alert: DiskWillFillIn4Hours
        expr: predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[1h], 4*3600) < 0
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Disk will fill in 4 hours on {{ $labels.instance }}"
          description: "Based on current usage trends, disk on {{ $labels.instance }} will be full in approximately 4 hours. Current usage: {{ printf \"(1 - node_filesystem_avail_bytes{mountpoint='/'} / node_filesystem_size_bytes{mountpoint='/'}) * 100\" | query | first | value | humanize }}%"
          
      - alert: DockerLogsGrowthAnomaly
        expr: rate(node_filesystem_size_bytes{mountpoint="/var/lib/docker"}[5m]) > 10485760  # 10MB/s growth rate
        for: 5m
        labels:
          severity: critical
          component: docker
        annotations:
          summary: "Abnormal Docker logs growth detected on {{ $labels.instance }}"
          description: "Docker storage is growing at {{ $value | humanize1024 }}B/s. This may indicate a logging loop. Check container logs immediately."
