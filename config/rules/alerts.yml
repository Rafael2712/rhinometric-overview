groups:
  - name: container_alerts
    interval: 30s
    rules:
      - alert: ContainerDown
        expr: (time() - container_last_seen{id=~"/docker/.*"}) > 60
        for: 1m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container {{ $labels.name }} ({{ $labels.id }}) has been down for more than 1 minute."
          dashboard_link: "http://grafana:3000/d/docker-containers?var-container={{ $labels.id }}&from={{ $value | humanizeTimestamp }}&to=now"

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 85
        for: 2m
        labels:
          severity: warning
          component: resources
        annotations:
          summary: "High memory usage detected"
          description: "Container {{ $labels.name }} is using {{ $value | humanize }}% of available memory."

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[1m]) * 100 > 80
        for: 3m
        labels:
          severity: warning
          component: resources
        annotations:
          summary: "High CPU usage detected"
          description: "Container {{ $labels.name }} CPU usage is {{ $value | humanize }}%."
          dashboard_link: "http://grafana:3000/d/docker-containers?from={{ $value | humanizeTimestamp }}&to=now"

      - alert: HighHostCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High host CPU usage on {{ $labels.instance }}"
          description: "Host CPU usage is {{ $value | humanize }}% (threshold: 80%)."
          dashboard_link: "http://grafana:3000/d/system-monitoring?var-instance={{ $labels.instance }}&from={{ $value | humanizeTimestamp }}&to=now"

      - alert: HighHostMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High host memory usage on {{ $labels.instance }}"
          description: "Host memory usage is {{ $value | humanize }}% (threshold: 85%)."
          dashboard_link: "http://grafana:3000/d/system-monitoring?var-instance={{ $labels.instance }}&from={{ $value | humanizeTimestamp }}&to=now"

      - alert: DiskSpaceHigh
        expr: (1 - (node_filesystem_avail_bytes{mountpoint=~"/mnt.*",fstype!="tmpfs"} / node_filesystem_size_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is {{ $value | humanize }}% on {{ $labels.mountpoint }} (threshold: 90%)."
          dashboard_link: "http://grafana:3000/d/system-monitoring?var-instance={{ $labels.instance }}&from={{ $value | humanizeTimestamp }}&to=now"

      - alert: NetworkSaturated
        expr: rate(node_network_receive_bytes_total{device!="lo"}[5m]) > 500000000
        for: 3m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Network saturation on {{ $labels.instance }}"
          description: "Network receive rate is {{ $value | humanize }} bytes/sec on {{ $labels.device }} (threshold: 500MB/s)."
          dashboard_link: "http://grafana:3000/d/system-monitoring?var-instance={{ $labels.instance }}&from={{ $value | humanizeTimestamp }}&to=now"

  - name: license_alerts
    interval: 1h
    rules:
      - alert: LicenseExpiringSoon
        expr: (license_expires_at - time()) / 86400 < 7
        for: 5m
        labels:
          severity: warning
          component: licensing
        annotations:
          summary: "License expiring in less than 7 days"
          description: "License for {{ $labels.client_name }} will expire in {{ $value | humanize }} days."

      - alert: LicenseExpired
        expr: license_expires_at < time()
        for: 1m
        labels:
          severity: critical
          component: licensing
        annotations:
          summary: "License has expired"
          description: "License for {{ $labels.client_name }} has expired."

      - alert: LicenseValidationFailed
        expr: rate(license_validation_failures_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          component: licensing
        annotations:
          summary: "License validation failures detected"
          description: "License validation is failing for {{ $labels.client_name }}."

  - name: observability_stack_alerts
    interval: 30s
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus has been down for more than 1 minute. Monitoring is unavailable."

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 2m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "Grafana is down"
          description: "Grafana has been down for more than 2 minutes. Dashboards are unavailable."

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: warning
          component: logging
        annotations:
          summary: "Loki is down"
          description: "Loki has been down for more than 2 minutes. Log ingestion is unavailable."

      - alert: TempoDown
        expr: up{job="tempo"} == 0
        for: 2m
        labels:
          severity: warning
          component: tracing
        annotations:
          summary: "Tempo is down"
          description: "Tempo has been down for more than 2 minutes. Trace ingestion is unavailable."

      - alert: HighPrometheusScrapeErrors
        expr: rate(prometheus_target_scrapes_exceeded_sample_limit_total[5m]) > 0
        for: 3m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "High Prometheus scrape errors"
          description: "Prometheus is experiencing scrape errors: {{ $value | humanize }} errors/sec."

