version: '3.8'

services:
  license-server:
    build: ./rhinometric-license/server
    container_name: license-server
    ports:
      - "5000:5000"
    volumes:
      - license-data:/data
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    entrypoint: ["/license_validator.sh"]
    command: ["/run.sh"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - LICENSE_SERVER=http://license-server:5000
    ports:
      - "3000:3000"
    volumes:
      - ./rhinometric-license/client/license_validator.sh:/license_validator.sh:ro
      - ./licenses/grafana.key:/etc/rhinometric/license.key:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - license-server
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    entrypoint: ["/license_validator.sh"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    environment:
      - LICENSE_SERVER=http://license-server:5000
    ports:
      - "9090:9090"
    volumes:
      - ./rhinometric-license/client/license_validator.sh:/license_validator.sh:ro
      - ./licenses/prometheus.key:/etc/rhinometric/license.key:ro
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - license-server
    networks:
      - monitoring

  loki:
    image: grafana/loki:latest
    container_name: loki
    entrypoint: ["/license_validator.sh"]
    command: ["/usr/bin/loki", "-config.file=/etc/loki/loki-config.yml"]
    environment:
      - LICENSE_SERVER=http://license-server:5000
    ports:
      - "3100:3100"
    volumes:
      - ./rhinometric-license/client/license_validator.sh:/license_validator.sh:ro
      - ./licenses/loki.key:/etc/rhinometric/license.key:ro
      - ./config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    depends_on:
      - license-server
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  license-data:
  grafana-data:
  prometheus-data:
  loki-data:
