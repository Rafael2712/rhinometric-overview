# ═════════════════════════════════════════════════════════════════════════
#  PROMETHEUS CONFIG - RHINOMETRIC v2.5.x (UNIFIED)
#  Source of truth for all scrape targets.
#  Mounted into rhinometric-prometheus container.
# ═════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/rules/alerts/*.yml

scrape_configs:
  # ── CORE PLATFORM SERVICES ────────────────────────────────────────────

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: 'ai-anomaly'
    static_configs:
      - targets: ['rhinometric-ai-anomaly:8085']

  - job_name: 'console-backend'
    static_configs:
      - targets: ['rhinometric-console-backend:8105']
    scrape_interval: 10s
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['rhinometric-postgres-exporter:9187']
    scrape_interval: 15s

  - job_name: 'redis'
    static_configs:
      - targets: ['rhinometric-redis-exporter:9121']
    scrape_interval: 15s

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']

  # ── INFRASTRUCTURE EXPORTERS ──────────────────────────────────────────

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ── BLACKBOX EXPORTER (self-monitoring) ───────────────────────────────

  - job_name: 'blackbox-exporter'
    static_configs:
      - targets: ['blackbox-exporter:9115']

  # ── BLACKBOX HTTP PROBES (Internal Healthchecks) ──────────────────────

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://prometheus:9090/-/healthy
          - http://grafana:3000/api/health
          - http://loki:3100/ready
          - http://jaeger:14269
          - http://license-server-v2:5000/api/health
          - http://rhinometric-ai-anomaly:8085/health
          - http://rhinometric-console-backend:8105/health
          - http://alertmanager:9093/-/healthy
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ── BLACKBOX WEB - EXTERNAL WEBSITE MONITORING ────────────────────────
  # This job monitors rhinometric.com as an external service.
  # It appears as a "client service" in the Console UI (service #13+).
  # ──────────────────────────────────────────────────────────────────────

  - job_name: 'blackbox-web-rhinometric'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://www.rhinometric.com/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: rhinometric-blackbox-exporter:9115
