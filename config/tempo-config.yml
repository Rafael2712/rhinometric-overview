server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250

ingester:
  max_block_duration: 10m
  max_block_bytes: 1000000
  complete_block_timeout: 1m

compactor:
  compaction:
    block_retention: 168h

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000

querier:
  max_concurrent_queries: 10

query_frontend:
  search:
    max_duration: 168h
    default_result_limit: 20
    max_result_limit: 50

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: rhinometric
      version: "2.2.0"
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://rhinometric-prometheus:9090/api/v1/write
        send_exemplars: true
  processor:
    service_graphs:
      dimensions:
        - http.method
        - http.target
        - http.status_code
      histogram_buckets: [0.1, 0.2, 0.4, 0.8, 1.0, 1.5, 2.0, 3.0, 4.0, 5.0]
    span_metrics:
      dimensions:
        - http.method
        - http.target
        - http.status_code
        - service.version
      histogram_buckets: [0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128, 0.256, 0.512, 1.024, 2.048, 4.096, 8.192, 16.384]

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946
