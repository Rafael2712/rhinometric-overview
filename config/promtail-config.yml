server:
  http_listen_port: 9080
  grpc_listen_port: 9095
  log_level: debug

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Static configuration for Docker container logs (compatible with Windows/WSL2)
  - job_name: docker_containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker_logs
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      # Parse Docker JSON log format
      - json:
          expressions:
            output: log
            stream: stream
            time: time
            attrs:
      
      # Extract container ID from attrs.tag if available
      - json:
          expressions:
            tag:
          source: attrs
      
      # Extract container ID from tag (first part before hyphen)
      - regex:
          expression: '^(?P<container_id>[a-f0-9]{12})'
          source: tag
      
      # Try to extract container name from log path
      - regex:
          expression: '/var/lib/docker/containers/(?P<full_container_id>[a-f0-9]+)/'
          source: filename
      
      # Set labels for querying
      - labels:
          container_id:
          stream:
          full_container_id:
      
      # Output the actual log message
      - output:
          source: output
      
      # Add timestamp if available
      - timestamp:
          source: time
          format: RFC3339Nano

  # Optional: System logs (if you want to add host logs later)
  # - job_name: system_logs
  #   static_configs:
  #     - targets:
  #         - localhost
  #       labels:
  #         job: system_logs
  #         __path__: /var/log/*.log
