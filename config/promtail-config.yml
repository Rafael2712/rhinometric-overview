server:
  http_listen_port: 9080
  grpc_listen_port: 9095
  log_level: debug

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discover all Docker containers via the Docker API (works in Docker Desktop on macOS/Windows/Linux)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only keep containers that actually have log files
      - source_labels: [__meta_docker_container_log_path]
        regex: 
        action: drop
      # Set the path to the discovered container log
      - source_labels: [__meta_docker_container_log_path]
        target_label: __path__
      # Useful labels for querying in Grafana
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_id]
        target_label: container_id
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
      - source_labels: [__meta_docker_container_label_com_docker_compose_container_number]
        target_label: compose_container_number
    pipeline_stages:
      - docker: {}
