events {
    worker_connections 1024;
}

http {
    # ═══════════════════════════════════════════════════════════════════
    # RHINOMETRIC v2.5.0-SECURE - Cloudflare SSL Ready
    # ═══════════════════════════════════════════════════════════════════
    add_header X-Powered-By "Rhinometric Observability Platform" always;
    add_header X-Rhinometric-Version "2.5.0-SECURE" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging with Cloudflare IP
    log_format cloudflare '$http_cf_connecting_ip - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'CF-Ray: $http_cf_ray';
    
    access_log /var/log/nginx/access.log cloudflare buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting (más agresivo)
    limit_req_zone $binary_remote_addr zone=one:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

    # DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;
    
    # Real IP from Cloudflare
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;
    
    server {
        listen 80;
        server_name console.rhinometric.com;
        
        # Enable rate limiting
        limit_req zone=one burst=40 nodelay;

        # ═══════════════════════════════════════════════════════════
        # RHINOMETRIC CONSOLE - Login y Dashboard Principal
        # ═══════════════════════════════════════════════════════════
        location / {
            set $console_frontend rhinometric-console-frontend:3002;
            proxy_pass http://$console_frontend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ═══════════════════════════════════════════════════════════
        # RHINOMETRIC CONSOLE BACKEND - API
        # ═══════════════════════════════════════════════════════════
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            set $console_backend rhinometric-console-backend:8105;
            proxy_pass http://$console_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
        }

        # ═══════════════════════════════════════════════════════════
        # GRAFANA - Observability Dashboards
        # ═══════════════════════════════════════════════════════════
        location /grafana/ {
            set $grafana_upstream rhinometric-grafana:3000;
            proxy_pass http://$grafana_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ═══════════════════════════════════════════════════════════
        # JAEGER - Distributed Tracing (Redirect a UI directa)
        # ═══════════════════════════════════════════════════════════
        location /jaeger {
            # Jaeger UI no soporta subpaths sin QUERY_BASE_PATH
            # Redirigir a mensaje informativo o configurar port forwarding
            return 302 http://89.167.22.228:16686/search;
        }

        # ═══════════════════════════════════════════════════════════
        # MONITORING & HEALTH
        # ═══════════════════════════════════════════════════════════
        location /metrics {
            stub_status on;
            access_log off;
            allow all;
        }
        
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.25.0.0/16;
            deny all;
        }
        
        location /health {
            return 200 "Rhinometric v2.5.0-SECURE - healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
