events {
    worker_connections 1024;
}

http {
    # ═══════════════════════════════════════════════════════════════════
    # RHINOMETRIC BRANDING v2.4.0
    # ═══════════════════════════════════════════════════════════════════
    add_header X-Powered-By "Rhinometric Observability Platform" always;
    add_header X-Rhinometric-Version "Trial-180days" always;
    add_header X-Rhinometric-License "Trial" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:;";

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;
    
    server {
        listen 80;
        server_name localhost;
        
        # Enable rate limiting
        limit_req zone=one burst=20 nodelay;

        # Nginx metrics endpoint
        location /metrics {
            stub_status on;
            access_log off;
            allow all;
        }
        
        # Proxy root directly to Grafana with dynamic resolution
        location / {
            set $grafana_upstream rhinometric-grafana:3000;
            proxy_pass http://$grafana_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /nginx_status {
            stub_status on;
            access_log off;
        }
        
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
