modules:
  http_2xx:
    prober: http
    http:
      preferred_ip_protocol: ip4
      follow_redirects: true

  http_2xx_insecure:
    prober: http
    http:
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: true

  tcp_connect:
    prober: tcp

  icmp:
    prober: icmp
    icmp:
      preferred_ip_protocol: ip4
