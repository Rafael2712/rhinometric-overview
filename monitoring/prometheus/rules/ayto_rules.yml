groups:
- name: ayto_core
  rules:
  - alert: ServicioCaido
    expr: probe_success == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Objetivo caído ({{ $labels.target }})"
      description: "Blackbox reporte: sin éxito por >5m."

  - alert: LatenciaAlta
    expr: avg_over_time(probe_duration_seconds[5m]) > 0.8
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "Latencia alta ({{ $labels.target }})"
      description: "Latencia media 5m > 0.8s."
