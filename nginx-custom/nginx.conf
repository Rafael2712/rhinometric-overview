user nginx;
worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Header para identificar la réplica que rispond
  map $hostname $instance_id { default $hostname; }

  server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Métricas para nginx-exporter
    location = /nginx_status {
      stub_status;
      allow all;
    }

    # Estáticos; si no existe, 404 (para SPA: try_files $uri /index.html;)
    location / {
      add_header X-Instance $instance_id always;
      try_files $uri $uri/ =404;
    }
  }
}
