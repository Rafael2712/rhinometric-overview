# Rhinometric Enterprise - Grafana Branding Configuration
# Auto-loaded by Grafana container

[server]
domain = ${RHINO_DOMAIN:-localhost}
root_url = %(protocol)s://%(domain)s:%(http_port)s/
serve_from_sub_path = false

[analytics]
reporting_enabled = false
check_for_updates = false

[security]
admin_user = admin
admin_password = rhinometric_demo
allow_embedding = true

[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[branding]
# Rhinometric Enterprise branding
app_title = Rhinometric Enterprise
welcome_title = Rhinometric Enterprise Demo

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/rhinometric-overview.json

[panels]
disable_sanitize_html = false

[database]
type = sqlite3

[paths]
provisioning = /etc/grafana/provisioning

[log]
mode = console
level = info

[feature_toggles]
enable = publicDashboards

[unified_alerting]
enabled = true

# Custom CSS injection (requires Grafana plugin or reverse proxy)
[plugin.rhinometric-theme]
custom_css = /etc/grafana/branding/rhinometric-theme.css
