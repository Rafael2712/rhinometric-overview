# ============================================
# Grafana Dashboards Provisioning
# ============================================

apiVersion: 1

providers:
  - name: 'Rhinometric Dashboards'
    orgId: 1
    folder: 'Rhinometric'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
