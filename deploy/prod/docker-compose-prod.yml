version: '3.8'

# ============================================
# RHINOMETRIC v2.5.0 - Production Deployment
# ============================================
# Uso: docker compose --env-file .env.prod -f docker-compose-prod.yml up -d

networks:
  rhinometric-internal:
    driver: bridge
    internal: false
  rhinometric-backend:
    driver: bridge
    internal: true

volumes:
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_models:
    driver: local
  reports_output:
    driver: local
  dashboard_builder_data:
    driver: local
  traefik_certs:
    driver: local

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-50m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

x-restart-policy: &restart-always
  restart: always

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  # ============================================
  # TRAEFIK - Reverse Proxy + TLS
  # ============================================
  traefik:
    image: traefik:v2.10
    <<: *restart-policy
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    networks:
      - rhinometric-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_certs:/letsencrypt
    environment:
      - TRAEFIK_LOG_LEVEL=${TRAEFIK_LOG_LEVEL:-INFO}
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "traefik", "healthcheck"]

  # ============================================
  # GRAFANA - Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:10.4.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-internal
      - rhinometric-backend
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      # Server
      - GF_SERVER_PROTOCOL=${GF_SERVER_PROTOCOL:-https}
      - GF_SERVER_DOMAIN=${DOMAIN}
      - GF_SERVER_ROOT_URL=https://${DOMAIN}
      - GF_SERVER_ENFORCE_DOMAIN=true
      
      # Security
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_SECURITY_CONTENT_SECURITY_POLICY=true
      - GF_SECURITY_ALLOW_EMBEDDING=false
      
      # Users
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      
      # Logging
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=${LOG_LEVEL:-info}
      
      # Database
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres:5432
      - GF_DATABASE_NAME=${POSTGRES_DB}
      - GF_DATABASE_USER=${POSTGRES_USER}
      - GF_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    mem_limit: ${GRAFANA_MEM_LIMIT:-1g}
    cpus: ${GRAFANA_CPU_LIMIT:-1.0}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]

  # ============================================
  # PROMETHEUS - Metrics
  # ============================================
  prometheus:
    image: prom/prometheus:v2.53.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROM_RETENTION_TIME:-15d}'
      - '--storage.tsdb.retention.size=${PROM_RETENTION_SIZE:-10GB}'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    mem_limit: ${PROMETHEUS_MEM_LIMIT:-2g}
    cpus: ${PROMETHEUS_CPU_LIMIT:-2.0}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]

  # ============================================
  # ALERTMANAGER - Alerting
  # ============================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - alertmanager_data:/alertmanager
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://${DOMAIN}/alertmanager'
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]

  # ============================================
  # LOKI - Logs
  # ============================================
  loki:
    image: grafana/loki:3.0.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    environment:
      - LOKI_RETENTION_PERIOD=${LOKI_RETENTION_PERIOD:-7d}
    mem_limit: ${LOKI_MEM_LIMIT:-1g}
    cpus: ${LOKI_CPU_LIMIT:-1.0}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]

  # ============================================
  # PROMTAIL - Log Collector
  # ============================================
  promtail:
    image: grafana/promtail:3.0.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    mem_limit: 256m
    cpus: 0.3

  # ============================================
  # TEMPO - Traces
  # ============================================
  tempo:
    image: grafana/tempo:2.6.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - tempo_data:/tmp/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    mem_limit: 512m
    cpus: 0.5

  # ============================================
  # POSTGRESQL - Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]

  # ============================================
  # REDIS - Cache
  # ============================================
  redis:
    image: redis:7-alpine
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]

  # ============================================
  # DASHBOARD BUILDER API
  # ============================================
  dashboard-builder:
    image: rhinometric/dashboard-builder:2.5.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - dashboard_builder_data:/app/data
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET=${DASHBUILDER_JWT_SECRET}
      - ENABLE_DOCS=${ENABLE_DOCS:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_API_KEY=${GRAFANA_ADMIN_PASSWORD}
      - PROMETHEUS_URL=http://prometheus:9090
      - WORKERS=${API_WORKERS:-2}
    mem_limit: ${API_MEM_LIMIT:-512m}
    cpus: ${API_CPU_LIMIT:-0.5}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]

  # ============================================
  # AI ANOMALY DETECTION
  # ============================================
  ai-anomaly:
    image: rhinometric/ai-anomaly:2.2.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - ai_models:/app/models
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET=${AI_JWT_SECRET}
      - ENABLE_DOCS=${ENABLE_DOCS:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PROMETHEUS_URL=http://prometheus:9090
      - MODEL_PATH=/app/models
      - WORKERS=${API_WORKERS:-2}
    mem_limit: ${API_MEM_LIMIT:-512m}
    cpus: ${API_CPU_LIMIT:-0.5}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/health || exit 1"]

  # ============================================
  # REPORT GENERATOR
  # ============================================
  report-generator:
    image: rhinometric/report-generator:2.2.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - reports_output:/app/reports
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET=${REPORTGEN_JWT_SECRET}
      - ENABLE_DOCS=${ENABLE_DOCS:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - WORKERS=${API_WORKERS:-2}
    mem_limit: ${API_MEM_LIMIT:-512m}
    cpus: ${API_CPU_LIMIT:-0.5}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/health || exit 1"]

  # ============================================
  # LICENSE SERVER
  # ============================================
  license-server:
    image: rhinometric/license-server:2.0.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET=${LICENSE_JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - LICENSE_DURATION_DAYS=${LICENSE_DURATION_DAYS:-180}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]

  # ============================================
  # EXPORTERS
  # ============================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    mem_limit: 128m
    cpus: 0.2

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    mem_limit: 256m
    cpus: 0.3

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    mem_limit: 128m
    cpus: 0.2

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    <<: *restart-policy
    logging: *default-logging
    networks:
      - rhinometric-backend
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    mem_limit: 128m
    cpus: 0.2
