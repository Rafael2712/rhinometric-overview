# ============================================
# Prometheus v2.53.0 - Production Configuration
# ============================================

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: 'rhinometric-prod'
    environment: 'production'

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rules
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape Configs
scrape_configs:
  # ============================================
  # Self-monitoring
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ============================================
  # System Metrics
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'

  # ============================================
  # Monitoring Stack
  # ============================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alertmanager'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'

  # ============================================
  # FastAPI Services
  # ============================================
  - job_name: 'dashboard-builder'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['dashboard-builder:8001']
        labels:
          service: 'dashboard-builder'
          api: 'fastapi'

  - job_name: 'ai-anomaly'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-anomaly:8085']
        labels:
          service: 'ai-anomaly'
          api: 'fastapi'

  - job_name: 'report-generator'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['report-generator:8086']
        labels:
          service: 'report-generator'
          api: 'fastapi'

  - job_name: 'license-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['license-server:8090']
        labels:
          service: 'license-server'
          api: 'flask'

  # ============================================
  # Blackbox Exporter - HTTP Probes
  # ============================================
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://dashboard-builder:8001/health
          - http://ai-anomaly:8085/health
          - http://report-generator:8086/health
          - http://license-server:8090/health
          - http://grafana:3000/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
