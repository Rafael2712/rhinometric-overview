<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHINOMETRIC - Dashboard Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0, 212, 170, 0.1);
            border-bottom: 2px solid #00d4aa;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4aa 0%, #00ffcc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 212, 170, 0.2);
        }
        
        h2 {
            color: #00d4aa;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .template-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(0, 212, 170, 0.3);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .template-card:hover {
            border-color: #00d4aa;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.3);
        }
        
        .template-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .template-name {
            font-size: 18px;
            font-weight: 600;
            color: #00d4aa;
            margin-bottom: 10px;
        }
        
        .template-desc {
            font-size: 14px;
            color: #b0b0b0;
            line-height: 1.5;
        }
        
        .button {
            background: linear-gradient(90deg, #00d4aa 0%, #00ffcc 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 170, 0.4);
        }
        
        .button-secondary {
            background: rgba(0, 212, 170, 0.1);
            color: #00d4aa;
            border: 2px solid #00d4aa;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #00d4aa;
            font-weight: 500;
        }
        
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 170, 0.3);
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
        }
        
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #00d4aa;
            box-shadow: 0 0 10px rgba(0, 212, 170, 0.3);
        }
        
        .canvas {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(0, 212, 170, 0.5);
            border-radius: 8px;
            min-height: 400px;
            padding: 20px;
            position: relative;
        }
        
        .panel-item {
            background: rgba(0, 212, 170, 0.1);
            border: 2px solid #00d4aa;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-info {
            flex: 1;
        }
        
        .panel-title {
            font-weight: 600;
            color: #00d4aa;
            margin-bottom: 5px;
        }
        
        .panel-type {
            font-size: 12px;
            color: #888;
        }
        
        .panel-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-remove {
            background: #ff4444;
            color: white;
        }
        
        .btn-remove:hover {
            background: #cc0000;
        }
        
        .btn-edit {
            background: #00d4aa;
            color: #1a1a2e;
        }
        
        .btn-edit:hover {
            background: #00ffcc;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border: 2px solid #00d4aa;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 212, 170, 0.3);
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #00d4aa;
            font-size: 24px;
            cursor: pointer;
        }
        
        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🦏 RHINOMETRIC Dashboard Builder</div>
        <div>
            <button class="button" onclick="showSaveModal()">💾 Guardar Dashboard</button>
        </div>
    </div>

    <div class="container">
        <!-- Plantillas Predefinidas -->
        <div class="section">
            <h2>📋 Plantillas Predefinidas</h2>
            <p style="color: #888; margin-bottom: 20px;">Selecciona una plantilla para comenzar rápidamente</p>
            
            <div class="templates-grid" id="templatesGrid">
                <!-- Templates se cargarán aquí dinámicamente -->
            </div>
        </div>

        <!-- Dashboard Actual -->
        <div class="section">
            <h2>🎨 Dashboard Actual</h2>
            <div id="successMessage" style="display: none;"></div>
            <div id="errorMessage" style="display: none;"></div>
            
            <div class="form-group">
                <label>Título del Dashboard</label>
                <input type="text" id="dashboardTitle" placeholder="Ej: Monitoreo de Producción" value="Nuevo Dashboard">
            </div>
            
            <div class="form-group">
                <label>Descripción</label>
                <textarea id="dashboardDesc" rows="3" placeholder="Descripción opcional del dashboard"></textarea>
            </div>
            
            <h3 style="color: #00d4aa; margin: 20px 0;">Paneles ({{panelCount}})</h3>
            <div class="canvas" id="panelsCanvas">
                <p style="color: #888; text-align: center; padding: 40px;">
                    Selecciona una plantilla arriba para agregar paneles
                </p>
            </div>
        </div>
    </div>

    <!-- Modal Guardar Dashboard -->
    <div class="modal" id="saveModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💾 Guardar Dashboard</h2>
                <button class="modal-close" onclick="closeSaveModal()">×</button>
            </div>
            <div id="saveStatus"></div>
            <div class="form-group">
                <label>Token de Autenticación (JWT)</label>
                <input type="text" id="authToken" placeholder="Bearer token obtenido del License Server">
                <small style="color: #888; display: block; margin-top: 5px;">
                    Obtén tu token desde el License Server (puerto 5000)
                </small>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="button" onclick="saveDashboard()">💾 Guardar Localmente</button>
                <button class="button" onclick="createInGrafana()" style="background: linear-gradient(90deg, #ff6b6b 0%, #ff8787 100%);">🚀 Crear en Grafana</button>
                <button class="button button-secondary" onclick="closeSaveModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let currentPanels = [];
        let templates = {};

        // Cargar plantillas al iniciar
        async function loadTemplates() {
            try {
                const response = await fetch('/api/templates');
                const data = await response.json();
                templates = data.templates;
                renderTemplates();
            } catch (error) {
                console.error('Error cargando plantillas:', error);
            }
        }

        function renderTemplates() {
            const grid = document.getElementById('templatesGrid');
            grid.innerHTML = '';
            
            for (const [id, template] of Object.entries(templates)) {
                const card = document.createElement('div');
                card.className = 'template-card';
                card.onclick = () => loadTemplate(id);
                card.innerHTML = `
                    <div class="template-icon">${template.icon}</div>
                    <div class="template-name">${template.name}</div>
                    <div class="template-desc">${template.description}</div>
                    <div style="margin-top: 15px; color: #00d4aa; font-size: 12px;">
                        📊 ${template.panels.length} paneles
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function loadTemplate(templateId) {
            const template = templates[templateId];
            document.getElementById('dashboardTitle').value = template.name;
            document.getElementById('dashboardDesc').value = template.description;
            currentPanels = template.panels;
            renderPanels();
            showSuccess(`Plantilla "${template.name}" cargada con ${template.panels.length} paneles`);
        }

        function renderPanels() {
            const canvas = document.getElementById('panelsCanvas');
            
            if (currentPanels.length === 0) {
                canvas.innerHTML = '<p style="color: #888; text-align: center; padding: 40px;">No hay paneles. Selecciona una plantilla.</p>';
                return;
            }
            
            canvas.innerHTML = '';
            currentPanels.forEach((panel, index) => {
                const panelDiv = document.createElement('div');
                panelDiv.className = 'panel-item';
                panelDiv.innerHTML = `
                    <div class="panel-info">
                        <div class="panel-title">${panel.title}</div>
                        <div class="panel-type">Tipo: ${panel.type} | Query: ${panel.query?.substring(0, 50)}...</div>
                    </div>
                    <div class="panel-actions">
                        <button class="btn-small btn-edit" onclick="editPanel(${index})">✏️ Editar</button>
                        <button class="btn-small btn-remove" onclick="removePanel(${index})">🗑️ Eliminar</button>
                    </div>
                `;
                canvas.appendChild(panelDiv);
            });
        }

        function removePanel(index) {
            if (confirm('¿Eliminar este panel?')) {
                currentPanels.splice(index, 1);
                renderPanels();
                showSuccess('Panel eliminado');
            }
        }

        function editPanel(index) {
            const panel = currentPanels[index];
            const newTitle = prompt('Nuevo título:', panel.title);
            if (newTitle) {
                panel.title = newTitle;
                renderPanels();
                showSuccess('Panel actualizado');
            }
        }

        function showSaveModal() {
            document.getElementById('saveModal').classList.add('active');
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('active');
        }

        async function saveDashboard() {
            const title = document.getElementById('dashboardTitle').value;
            const description = document.getElementById('dashboardDesc').value;
            const token = document.getElementById('authToken').value;
            
            if (!title) {
                showModalError('El título es requerido');
                return;
            }
            
            if (!token) {
                showModalError('Token de autenticación requerido');
                return;
            }
            
            const payload = {
                dashboard: {
                    title,
                    description,
                    tags: [],
                    panels: currentPanels,
                    time_range: { from: 'now-6h', to: 'now' },
                    refresh: '30s',
                    variables: []
                },
                overwrite: false
            };
            
            try {
                const response = await fetch('/api/dashboards', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showModalSuccess(`✅ Dashboard "${title}" guardado exitosamente`);
                    setTimeout(() => closeSaveModal(), 2000);
                } else {
                    showModalError(`❌ Error: ${data.detail || 'Error desconocido'}`);
                }
            } catch (error) {
                showModalError(`❌ Error de conexión: ${error.message}`);
            }
        }

        async function createInGrafana() {
            const title = document.getElementById('dashboardTitle').value;
            const description = document.getElementById('dashboardDesc').value;
            
            if (!title) {
                showModalError('El título es requerido');
                return;
            }
            
            if (currentPanels.length === 0) {
                showModalError('Agrega al menos un panel al dashboard');
                return;
            }
            
            showModalSuccess('⏳ Creando dashboard en Grafana...');
            
            const payload = {
                dashboard: {
                    title,
                    description: description || `Dashboard ${title} - Creado con RHINOMETRIC`,
                    tags: ["rhinometric", "custom"],
                    panels: currentPanels,
                    time_range: { from: 'now-6h', to: 'now' },
                    refresh: '30s',
                    variables: []
                },
                overwrite: false
            };
            
            try {
                const response = await fetch('/api/dashboards/grafana/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showModalSuccess(
                        `✅ Dashboard "${title}" creado en Grafana!\n` +
                        `UID: ${data.grafana_uid}\n` +
                        `Ahora puedes verlo en Grafana`
                    );
                    setTimeout(() => closeSaveModal(), 5000);
                } else {
                    showModalError(`❌ Error: ${data.detail || data.message || 'Error desconocido'}`);
                }
            } catch (error) {
                showModalError(`❌ Error al crear dashboard: ${error.message}`);
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.className = 'success-message';
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.className = 'error-message';
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showModalSuccess(message) {
            const el = document.getElementById('saveStatus');
            el.className = 'success-message';
            el.textContent = message;
        }

        function showModalError(message) {
            const el = document.getElementById('saveStatus');
            el.className = 'error-message';
            el.textContent = message;
        }

        // Inicializar
        loadTemplates();
    </script>
</body>
</html>
