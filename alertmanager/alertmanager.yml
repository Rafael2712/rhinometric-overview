global:
  resolve_timeout: 5m

route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'instance', 'component']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  
  # Routes específicas para diferentes severidades
  routes:
    - match:
        severity: critical
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
    
    - match:
        severity: warning
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 6h

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5000/webhook'
