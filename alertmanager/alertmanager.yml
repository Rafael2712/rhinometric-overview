global:
  resolve_timeout: 10m
  smtp_from: 'rafael.canelon@rhinometric.com'
  smtp_smarthost: smtp.zoho.eu:587
  smtp_auth_username: 'rafael.canelon@rhinometric.com'
  smtp_auth_password: 271211Rc$
  smtp_require_tls: true
  slack_api_url: https://hooks.slack.com/services/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
templates:
- '/etc/alertmanager/templates/*.tmpl'
route:
  receiver: team-notifications
  group_by:
  - alertname
  - instance
  - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
  - match:
      rhinometric_source: ai-anomaly
      severity: critical
    receiver: ai-anomaly-alerts
    group_by:
    - alertname
    - metric
    - severity
    group_wait: 30s
    group_interval: 1h
    repeat_interval: 24h
    continue: false
  - match:
      rhinometric_source: ai-anomaly
    receiver: blackhole
    group_by:
    - alertname
    - metric
    - severity
    group_wait: 30s
    group_interval: 1h
    repeat_interval: 24h
    continue: false
  - match:
      severity: critical
    receiver: critical-alerts
    group_wait: 10s
    group_interval: 1m
    repeat_interval: 1h
  - match:
      severity: warning
    receiver: warning-alerts
    repeat_interval: 6h
  - match:
      severity: info
    receiver: info-alerts
    repeat_interval: 24h
receivers:
- name: ai-anomaly-alerts
  slack_configs:
  - channel: '#canal-nuevo'
    username: Rhinometric AI
    icon_emoji: ':brain:'
    title: '{{ template "ai_anomaly_slack_title" (index .Alerts 0) }}'
    text: '{{ template "ai_anomaly_slack" . }}'
    actions:
    - type: button
      text: Ver Dashboard en Consola
      url: '{{- $m := (index .Alerts 0).Labels.metric -}}{{- if match ".*::.*" $m
        -}}https://console-staging.rhinometric.com/anomalies?metric={{ reReplaceAll
        "::.*" "" $m }}&entity={{ reReplaceAll ".*::" "" $m }}{{- else -}}https://console-staging.rhinometric.com/anomalies?metric={{
        $m }}{{- end -}}'
    - type: button
      text: Ver en Grafana
      url: '{{- $m := (index .Alerts 0).Labels.metric -}}{{- if match "external_service_latency"
        $m -}}http://46.225.231.117/grafana/d/ext-svc-intelligence/external-services-intelligence?viewPanel=6&from=now-1h&to=now&theme=dark&var-service_name={{
        reReplaceAll ".*::" "" $m }}{{- else if match "external_service_availability"
        $m -}}http://46.225.231.117/grafana/d/ext-svc-intelligence/external-services-intelligence?viewPanel=5&from=now-1h&to=now&theme=dark&var-service_name={{
        reReplaceAll ".*::" "" $m }}{{- else if match "external_service_health" $m
        -}}http://46.225.231.117/grafana/d/ext-svc-intelligence/external-services-intelligence?viewPanel=12&from=now-1h&to=now&theme=dark&var-service_name={{
        reReplaceAll ".*::" "" $m }}{{- else if eq $m "node_cpu_usage" -}}http://46.225.231.117/grafana/d/rhinometric-system-overview/system-overview?viewPanel=1&from=now-1h&to=now&theme=dark{{-
        else if eq $m "node_memory_usage" -}}http://46.225.231.117/grafana/d/rhinometric-system-overview/system-overview?viewPanel=2&from=now-1h&to=now&theme=dark{{-
        else if match "node_disk" $m -}}http://46.225.231.117/grafana/d/rhinometric-system-overview/system-overview?viewPanel=3&from=now-1h&to=now&theme=dark{{-
        else if match "node_network" $m -}}http://46.225.231.117/grafana/d/rhinometric-system-overview/system-overview?viewPanel=6&from=now-1h&to=now&theme=dark{{-
        else if match "container_" $m -}}http://46.225.231.117/grafana/d/docker-new/docker-containers?from=now-1h&to=now&theme=dark{{-
        else -}}http://46.225.231.117/grafana/d/ai-anomaly-service/ai-anomaly-service?from=now-1h&to=now&theme=dark{{-
        end -}}'
    send_resolved: true
  webhook_configs:
  - url: http://rhinometric-console-backend:8105/api/settings/alertmanager-webhook/email
    send_resolved: true
- name: team-notifications
  email_configs:
  - to: 'rafael.canelon@rhinometric.com'
    html: '{{ template "email.html" . }}'
    headers:
      Subject: 'Rhinometric Alert: {{ .GroupLabels.alertname }}'
  slack_configs:
  - channel: '#rhinometric-alerts'
    title: '{{ .GroupLabels.alertname }}'
    text: |-
      {{ range .Alerts }}{{ .Annotations.summary }}
      {{ end }}
- name: critical-alerts
  email_configs:
  - to: 'rafael.canelon@rhinometric.com'
    html: '{{ template "email.html" . }}'
    headers:
      Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
      Priority: urgent
  slack_configs:
  - channel: '#rhinometric-critical'
    title: '{{ .GroupLabels.alertname }}'
    text: |-
      {{ range .Alerts }}{{ .Annotations.summary }}
      {{ end }}
    color: danger
- name: warning-alerts
  email_configs:
  - to: 'rafael.canelon@rhinometric.com'
    html: '{{ template "email.html" . }}'
    headers:
      Subject: '[WARNING] {{ .GroupLabels.alertname }}'
  slack_configs:
  - channel: '#rhinometric-alerts'
    title: '{{ .GroupLabels.alertname }}'
    text: |-
      {{ range .Alerts }}{{ .Annotations.summary }}
      {{ end }}
    color: warning
- name: info-alerts
  email_configs:
  - to: 'rafael.canelon@rhinometric.com'
    html: '{{ template "email.html" . }}'
    headers:
      Subject: '[INFO] {{ .GroupLabels.alertname }}'
  slack_configs:
  - channel: '#rhinometric-info'
    title: '{{ .GroupLabels.alertname }}'
    text: |-
      {{ range .Alerts }}{{ .Annotations.summary }}
      {{ end }}
    color: '#439FE0'
- name: blackhole
inhibit_rules:
- source_match:
    severity: critical
  target_match:
    severity: warning
  equal:
  - alertname
  - instance
- source_match:
    severity: critical
  target_match:
    severity: info
  equal:
  - alertname
  - instance
- source_match:
    severity: warning
  target_match:
    severity: info
  equal:
  - alertname
  - instance
