global:
  resolve_timeout: 5m
  smtp_from: 'rafael.canelon@rhinometric.com'
  smtp_smarthost: smtp.zoho.eu:587
  smtp_auth_username: 'rafael.canelon@rhinometric.com'
  smtp_auth_password: ''
  smtp_require_tls: true
  slack_api_url: https://hooks.slack.com/services/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
templates:
- '/etc/alertmanager/templates/*.tmpl'
route:
  receiver: team-notifications
  group_by:
  - alertname
  - instance
  - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
  - match:
      rhinometric_source: ai-anomaly
      severity: critical
    receiver: ai-anomaly-alerts
    group_by:
    - alertname
    - metric
    - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    continue: false
  - match:
      rhinometric_source: ai-anomaly
    receiver: blackhole
    group_by:
    - alertname
    - metric
    - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    continue: false
  - match:
      severity: critical
    receiver: critical-alerts
    group_wait: 10s
    group_interval: 1m
    repeat_interval: 1h
  - match:
      severity: warning
    receiver: warning-alerts
    repeat_interval: 6h
  - match:
      severity: info
    receiver: info-alerts
    repeat_interval: 24h
receivers:
- name: ai-anomaly-alerts
  slack_configs:
  - channel: '#nuevo-canal'
    username: Rhinometric AI
    icon_emoji: ':brain:'
    title: '{{ template "ai_anomaly_slack_title" (index .Alerts 0) }}'
    text: '{{ template "ai_anomaly_slack" . }}'
    actions:
    - type: button
      text: Ver Dashboard en Consola
      url: '{{- $m := (index .Alerts 0).Labels.metric -}}{{- if or (eq $m "node_cpu_usage")
        (eq $m "node_memory_usage") (eq $m "node_disk_usage") (eq $m "node_disk_io")
        (eq $m "node_network_receive") (eq $m "node_network_transmit") -}}https://console-staging.rhinometric.com/dashboards/rhinometric-system-overview/view{{-
        else -}}https://console-staging.rhinometric.com/dashboards/ai-anomaly-service/view{{-
        end -}}'
    - type: button
      text: Ver en Grafana
      url: '{{- $m := (index .Alerts 0).Labels.metric -}}{{- if eq $m "node_cpu_usage"
        -}}http://46.225.231.117/grafana/d/rhinometric-system-overview/01-system-overview?viewPanel=1&theme=dark{{-
        else if eq $m "node_memory_usage" -}}http://46.225.231.117/grafana/d/rhinometric-system-overview/01-system-overview?viewPanel=2&theme=dark{{-
        else if or (eq $m "node_disk_usage") (eq $m "node_disk_io") -}}http://46.225.231.117/grafana/d/rhinometric-system-overview/01-system-overview?viewPanel=3&theme=dark{{-
        else if or (eq $m "node_network_receive") (eq $m "node_network_transmit")
        -}}http://46.225.231.117/grafana/d/rhinometric-system-overview/01-system-overview?viewPanel=6&theme=dark{{-
        else -}}http://46.225.231.117/grafana/d/ai-anomaly-service/05-ai-anomaly-service?theme=dark{{-
        end -}}'
    send_resolved: true
  webhook_configs:
  - url: http://rhinometric-console-backend:8105/api/settings/alertmanager-webhook/email
    send_resolved: true
- name: team-notifications
  email_configs:
  - to: 'rafael.canelon@rhinometric.com'
    html: '{{ template "email.html" . }}'
    headers:
      Subject: 'Rhinometric Alert: {{ .GroupLabels.alertname }}'
  slack_configs:
  - channel: '#rhinometric-alerts'
    title: '{{ .GroupLabels.alertname }}'
    text: |-
      {{ range .Alerts }}{{ .Annotations.summary }}
      {{ end }}
- name: critical-alerts
  email_configs:
  - to: 'rafael.canelon@rhinometric.com'
    html: '{{ template "email.html" . }}'
    headers:
      Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
      Priority: urgent
  slack_configs:
  - channel: '#rhinometric-critical'
    title: '{{ .GroupLabels.alertname }}'
    text: |-
      {{ range .Alerts }}{{ .Annotations.summary }}
      {{ end }}
    color: danger
- name: warning-alerts
  email_configs:
  - to: 'rafael.canelon@rhinometric.com'
    html: '{{ template "email.html" . }}'
    headers:
      Subject: '[WARNING] {{ .GroupLabels.alertname }}'
  slack_configs:
  - channel: '#rhinometric-alerts'
    title: '{{ .GroupLabels.alertname }}'
    text: |-
      {{ range .Alerts }}{{ .Annotations.summary }}
      {{ end }}
    color: warning
- name: info-alerts
  email_configs:
  - to: 'rafael.canelon@rhinometric.com'
    html: '{{ template "email.html" . }}'
    headers:
      Subject: '[INFO] {{ .GroupLabels.alertname }}'
  slack_configs:
  - channel: '#rhinometric-info'
    title: '{{ .GroupLabels.alertname }}'
    text: |-
      {{ range .Alerts }}{{ .Annotations.summary }}
      {{ end }}
    color: '#439FE0'
- name: blackhole
inhibit_rules:
- source_match:
    severity: critical
  target_match:
    severity: warning
  equal:
  - alertname
  - instance
- source_match:
    severity: critical
  target_match:
    severity: info
  equal:
  - alertname
  - instance
- source_match:
    severity: warning
  target_match:
    severity: info
  equal:
  - alertname
  - instance
