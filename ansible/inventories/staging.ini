# Rhinometric — Staging Inventory
# Usage: ansible-playbook -i inventories/staging.ini playbooks/deploy.yml

[rhinometric]
# Replace with your target server IP/hostname
# staging ansible_host=89.167.22.228 ansible_user=root
staging ansible_host=<TARGET_IP> ansible_user=root

[rhinometric:vars]
rhinometric_version=3.0.4
# Path to the tarball on the Ansible controller (your laptop)
rhinometric_tarball_path_local=../../dist/rhinometric-v3.0.4.tar.gz
