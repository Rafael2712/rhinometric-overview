<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 40px; background: #1e293b; text-align: center; }
    </style>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="200" height="200">
      <defs>
        <linearGradient id="rhinoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
        </linearGradient>
      </defs>
      <!-- Rhino head outline -->
      <path d="M 150,200 Q 140,160 160,130 Q 180,100 220,100 Q 260,100 280,130 Q 300,160 290,200 Q 285,240 270,260 Q 250,280 220,280 Q 190,280 170,260 Q 155,240 150,200 Z" 
            fill="none" stroke="url(#rhinoGradient)" stroke-width="8" stroke-linecap="round"/>
      
      <!-- Horn -->
      <path d="M 240,120 Q 250,80 260,60 Q 265,50 270,55 Q 275,60 270,70 Q 265,90 260,110" 
            fill="none" stroke="url(#rhinoGradient)" stroke-width="6" stroke-linecap="round"/>
      
      <!-- Small horn -->
      <path d="M 220,130 Q 222,110 225,100 Q 227,95 230,98 Q 232,102 230,108" 
            fill="none" stroke="url(#rhinoGradient)" stroke-width="5" stroke-linecap="round"/>
      
      <!-- Eye -->
      <circle cx="200" cy="160" r="6" fill="#667eea"/>
      
      <!-- Ear -->
      <path d="M 160,140 Q 145,135 140,145 Q 135,155 145,160 Q 155,165 160,155" 
            fill="none" stroke="url(#rhinoGradient)" stroke-width="5" stroke-linecap="round"/>
      
      <!-- Nostril -->
      <circle cx="250" cy="190" r="4" fill="#667eea"/>
    </svg>
    <p style="color: #f3f4f6; margin: 20px 0 0 0; font-size: 32px; font-weight: 600; letter-spacing: 3px; font-family: Arial;">RHINOMETRIC</p>
    <p style="color: #94a3b8; margin: 8px 0 0 0; font-size: 14px; letter-spacing: 1px; font-family: Arial;">Enterprise Observability Platform</p>
</body>
</html>
