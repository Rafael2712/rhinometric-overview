version: '3.8'

# Global logging configuration for all services
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  license-server-v2:
    build:
      context: ./license-server-v2
      dockerfile: Dockerfile
    container_name: rhinometric-license-server-v2
    environment:
      DATABASE_URL: postgresql://rhinometric:${POSTGRES_PASSWORD:-rhinometric}@postgres:5432/rhinometric_licenses
      REDIS_URL: redis://:${REDIS_PASSWORD:-rhinometric}@redis:6379
      PYTHONUNBUFFERED: 1
      SMTP_HOST: smtp.zoho.eu
      SMTP_PORT: 465
      SMTP_USER: rafael.canelon@rhinometric.com
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: rafael.canelon@rhinometric.com
    ports:
    - 5000:5000
    volumes:
    - ${HOME}/rhinometric_data_v2.2/license-server/logs:/app/logs
    networks:
    - rhinometric_network_v22
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:5000/api/health
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
  license-ui:
    build:
      context: ./license-management-ui
      dockerfile: Dockerfile
    container_name: rhinometric-license-ui
    ports:
    - 8093:8092
    networks:
    - rhinometric_network_v22
    depends_on:
    - license-server-v2
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - wget --spider -q -O /dev/null http://localhost:8092/ || exit 0
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    restart: unless-stopped
  postgres:
    image: postgres:15.10-alpine
    container_name: rhinometric-postgres
    environment:
      POSTGRES_USER: rhinometric
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rhinometric}
      POSTGRES_DB: rhinometric
    ports:
    - 5432:5432
    volumes:
    - ${HOME}/rhinometric_data_v2.2/postgres:/var/lib/postgresql/data
    - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
    - rhinometric_network_v22
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U rhinometric
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
  redis:
    image: redis:7.2-alpine
    container_name: rhinometric-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-rhinometric} --maxmemory
      200mb --maxmemory-policy allkeys-lru
    ports:
    - 6379:6379
    volumes:
    - ${HOME}/rhinometric_data_v2.2/redis:/data
    networks:
    - rhinometric_network_v22
    healthcheck:
      test:
      - CMD
      - redis-cli
      - --raw
      - incr
      - ping
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    logging: *default-logging
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rhinometric-prometheus
    entrypoint: ["/entrypoint-licensed.sh"]
    environment:
      RHINOMETRIC_LICENSE_KEY: "${RHINOMETRIC_LICENSE_KEY:-}"
    ports:
    - 9090:9090
    volumes:
    - ./config/prometheus-v2.2.yml:/etc/prometheus/prometheus.yml:ro
    - ./config/rules:/etc/prometheus/rules:ro
    - prometheus-data:/prometheus
    - ./licenses:/opt/rhinometric/license:ro
    - ./security:/security:ro
    - ./entrypoint-prometheus-licensed.sh:/entrypoint-licensed.sh:ro
    networks:
    - rhinometric_network_v22
    depends_on:
      license-validator:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9090/-/healthy
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1536M
    logging: *default-logging
    restart: unless-stopped
  loki:
    image: grafana/loki:3.0.0
    container_name: rhinometric-loki
    user: "0"
    entrypoint: ["/entrypoint-licensed.sh"]
    environment:
      RHINOMETRIC_LICENSE_KEY: "${RHINOMETRIC_LICENSE_KEY:-}"
    ports:
    - 3100:3100
    volumes:
    - ./config/loki-config.yml:/etc/loki/loki-config.yml:ro
    - ${HOME}/rhinometric_data_v2.2/loki:/loki
    - ./licenses:/opt/rhinometric/license:ro
    - ./security:/security:ro
    - ./entrypoint-loki-licensed.sh:/entrypoint-licensed.sh:ro
    networks:
    - rhinometric_network_v22
    depends_on:
      license-validator:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:3100/ready
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    restart: unless-stopped
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rhinometric-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
    - ${HOME}/rhinometric_data_v2.2/jaeger:/badger
    ports:
    - 16686:16686  # Jaeger UI
    - 14317:4317   # OTLP gRPC (Jaeger interno en 4317, expuesto en 14317)
    - 14318:4318   # OTLP HTTP (Jaeger interno en 4318, expuesto en 14318)
    - 14268:14268  # Jaeger HTTP
    - 14250:14250  # Jaeger gRPC
    networks:
    - rhinometric_network_v22
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:16686
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
  grafana:
    image: grafana/grafana:10.4.0
    container_name: rhinometric-grafana
    entrypoint: ["/entrypoint-licensed.sh"]
    environment:
      RHINOMETRIC_LICENSE_KEY: "${RHINOMETRIC_LICENSE_KEY:-}"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://app.rhinometric.com
      GF_SERVER_DOMAIN: app.rhinometric.com
      GF_SERVER_ENFORCE_DOMAIN: 'false'
      GF_SERVER_ENABLE_GZIP: 'true'
      GF_INSTALL_PLUGINS: ''
      GF_SERVER_NAME: Rhinometric Observability Platform
      GF_BRANDING_TITLE: Rhinometric
      GF_BRANDING_FOOTER: Powered by Rhinometric - Trial Version (180 days)
      GF_BRANDING_FAVICON: public/img/fav32.png
      GF_NEWS_NEWS_FEED_ENABLED: 'false'
      GF_PATHS_PLUGINS: /var/lib/grafana/plugins
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: rhinometric-dashboard-builder-iframe,rhinometric-api-connector-iframe
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    ports:
    - 3000:3000
    volumes:
    - grafana-data:/var/lib/grafana
    - ./grafana/provisioning:/etc/grafana/provisioning:ro
    - ./grafana-plugins-simple/rhinometric-dashboard-builder:/var/lib/grafana/plugins/rhinometric-dashboard-builder-iframe:ro
    - ./grafana-plugins-simple/rhinometric-api-connector:/var/lib/grafana/plugins/rhinometric-api-connector-iframe:ro
    - ./grafana-branding:/branding:ro
    - ./grafana-branding/apply-branding.sh:/docker-entrypoint-initdb.d/apply-branding.sh:ro
    - ./licenses:/opt/rhinometric/license:ro
    - ./security:/security:ro
    - ./entrypoint-grafana-licensed.sh:/entrypoint-licensed.sh:ro
    networks:
    - rhinometric_network_v22
    depends_on:
    - prometheus
    - loki
    - jaeger
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:3000/api/health
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 800M
    logging: *default-logging
    restart: unless-stopped
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: rhinometric-otel-collector
    command: --config=/etc/otel-collector-config.yml
    volumes:
    - ./config/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
    - 4317:4317
    - 4318:4318
    networks:
    - rhinometric_network_v22
    depends_on:
    - prometheus
    - loki
    - jaeger
    healthcheck:
      test:
      - CMD
      - /otelcol-contrib
      - validate
      - --config=/etc/otel-collector-config.yml
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
    restart: unless-stopped
  api-proxy:
    build:
      context: ./api-proxy
      dockerfile: Dockerfile
    container_name: rhinometric-api-proxy
    environment:
      PORT: 8081
      PROMETHEUS_METRICS_ENABLED: 'true'
    ports:
    - 8081:8081
    volumes:
    - ./api-proxy/configs:/app/configs
    networks:
    - rhinometric_network_v22
    depends_on:
    - prometheus
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:8081/health
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    restart: unless-stopped
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rhinometric-alertmanager
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    ports:
    - 9093:9093
    volumes:
    - ../../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    - ../../alertmanager/templates:/etc/alertmanager/templates:ro
    - ${HOME}/rhinometric_data_v2.2/alertmanager:/alertmanager
    environment:
      # Slack integration (configure webhook URL)
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/YOUR/WEBHOOK/URL}
      # Email SMTP settings (Gmail example)
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-alerts@rhinometric.com}
      - SMTP_PASS=${SMTP_PASS:-changeme}
    networks:
    - rhinometric_network_v22
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9093/-/healthy
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
  promtail:
    image: grafana/promtail:3.0.0
    container_name: rhinometric-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
    - ./config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    - /var/log:/var/log:ro
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
    - rhinometric_network_v22
    depends_on:
    - loki
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test:
      - CMD
      - promtail
      - --version
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: rhinometric-node-exporter
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --path.rootfs=/rootfs
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
    - 9100:9100
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    networks:
    - rhinometric_network_v22
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9100/metrics
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: rhinometric-cadvisor
    ports:
    - 8080:8080
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:rw
    - /sys:/sys:ro
    - /var/lib/docker:/var/lib/docker:ro
    networks:
    - rhinometric_network_v22
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
    restart: unless-stopped
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: rhinometric-blackbox-exporter
    command:
    - --config.file=/etc/blackbox/config.yml
    ports:
    - 9115:9115
    volumes:
    - ./config/blackbox-config.yml:/etc/blackbox/config.yml:ro
    networks:
    - rhinometric_network_v22
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9115/-/healthy
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: rhinometric-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:rhinometric2024@rhinometric-postgres:5432/rhinometric_dev?sslmode=disable
    ports:
    - 9187:9187
    networks:
    - rhinometric_network_v22
    depends_on:
    - postgres
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9187/metrics
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
  rhinometric-veriverde:
    build:
      context: ./rhinometric-veriverde
      dockerfile: Dockerfile
    container_name: rhinometric-veriverde
    environment:
      VERIVERDE_PORT: 9200
      VERIVERDE_RENEWABLE_PERCENT: ${RENEWABLE_PERCENT:-0}
      CO2_FACTOR_KG_PER_KWH: ${CO2_FACTOR:-0.233}
    ports:
    - 9200:9200
    networks:
    - rhinometric_network_v22
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9200/health')
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
  rhinometric-ai-anomaly:
    build:
      context: ./rhinometric-ai-anomaly
      dockerfile: Dockerfile
    container_name: rhinometric-ai-anomaly
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      ALERTMANAGER_URL: http://alertmanager:9093
      GRAFANA_URL: https://grafana.rhinometric.com
      DOCS_BASE_URL: https://grafana.rhinometric.com
      CHECK_INTERVAL_SECONDS: 600  # Increased to 10min (was 5min) - SPAM reduction
      LOOKBACK_HOURS: 24
      LOG_LEVEL: INFO
      CONFIG_PATH: /app/config.yaml
      DB_PATH: /app/data/ai_anomaly.db
      BASELINE_REFRESH_INTERVAL: 1h
      BASELINE_EMA_ALPHA: "0.1"
      BASELINE_MIN_SAMPLES: "20"
    ports:
    - 8085:8085
    - 9091:9090
    volumes:
    - ${HOME}/rhinometric_data_v2.2/ai-anomaly/models:/app/models
    - ${HOME}/rhinometric_data_v2.2/ai-anomaly/data:/app/data
    - ./rhinometric-ai-anomaly/config.yaml:/app/config.yaml:ro
    networks:
    - rhinometric_network_v22
    depends_on:
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_started
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8085/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
  rhinometric-backup:
    build:
      context: ./rhinometric-backup
      dockerfile: Dockerfile
    container_name: rhinometric-backup
    environment:
      BACKUP_SCHEDULE: 0 2 * * *
      BACKUP_RETENTION_DAYS: 30
      BACKUP_COMPONENTS: prometheus,loki,jaeger,grafana
      RUN_IMMEDIATE: 'false'
    volumes:
    - ${HOME}/rhinometric_data_v2.2:/data:ro
    - ${HOME}/rhinometric_backups:/backups
    - ./scripts/rmetricctl:/usr/local/bin/rmetricctl:ro
    networks:
    - rhinometric_network_v22
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
  rhinometric-report-generator:
    build:
      context: ./rhinometric-report-generator
      dockerfile: Dockerfile
    container_name: rhinometric-report-generator
    environment:
      HOST: 0.0.0.0
      PORT: 8086
      LOG_LEVEL: INFO
      PROMETHEUS_URL: http://prometheus:9090
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: admin
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      SMTP_ENABLED: 'true'
      SMTP_HOST: ${SMTP_HOST:-smtp.zoho.eu}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USER:-rafael.canelon@rhinometric.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: 'true'
      SMTP_FROM: ${SMTP_FROM:-rafael.canelon@rhinometric.com}
      SMTP_FROM_NAME: RhinoMetric Reports
      REPORTS_DIR: /app/reports
      TEMP_DIR: /app/temp
      MAX_AGE_DAYS: 30
      MAX_SIZE_MB: 1000
    ports:
    - 8086:8086
    volumes:
    - ${HOME}/rhinometric_data_v2.2/reports:/app/reports
    - ${HOME}/rhinometric_data_v2.2/temp:/app/temp
    - ./rhinometric-report-generator/config.yaml:/app/config.yaml:ro
    networks:
    - rhinometric_network_v22
    depends_on:
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_started
      rhinometric-ai-anomaly:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import requests; requests.get('http://localhost:8086/health').raise_for_status()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
  license-monitor:
    build:
      context: ./license-monitor
      dockerfile: Dockerfile
    container_name: rhinometric-license-monitor
    environment:
      SMTP_HOST: ${SMTP_HOST:-smtp.zoho.eu}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-rafael.canelon@rhinometric.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-rafael.canelon@rhinometric.com}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-rafael.canelon@rhinometric.com}
      CHECK_INTERVAL: 43200
      TZ: ${TZ:-Europe/Madrid}
    volumes:
    - ./licenses:/opt/rhinometric/license:ro
    - ./security:/security:ro
    - ${HOME}/rhinometric_data_v2.2/license-monitor:/tmp
    - ${HOME}/rhinometric_data_v2.2/license-monitor/logs:/var/log/rhinometric
    networks:
    - rhinometric_network_v22
    healthcheck:
      test:
      - CMD
      - python3
      - -c
      - import os; exit(0 if os.path.exists('/tmp/rhinometric_alerts_sent.json') or
        os.path.exists('/opt/rhinometric/license/cliente.lic') else 1)
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
  dashboard-builder:
    build:
      context: ./dashboard-builder
      dockerfile: Dockerfile
    container_name: rhinometric-dashboard-builder
    ports:
    - 8001:8001
    environment:
    - POSTGRES_HOST=rhinometric-postgres
    - POSTGRES_PORT=5432
    - POSTGRES_DB=rhinometric
    - POSTGRES_USER=rhinometric
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rhinometric}
    - GRAFANA_URL=http://rhinometric-grafana:3000
    - GRAFANA_API_KEY=${GRAFANA_API_KEY:-}
    - JWT_SECRET=${JWT_SECRET:-rhinometric-secret-key}
    - LOG_LEVEL=info
    networks:
    - rhinometric_network_v22
    depends_on:
      postgres:
        condition: service_healthy
      grafana:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8001/')
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
    restart: unless-stopped
  api-connector:
    build:
      context: ./api-connector
      dockerfile: Dockerfile
    container_name: rhinometric-api-connector
    user: root
    ports:
    - 8000:8000
    volumes:
    - ./docker-compose-v2.5.0.yml:/config/docker-compose-v2.5.0.yml
    - ./config/prometheus-v2.2.yml:/config/prometheus-v2.2.yml
    - ./prometheus:/config/prometheus
    - ./grafana/dashboards:/config/grafana/dashboards
    - ./grafana/provisioning/dashboards/json:/config/grafana/provisioning/dashboards/json
    - /var/run/docker.sock:/var/run/docker.sock
    - .:/workspace
    environment:
    - DATABASE_URL=postgresql://rhinometric:${POSTGRES_PASSWORD:-rhinometric}@postgres:5432/rhinometric
    - REDIS_URL=redis://:${REDIS_PASSWORD:-rhinometric}@redis:6379
    - PROMETHEUS_URL=http://rhinometric-prometheus:9090
    - LOG_LEVEL=info
    - COMPOSE_FILE=/config/docker-compose-v2.5.0.yml
    - PROMETHEUS_CONFIG=/config/prometheus-v2.2.yml
    - GRAFANA_DASHBOARDS_DIR=/config/grafana/provisioning/dashboards/json
    - WORKSPACE_DIR=/workspace
    networks:
    - rhinometric_network_v22
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    restart: unless-stopped
