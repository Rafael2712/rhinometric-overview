  # ========================================
  # LICENSE VALIDATOR - Centralized License Validation
  # ========================================
  license-validator:
    build:
      context: ./license-validator
      dockerfile: Dockerfile
    container_name: rhinometric-license-validator
    ports:
      - "8099:8099"
    environment:
      LICENSE_SERVER_URL: "http://54.197.192.198:8090"
      CACHE_TTL_SECONDS: "300"
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

  # ========================================
  # RHINOMETRIC CONSOLE - Backend API Gateway
  # ========================================
  rhinometric-console-backend:
    build:
      context: ./rhinometric-console/backend
      dockerfile: Dockerfile
    container_name: rhinometric-console-backend
    ports:
      - "8105:8105"
    environment:
      # API Settings
      API_TITLE: "Rhinometric Console API Gateway"
      API_VERSION: "2.5.0"
      API_PREFIX: "/api"
      
      # Security
      SECRET_KEY: "${SECRET_KEY:-your-secret-key-change-in-production-min-32-chars}"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      
      # CORS
      CORS_ORIGINS: '["http://localhost:3002","http://rhinometric-console-frontend:3002"]'
      
      # External Services (Docker network DNS)
      PROMETHEUS_URL: "http://prometheus:9090"
      AI_ANOMALY_URL: "http://rhinometric-ai-anomaly:8085"
      LICENSE_VALIDATOR_URL: "http://license-validator:8099"
      RHINOMETRIC_LICENSE_KEY: "${RHINOMETRIC_LICENSE_KEY:-}"
      ALERTMANAGER_URL: "http://alertmanager:9093"
      GRAFANA_URL: "http://grafana:3000"
      LOKI_URL: "http://loki:3100"
      JAEGER_URL: "http://jaeger:16686"
      
      # Admin Credentials
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "rhinometric-console-backend"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
    
    volumes:
      - ${HOME}/rhinometric_data_v2.2/console-backend/logs:/app/logs
    
    networks:
      - rhinometric_network_v22
    
    depends_on:
      license-validator:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
      rhinometric-ai-anomaly:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8105/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    restart: unless-stopped

  # ========================================
  # RHINOMETRIC CONSOLE - Frontend UI
  # ========================================
  rhinometric-console-frontend:
    build:
      context: ./rhinometric-console/frontend
      dockerfile: Dockerfile
    container_name: rhinometric-console-frontend
    ports:
      - "3002:3002"
    
    networks:
      - rhinometric_network_v22
    
    depends_on:
      rhinometric-console-backend:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    
    restart: unless-stopped

networks:
  rhinometric_network_v22:
    driver: bridge
    ipam:
      config:
      - subnet: 172.22.0.0/16

volumes:
  grafana-data:
  prometheus-data:
