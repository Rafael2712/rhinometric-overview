<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhinometric License Server - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #1e3a8a;
            font-size: 24px;
        }
        
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #1e3a8a;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e40af;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .stat-card h3 {
            color: #6b7280;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #1e3a8a;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-item {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-item label {
            display: block;
            margin-bottom: 5px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }
        
        .filter-item input,
        .filter-item select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .table-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #f3f4f6;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            text-transform: uppercase;
        }
        
        td {
            padding: 15px;
            border-top: 1px solid #e5e7eb;
            font-size: 14px;
            color: #1f2937;
        }
        
        tbody tr:hover {
            background: #f9fafb;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-active {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-expired {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .badge-not-activated {
            background: #fef3c7;
            color: #92400e;
        }
        
        .badge-revoked {
            background: #e5e7eb;
            color: #1f2937;
        }
        
        .badge-trial {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge-demo {
            background: #fce7f3;
            color: #9f1239;
        }
        
        .badge-annual {
            background: #d1fae5;
            color: #065f46;
        }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        
        .login-container h2 {
            color: #1e3a8a;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #374151;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .error {
            color: #dc2626;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            max-width: 600px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
        }
        
        .modal h3 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .detail-item {
            padding: 10px;
            background: #f9fafb;
            border-radius: 6px;
        }
        
        .detail-item label {
            display: block;
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }
        
        .detail-item value {
            display: block;
            font-size: 14px;
            color: #1f2937;
            font-weight: 500;
        }
        
        .hidden {
            display: none;
        }
        
        .pagination {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <h2>🔐 Rhinometric License Server</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            <div id="loginError" class="error hidden"></div>
        </form>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboardScreen" class="container hidden">
        <div class="header">
            <h1>🔑 Rhinometric License Server</h1>
            <div class="user-info">
                <button class="btn btn-primary" onclick="openCreateModal()" style="margin-right: 15px;">+ New License</button>
                <span id="usernameDisplay"></span>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <!-- Populated by JS -->
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-row">
                <div class="filter-item">
                    <label>Search</label>
                    <input type="text" id="searchInput" placeholder="License key, organization, email...">
                </div>
                <div class="filter-item">
                    <label>Tier</label>
                    <select id="tierFilter">
                        <option value="">All Tiers</option>
                        <option value="demo_cloud">Demo Cloud</option>
                        <option value="trial">Trial</option>
                        <option value="annual_standard">Annual Standard</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>Status</label>
                    <select id="statusFilter">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="expired">Expired</option>
                        <option value="not_activated">Not Activated</option>
                        <option value="revoked">Revoked</option>
                    </select>
                </div>
                <div class="filter-item" style="display: flex; align-items: flex-end;">
                    <button class="btn btn-primary" onclick="loadLicenses()">Apply Filters</button>
                </div>
            </div>
        </div>

        <!-- Licenses Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>License Key</th>
                        <th>Tier</th>
                        <th>Status</th>
                        <th>Organization</th>
                        <th>Max Hosts</th>
                        <th>Expires</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="licensesTable">
                    <!-- Populated by JS -->
                </tbody>
            </table>
            <div class="pagination" id="pagination">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- License Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <h3>License Details</h3>
            <div id="detailContent"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="sendLicenseEmail()">📧 Send by Email</button>
                <button class="btn btn-danger" onclick="revokeLicense()">🚫 Revoke License</button>
                <button class="btn btn-secondary" onclick="closeDetailModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Create License Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <h3>Create New License</h3>
            <form id="createLicenseForm">
                <div class="form-group">
                    <label>License Type *</label>
                    <select id="createTier" required onchange="updateDuration()">
                        <option value="trial">Trial (14 days)</option>
                        <option value="annual_standard">Annual Standard (365 days)</option>
                        <option value="demo_cloud">Demo Cloud (4 hours)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="createEmail" required placeholder="customer@company.com">
                </div>
                <div class="form-group">
                    <label>Organization</label>
                    <input type="text" id="createOrganization" placeholder="Company Name Inc.">
                </div>
                <div class="form-group">
                    <label>Max Hosts</label>
                    <input type="number" id="createMaxHosts" value="5" min="1" max="1000">
                </div>
                <div class="form-group">
                    <label>Duration (days)</label>
                    <input type="number" id="createDuration" value="14" min="1" max="3650">
                </div>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Create License</button>
                    <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
                </div>
                <div id="createError" class="error hidden"></div>
                <div id="createSuccess" class="hidden" style="color: #10b981; margin-top: 10px;"></div>
            </form>
        </div>
    </div>

    <script>
        // 🌐 PRODUCTION SERVER CONFIG
        // Change this to use localhost for dev: window.location.origin
        const API_BASE = 'http://54.197.192.198:8090';
        
        let currentToken = null;
        let currentPage = 1;
        let currentLicenseKey = null;

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });

                if (!response.ok) {
                    throw new Error('Invalid credentials');
                }

                const data = await response.json();
                currentToken = data.access_token;
                localStorage.setItem('admin_token', currentToken);

                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                document.getElementById('usernameDisplay').textContent = username;

                loadStats();
                loadLicenses();
            } catch (error) {
                document.getElementById('loginError').textContent = error.message;
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        // Logout
        function logout() {
            localStorage.removeItem('admin_token');
            currentToken = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
        }

        // Check existing token
        window.addEventListener('load', () => {
            const token = localStorage.getItem('admin_token');
            if (token) {
                currentToken = token;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                loadStats();
                loadLicenses();
            }
        });

        // Load Stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/stats`, {
                    headers: {'Authorization': `Bearer ${currentToken}`}
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const stats = await response.json();

                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <h3>Total Licenses</h3>
                        <div class="value">${stats.total_licenses}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Active</h3>
                        <div class="value" style="color: #10b981;">${stats.active_licenses}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Trial Licenses</h3>
                        <div class="value" style="color: #3b82f6;">${stats.trial_count}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Expiring Soon</h3>
                        <div class="value" style="color: #f59e0b;">${stats.licenses_expiring_soon}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Demo Cloud</h3>
                        <div class="value">${stats.demo_cloud_count}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Annual Standard</h3>
                        <div class="value" style="color: #10b981;">${stats.annual_standard_count}</div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // Load Licenses
        async function loadLicenses(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const tier = document.getElementById('tierFilter').value;
            const status = document.getElementById('statusFilter').value;

            let url = `${API_BASE}/api/admin/licenses?page=${page}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (tier) url += `&tier=${tier}`;
            if (status) url += `&status=${status}`;

            try {
                const response = await fetch(url, {
                    headers: {'Authorization': `Bearer ${currentToken}`}
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const data = await response.json();

                const tbody = document.getElementById('licensesTable');
                tbody.innerHTML = data.licenses.map(license => `
                    <tr>
                        <td><code>${license.license_key}</code></td>
                        <td><span class="badge badge-${license.tier.replace('_', '-')}">${formatTier(license.tier)}</span></td>
                        <td><span class="badge badge-${license.license_status.replace('_', '-')}">${license.license_status.replace('_', ' ')}</span></td>
                        <td>${license.organization || license.customer_name}</td>
                        <td>${license.max_hosts}</td>
                        <td>${license.expires_at ? new Date(license.expires_at).toLocaleDateString() : 'N/A'}</td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="showDetail('${license.license_key}')">View</button>
                        </td>
                    </tr>
                `).join('');

                // Pagination
                const totalPages = Math.ceil(data.total / data.page_size);
                document.getElementById('pagination').innerHTML = `
                    <button class="btn btn-secondary btn-sm" ${page === 1 ? 'disabled' : ''} onclick="loadLicenses(${page - 1})">Previous</button>
                    <span>Page ${page} of ${totalPages}</span>
                    <button class="btn btn-secondary btn-sm" ${page === totalPages ? 'disabled' : ''} onclick="loadLicenses(${page + 1})">Next</button>
                `;
            } catch (error) {
                console.error('Failed to load licenses:', error);
            }
        }

        // Show License Detail
        async function showDetail(licenseKey) {
            currentLicenseKey = licenseKey;

            try {
                const response = await fetch(`${API_BASE}/api/admin/licenses/${licenseKey}`, {
                    headers: {'Authorization': `Bearer ${currentToken}`}
                });

                const license = await response.json();

                document.getElementById('detailContent').innerHTML = `
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>License Key</label>
                            <value><code>${license.license_key}</code></value>
                        </div>
                        <div class="detail-item">
                            <label>Status</label>
                            <value><span class="badge badge-${license.license_status}">${license.license_status.replace('_', ' ')}</span></value>
                        </div>
                        <div class="detail-item">
                            <label>Tier</label>
                            <value>${formatTier(license.tier)}</value>
                        </div>
                        <div class="detail-item">
                            <label>Max Hosts</label>
                            <value>${license.max_hosts}</value>
                        </div>
                        <div class="detail-item">
                            <label>Organization</label>
                            <value>${license.organization || 'N/A'}</value>
                        </div>
                        <div class="detail-item">
                            <label>Email</label>
                            <value>${license.organization_email || 'N/A'}</value>
                        </div>
                        <div class="detail-item">
                            <label>Issued At</label>
                            <value>${new Date(license.issued_at).toLocaleString()}</value>
                        </div>
                        <div class="detail-item">
                            <label>Activated At</label>
                            <value>${license.activated_at ? new Date(license.activated_at).toLocaleString() : 'Not activated'}</value>
                        </div>
                        <div class="detail-item">
                            <label>Expires At</label>
                            <value>${license.expires_at ? new Date(license.expires_at).toLocaleString() : 'N/A'}</value>
                        </div>
                        <div class="detail-item">
                            <label>Days Remaining</label>
                            <value>${license.days_remaining !== null ? license.days_remaining : 'N/A'}</value>
                        </div>
                        <div class="detail-item">
                            <label>Activation Count</label>
                            <value>${license.activation_count}</value>
                        </div>
                        <div class="detail-item">
                            <label>Last Check</label>
                            <value>${license.last_check ? new Date(license.last_check).toLocaleString() : 'Never'}</value>
                        </div>
                    </div>
                `;

                document.getElementById('detailModal').style.display = 'block';
            } catch (error) {
                alert('Failed to load license details');
            }
        }

        function closeDetailModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        // Send Email
        async function sendLicenseEmail() {
            if (!currentLicenseKey) return;

            if (!confirm('Send license by email?')) return;

            try {
                const response = await fetch(`${API_BASE}/api/admin/licenses/${currentLicenseKey}/send-email`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        license_key: currentLicenseKey,
                        include_instructions: true
                    })
                });

                const data = await response.json();
                alert(data.message || 'Email sent successfully');
            } catch (error) {
                alert('Failed to send email: ' + error.message);
            }
        }

        // Revoke License
        async function revokeLicense() {
            if (!currentLicenseKey) return;

            const reason = prompt('Enter revocation reason (optional):');
            if (reason === null) return;

            try {
                const response = await fetch(`${API_BASE}/api/admin/licenses/${currentLicenseKey}/revoke`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({reason})
                });

                const data = await response.json();
                alert(data.message);
                closeDetailModal();
                loadLicenses(currentPage);
                loadStats();
            } catch (error) {
                alert('Failed to revoke license: ' + error.message);
            }
        }

        function formatTier(tier) {
            const names = {
                'demo_cloud': 'Demo Cloud',
                'trial': 'Trial',
                'annual_standard': 'Annual Standard'
            };
            return names[tier] || tier;
        }

        // Create License Modal Functions
        function openCreateModal() {
            document.getElementById('createModal').style.display = 'block';
            document.getElementById('createLicenseForm').reset();
            document.getElementById('createError').classList.add('hidden');
            document.getElementById('createSuccess').classList.add('hidden');
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        function updateDuration() {
            const tier = document.getElementById('createTier').value;
            const durationInput = document.getElementById('createDuration');
            
            if (tier === 'trial') {
                durationInput.value = 14;
            } else if (tier === 'demo_cloud') {
                durationInput.value = 0.167; // 4 hours in days
            } else if (tier === 'annual_standard') {
                durationInput.value = 365;
            }
        }

        // Create License Form Submit
        document.addEventListener('DOMContentLoaded', function() {
            const createForm = document.getElementById('createLicenseForm');
            if (createForm) {
                createForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const tier = document.getElementById('createTier').value;
                    const email = document.getElementById('createEmail').value;
                    const organization = document.getElementById('createOrganization').value;
                    const maxHosts = parseInt(document.getElementById('createMaxHosts').value);
                    const duration = parseFloat(document.getElementById('createDuration').value);

                    try {
                        const response = await fetch(`${API_BASE}/api/admin/licenses/create`, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${currentToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                tier: tier,
                                email: email,
                                organization: organization,
                                max_hosts: maxHosts,
                                duration_days: duration
                            })
                        });

                        if (!response.ok) {
                            throw new Error('Failed to create license');
                        }

                        const data = await response.json();
                        
                        document.getElementById('createSuccess').textContent = `✅ License created: ${data.license_key}`;
                        document.getElementById('createSuccess').classList.remove('hidden');
                        document.getElementById('createError').classList.add('hidden');
                        
                        // Reload licenses table
                        setTimeout(() => {
                            closeCreateModal();
                            loadLicenses(currentPage);
                            loadStats();
                        }, 2000);
                        
                    } catch (error) {
                        document.getElementById('createError').textContent = error.message;
                        document.getElementById('createError').classList.remove('hidden');
                    }
                });
            }
        });

        // Close modal on outside click
        window.onclick = function(event) {
            const detailModal = document.getElementById('detailModal');
            const createModal = document.getElementById('createModal');
            
            if (event.target == detailModal) {
                closeDetailModal();
            }
            if (event.target == createModal) {
                closeCreateModal();
            }
        }
    </script>
</body>
</html>
