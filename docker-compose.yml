services:
  license-server-v2:
    build:
      context: ./license-server-v2
      dockerfile: Dockerfile
    container_name: rhinometric-license-server-v2
    environment:
      DATABASE_URL: postgresql://rhinometric:${POSTGRES_PASSWORD:-rhinometric}@postgres:5432/rhinometric_licenses
      REDIS_URL: redis://:${REDIS_PASSWORD:-rhinometric}@redis:6379
      PYTHONUNBUFFERED: 1
      SMTP_HOST: smtp.zoho.eu
      SMTP_PORT: 465
      SMTP_USER: rafael.canelon@rhinometric.com
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: rafael.canelon@rhinometric.com
    volumes:
    - ${HOME}/rhinometric_data_v2.5/license-server/logs:/app/logs
    networks:
    - rhinometric_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:5000/api/health
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
  license-ui:
    build:
      context: ./license-management-ui
      dockerfile: Dockerfile
    container_name: rhinometric-license-ui
    networks:
    - rhinometric_network
    depends_on:
    - license-server-v2
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - wget --spider -q -O /dev/null http://localhost:8092/ || exit 0
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    restart: unless-stopped
  postgres:
    image: postgres:15.10-alpine
    container_name: rhinometric-postgres
    environment:
      POSTGRES_USER: rhinometric
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rhinometric}
      POSTGRES_DB: rhinometric
    volumes:
    - ${HOME}/rhinometric_data_v2.5/postgres:/var/lib/postgresql/data
    - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
    - rhinometric_network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U rhinometric
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
  redis:
    image: redis:7.2-alpine
    container_name: rhinometric-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-rhinometric} --maxmemory
      200mb --maxmemory-policy allkeys-lru
    volumes:
    - ${HOME}/rhinometric_data_v2.5/redis:/data
    networks:
    - rhinometric_network
    healthcheck:
      test:
      - CMD
      - redis-cli
      - --raw
      - incr
      - ping
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rhinometric-prometheus
    volumes:
    - ./config/prometheus-v2.2.yml:/etc/prometheus/prometheus.yml:ro
    - ./prometheus/loadtest_targets.json:/etc/prometheus/loadtest_targets.json:ro
    - ./config/rules:/etc/prometheus/rules:ro
    - prometheus-data:/prometheus
    networks:
    - rhinometric_network
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=30d
    - --web.console.libraries=/usr/share/prometheus/console_libraries
    - --web.console.templates=/usr/share/prometheus/consoles
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9090/-/healthy
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 768M
    restart: unless-stopped
  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.99.0
    container_name: rhinometric-victoria-metrics
    command:
    - -storageDataPath=/victoria-metrics-data
    - -retentionPeriod=90d
    - -httpListenAddr=:8428
    - -promscrape.config=/etc/prometheus/prometheus.yml
    - -promscrape.config.strictParse=false
    - -promscrape.maxScrapeSize=16MB
    - -memory.allowedPercent=60
    - -search.maxQueryDuration=60s
    - -search.maxConcurrentRequests=8
    volumes:
    - victoria-metrics-data:/victoria-metrics-data
    - ./config/prometheus-v2.2.yml:/etc/prometheus/prometheus.yml:ro
    - ./config/loadtest_targets.json:/etc/prometheus/loadtest_targets.json:ro
    networks:
    - rhinometric_network
    ports:
    - "127.0.0.1:8428:8428"  # Locked to localhost
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "-T", "2", "http://localhost:8428/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 1024M
        reservations:
          memory: 512M
    restart: unless-stopped
  loki:
    image: grafana/loki:3.0.0
    container_name: rhinometric-loki
    user: '0'
    volumes:
    - ./config/loki-config.yml:/etc/loki/loki-config.yml:ro
    - ${HOME}/rhinometric_data_v2.5/loki:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
    - rhinometric_network
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:3100/ready
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
    restart: unless-stopped
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rhinometric-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: 'false'
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      BADGER_SPAN_STORE_TTL: 48h0m0s
      MEMORY_MAX_TRACES: 50000
    volumes:
    - ${HOME}/rhinometric_data_v2.5/jaeger:/badger
    networks:
    - rhinometric_network
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:16686
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 2048M
    restart: unless-stopped
  grafana:
    image: grafana/grafana:10.4.0
    container_name: rhinometric-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: http://46.225.231.117/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: app.rhinometric.com
      GF_SERVER_ENFORCE_DOMAIN: 'false'
      GF_SERVER_ENABLE_GZIP: 'true'
      GF_SERVER_NAME: Rhinometric Observability Platform
      GF_BRANDING_TITLE: Rhinometric
      GF_BRANDING_FOOTER: Powered by Rhinometric v2.5.0
      GF_NEWS_NEWS_FEED_ENABLED: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_HEADER_PROPERTY: "username"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_WHITELIST: "172.25.0.0/16"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
    - grafana-data:/var/lib/grafana
    - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
    - rhinometric_network
    depends_on:
    - prometheus
    - loki
    - jaeger
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:3000/api/health
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: rhinometric-otel-collector
    command: --config=/etc/otel-collector-config.yml
    volumes:
    - ./config/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    networks:
    - rhinometric_network
    depends_on:
    - prometheus
    - loki
    - jaeger
    healthcheck:
      test:
      - CMD
      - /otelcol-contrib
      - validate
      - --config=/etc/otel-collector-config.yml
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    restart: unless-stopped
  rhinometric-ai-anomaly:
    build:
      context: ./rhinometric-ai-anomaly
      dockerfile: Dockerfile
    container_name: rhinometric-ai-anomaly
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      ALERTMANAGER_URL: http://alertmanager:9093
      GRAFANA_URL: https://grafana.rhinometric.com
      CHECK_INTERVAL_SECONDS: 600
      LOOKBACK_HOURS: 24
      LOG_LEVEL: INFO
      CONFIG_PATH: /app/config.yaml
      DB_PATH: /app/data/ai_anomaly.db
    volumes:
    - ${HOME}/rhinometric_data_v2.5/ai-anomaly/models:/app/models
    - ${HOME}/rhinometric_data_v2.5/ai-anomaly/data:/app/data
    - ./rhinometric-ai-anomaly/config.yaml:/app/config.yaml:ro
    networks:
    - rhinometric_network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - "import urllib.request; urllib.request.urlopen('http://localhost:8085/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    restart: unless-stopped
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rhinometric-alertmanager
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    volumes:
    - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    - ./alertmanager/templates:/etc/alertmanager/templates:ro
    - ${HOME}/rhinometric_data_v2.5/alertmanager:/alertmanager
    environment:
      SMTP_HOST: ${SMTP_HOST:-smtp.zoho.eu}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-rafael.canelon@rhinometric.com}
      SMTP_PASS: ${SMTP_PASSWORD}
    networks:
    - rhinometric_network
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9093/-/healthy
      interval: 20s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: rhinometric-node-exporter
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --path.rootfs=/rootfs
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    networks:
    - rhinometric_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: rhinometric-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://rhinometric:${POSTGRES_PASSWORD:-rhinometric}@postgres:5432/rhinometric?sslmode=disable
    networks:
    - rhinometric_network
    depends_on:
    - postgres
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:9187/metrics
      interval: 20s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
  promtail:
    image: grafana/promtail:3.0.0
    container_name: rhinometric-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
    - ./config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    - /var/log:/var/log:ro
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
    - rhinometric_network
    depends_on:
    - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
    restart: unless-stopped
  rhinometric-console-backend:
    image: rhinometric-console-backend:v2.5.2-alerts
    build:
      context: ./rhinometric-console/backend
      dockerfile: Dockerfile
    container_name: rhinometric-console-backend
    environment:
      API_TITLE: Rhinometric Console API Gateway
      API_VERSION: 2.5.0
      API_PREFIX: /api
      SECRET_KEY: k3y_f1x3d_rh1n0m3tr1c_s3cur3_2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: '1440'
      CORS_ORIGINS: '["http://localhost:3002","http://rhinometric-console-frontend:3002","http://46.225.231.117","http://46.225.231.117:80","http://console.rhinometric.com","https://console.rhinometric.com","http://console-staging.rhinometric.com","https://console-staging.rhinometric.com"]'
      PROMETHEUS_URL: http://prometheus:9090
      AI_ANOMALY_URL: http://rhinometric-ai-anomaly:8085
      LICENSE_VALIDATOR_URL: http://license-server-v2:5000
      RHINO_LICENSE_VALIDATOR: rust
      ALERTMANAGER_URL: http://alertmanager:9093
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: ${GRAFANA_USER:-admin}
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      LOKI_URL: http://loki:3100
      JAEGER_URL: http://jaeger:16686
      DATABASE_URL: postgresql://rhinometric:${POSTGRES_PASSWORD}@postgres:5432/rhinometric
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: rhinometric-console-backend
      OTEL_TRACES_EXPORTER: otlp
      # Email Configuration (loaded from .env)
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-${MAIL_USERNAME}}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.zoho.eu}
      MAIL_STARTTLS: ${MAIL_STARTTLS:-True}
      MAIL_SSL_TLS: ${MAIL_SSL_TLS:-False}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Rhinometric Platform}
      # Frontend URL for password reset links
      # Public console URL — MUST match the domain of THIS environment
      RHINO_PUBLIC_CONSOLE_URL: https://console-staging.rhinometric.com
      RHINO_ENV: staging
      FRONTEND_URL: https://console-staging.rhinometric.com
    volumes:
    - ${HOME}/rhinometric_data_v2.5/console-backend/logs:/app/logs
    - ${HOME}/rhinometric_data_v2.5/console-backend/data:/app/data
    - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    - /usr/local/bin/rhino-lic:/usr/local/bin/rhino-lic:ro
    - /opt/rhinometric/license.key:/opt/rhinometric/license.key:ro
    networks:
    - rhinometric_network
    - rhinometric_network_v22
    depends_on:
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8105/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 2048M
    restart: unless-stopped
  rhinometric-console-frontend:
    image: rhinometric-console-frontend:v2.5.2-alerts
    build:
      context: ./rhinometric-console/frontend
      dockerfile: Dockerfile
    container_name: rhinometric-console-frontend
    # ports eliminados - nginx se comunica internamente por la red Docker
    # - "80:3002"
    networks:
    - rhinometric_network
    - rhinometric_network_v22
    depends_on:
      rhinometric-console-backend:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3002/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped
  
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: rhinometric-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - rhinometric_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: rhinometric-blackbox-exporter
    ports:
      - "127.0.0.1:9115:9115"  # Locked to localhost
    networks:
      - rhinometric_network
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: rhinometric-redis-exporter
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-rhinometric}
    networks:
      - rhinometric_network
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped

  # ============================================
  # NGINX Reverse Proxy (single public entry point)
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: rhinometric-nginx
    ports:
      - "80:80"  # Only public port
      # - "443:443"  # Uncomment when HTTPS is enabled
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # Uncomment for HTTPS
      - nginx-logs:/var/log/nginx
    networks:
      - rhinometric_network
      - rhinometric_network_v22
    depends_on:
      rhinometric-console-frontend:
        condition: service_healthy
      rhinometric-console-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    restart: unless-stopped

networks:
  rhinometric_network:
    driver: bridge
    ipam:
      config:
      - subnet: 172.25.0.0/16
  rhinometric_network_v22:
    driver: bridge
volumes:
  grafana-data:
  prometheus-data:
  victoria-metrics-data:
  nginx-logs: