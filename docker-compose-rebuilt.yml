# RHINOMETRIC TRIAL v2.0.0 - REBUILT & OPTIMIZED
# Stack de observabilidad completo con versiones fijas y healthchecks completos
# Configurado para Ubuntu WSL2 con bind mounts persistentes
# Compatible con Docker Compose v2+

services:
  # =================================
  # TIER 1: LICENCIAMIENTO (PRIMERO)
  # =================================
  
  license-server:
    build:
      context: ./licensing
      dockerfile: Dockerfile
    container_name: rhinometric-license-server
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-trial_rhinometric_2024}@postgres:5432/rhinometric_trial
      JWT_SECRET: ${JWT_SECRET:-trial_jwt_secret_change_this_in_production}
      LICENSE_DURATION_DAYS: 180
      FLASK_ENV: production
    volumes:
      - ./licenses:/app/licenses:ro
      - ${HOME}/rhinometric_data/license:/data
    networks:
      - rhinometric_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # =================================
  # TIER 2: BASE DE DATOS Y CACHE
  # =================================
  
  postgres:
    image: postgres:15.10-alpine
    container_name: rhinometric-postgres
    environment:
      POSTGRES_DB: rhinometric_trial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trial_rhinometric_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${HOME}/rhinometric_data/postgres:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - rhinometric_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rhinometric_trial"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      license-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  redis:
    image: redis:7.2-alpine
    container_name: rhinometric-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - ${HOME}/rhinometric_data/redis:/data
    networks:
      - rhinometric_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      license-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  # =================================
  # TIER 3: OBSERVABILIDAD CORE
  # =================================
  
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rhinometric-prometheus
    user: "nobody"
    volumes:
      - ./config/prometheus-saas.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/rules:/etc/prometheus/rules:ro
      - ${HOME}/rhinometric_data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-admin-api'
    depends_on:
      license-server:
        condition: service_healthy
    networks:
      - rhinometric_network
    ports:
      - "9090:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  loki:
    image: grafana/loki:3.0.0
    container_name: rhinometric-loki
    user: "10001"
    volumes:
      - ./config/loki-saas.yml:/etc/loki/local-config.yaml:ro
      - ${HOME}/rhinometric_data/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    depends_on:
      license-server:
        condition: service_healthy
    networks:
      - rhinometric_network
    ports:
      - "3100:3100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  tempo:
    image: grafana/tempo:2.6.0
    container_name: rhinometric-tempo
    user: "0:0"
    volumes:
      - ./config/tempo-saas.yml:/etc/tempo/tempo.yaml:ro
      - ${HOME}/rhinometric_data/tempo:/tmp/tempo
    command: -config.file=/etc/tempo/tempo.yaml
    depends_on:
      license-server:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - rhinometric_network
    ports:
      - "3200:3200"   # Tempo HTTP
      - "14268:14268" # Jaeger HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  telemetrygen:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.111.0
    container_name: rhinometric-telemetrygen
    command:
      - traces
      - --otlp-endpoint
      - tempo:4317
      - --otlp-insecure
      - --rate
      - "5"
      - --duration
      - "inf"
      - --workers
      - "3"
      - --service
      - "rhinometric-demo-service"
    depends_on:
      tempo:
        condition: service_healthy
    networks:
      - rhinometric_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "telemetrygen"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  grafana:
    image: grafana/grafana:10.4.0
    container_name: rhinometric-grafana
    environment:
      # Configuración básica
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin_trial_2024}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3000}
      
      # Configuración trial
      GF_INSTALL_PLUGINS: ""
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      
      # Limits para trial - MODO OSCURO HABILITADO
      GF_USERS_DEFAULT_THEME: dark
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      
      # Watermark trial
      GF_BRANDING_HEADER_LOGO: ""
      
      # Database
      GF_DATABASE_TYPE: sqlite3
      GF_DATABASE_PATH: /var/lib/grafana/grafana.db
    volumes:
      - ${HOME}/rhinometric_data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      license-server:
        condition: service_healthy
    networks:
      - rhinometric_network
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G

  # =================================
  # TIER 4: ALERTING
  # =================================
  
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rhinometric-alertmanager
    volumes:
      - ./config/alertmanager-saas.yml:/etc/alertmanager/alertmanager.yml:ro
      - ${HOME}/rhinometric_data/alertmanager:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    depends_on:
      license-server:
        condition: service_healthy
    networks:
      - rhinometric_network
    ports:
      - "9093:9093"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M

  # =================================
  # TIER 5: EXPORTERS (BÁSICOS)
  # =================================
  
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: rhinometric-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    networks:
      - rhinometric_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: rhinometric-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - rhinometric_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: rhinometric-blackbox-exporter
    networks:
      - rhinometric_network
    volumes:
      - ./config/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9115/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: rhinometric-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:${POSTGRES_PASSWORD:-trial_rhinometric_2024}@postgres:5432/rhinometric_trial?sslmode=disable
    networks:
      - rhinometric_network
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # =================================
  # TIER 6: LICENSE DASHBOARD
  # =================================
  
  license-dashboard:
    build:
      context: ./license-dashboard
      dockerfile: Dockerfile
    container_name: rhinometric-license-dashboard
    environment:
      LICENSE_DB_PATH: /data/licenses.db
      DASHBOARD_PORT: 8080
      DEBUG: "false"
    volumes:
      - ${HOME}/rhinometric_data/license:/data:ro
    depends_on:
      license-server:
        condition: service_healthy
    networks:
      - rhinometric_network
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  # =================================
  # TIER 7: REVERSE PROXY
  # =================================
  
  nginx:
    image: nginx:1.27-alpine
    container_name: rhinometric-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx-trial.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      grafana:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
      license-dashboard:
        condition: service_healthy
    networks:
      - rhinometric_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  promtail:
    image: grafana/promtail:3.0.0
    container_name: rhinometric-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rhinometric_network
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

# =================================
# NETWORKS
# =================================

networks:
  rhinometric_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =================================
# RECURSOS TOTALES TRIAL v2.0.0:
# CPU: ~5.5 vCPUs
# RAM: ~9.2 GB
# Retención: Prometheus 7d, Loki/Tempo 1d
# Duración: 180 días (6 meses)
# Servicios: 16 contenedores
# Healthchecks: 16/16 (100%)
# Bind Mounts: ~/rhinometric_data/*
# =================================
