global
    log stdout format raw local0 info
    maxconn 4096
    ssl-default-bind-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    option httplog

frontend prometheus_front
    bind *:443 ssl crt /etc/ssl/certs/server.pem
    bind *:9090
    
    # SSL redirect
    redirect scheme https code 301 if !{ ssl_fc }
    
    default_backend prometheus_back

backend prometheus_back
    balance roundrobin
    option httpchk
    http-check send meth GET uri /-/healthy
    http-check expect status 200
    server prometheus1 prometheus-1:9090 check
    server prometheus2 prometheus-2:9090 check

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
