events {
    worker_connections 1024;
}

http {
    # ═══════════════════════════════════════════════════════════════════
    # RHINOMETRIC v2.5.0 - CORE STACK NGINX CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════
    add_header X-Powered-By "Rhinometric Observability Platform v2.5.0" always;
    add_header X-Rhinometric-Version "Core-OnPremise" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; connect-src 'self' http: https:;";

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;  # Increased for report uploads

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ui:10m rate=100r/s;

    # DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;
    
    # Upstream definitions for better load balancing
    upstream console_frontend {
        server rhinometric-console-frontend:3002;
        keepalive 32;
    }
    
    upstream console_backend {
        server rhinometric-console-backend:8105;
        keepalive 32;
    }
    
    upstream grafana_backend {
        server rhinometric-grafana:3000;
        keepalive 32;
    }
    
    upstream license_server {
        server rhinometric-license-server-v2:5000;
        keepalive 16;
    }
    
    upstream jaeger_ui {
        server rhinometric-jaeger:16686;
        keepalive 16;
    }
    
    upstream prometheus_ui {
        server rhinometric-prometheus:9090;
        keepalive 16;
    }
    
    upstream ai_anomaly {
        server rhinometric-ai-anomaly:8085;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;
        
        # ═══════════════════════════════════════════════════════════════
        # RHINOMETRIC CONSOLE UI (PRINCIPAL - puerto 3002)
        # ═══════════════════════════════════════════════════════════════
        location / {
            limit_req zone=ui burst=50 nodelay;
            
            proxy_pass http://console_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_cache_bypass $http_upgrade;
            proxy_redirect off;
            proxy_buffering off;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # ═══════════════════════════════════════════════════════════════
        # CONSOLE BACKEND API
        # ═══════════════════════════════════════════════════════════════
        location /api/console {
            limit_req zone=api burst=20 nodelay;
            
            rewrite ^/api/console/(.*) /api/$1 break;
            
            proxy_pass http://console_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers for API
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # ═══════════════════════════════════════════════════════════════
        # GRAFANA
        # ═══════════════════════════════════════════════════════════════
        location /grafana/ {
            limit_req zone=ui burst=30 nodelay;
            
            rewrite ^/grafana/(.*)$ /$1 break;
            
            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffering off;
            proxy_redirect off;
        }
        
        # ═══════════════════════════════════════════════════════════════
        # LICENSE SERVER API
        # ═══════════════════════════════════════════════════════════════
        location /api/license {
            limit_req zone=api burst=10 nodelay;
            
            rewrite ^/api/license/(.*) /api/$1 break;
            
            proxy_pass http://license_server;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ═══════════════════════════════════════════════════════════════
        # JAEGER UI
        # ═══════════════════════════════════════════════════════════════
        location /jaeger/ {
            limit_req zone=ui burst=20 nodelay;
            
            rewrite ^/jaeger/(.*)$ /$1 break;
            
            proxy_pass http://jaeger_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ═══════════════════════════════════════════════════════════════
        # PROMETHEUS UI
        # ═══════════════════════════════════════════════════════════════
        location /prometheus/ {
            limit_req zone=ui burst=20 nodelay;
            
            rewrite ^/prometheus/(.*)$ /$1 break;
            
            proxy_pass http://prometheus_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ═══════════════════════════════════════════════════════════════
        # AI ANOMALY API
        # ═══════════════════════════════════════════════════════════════
        location /api/ai {
            limit_req zone=api burst=15 nodelay;
            
            rewrite ^/api/ai/(.*) /$1 break;
            
            proxy_pass http://ai_anomaly;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ═══════════════════════════════════════════════════════════════
        # NGINX STATUS & HEALTH
        # ═══════════════════════════════════════════════════════════════
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.22.0.0/16;  # Rhinometric network
            deny all;
        }
        
        location /metrics {
            stub_status on;
            access_log off;
            allow all;
        }
    }
}
