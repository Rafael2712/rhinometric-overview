version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════
  #  TIER 1: LICENSE & DATA LAYER
  # ═══════════════════════════════════════════════════════════════════════

  license-server-v2:
    build:
      context: ./license-server-v2
      dockerfile: Dockerfile
    container_name: rhinometric-license-server-v2
    environment:
      DATABASE_URL: postgresql://rhinometric:${POSTGRES_PASSWORD:-rhinometric}@postgres:5432/rhinometric
      REDIS_URL: redis://:${REDIS_PASSWORD:-rhinometric}@redis:6379
      PYTHONUNBUFFERED: 1
      SMTP_HOST: smtp.zoho.eu
      SMTP_PORT: 465
      SMTP_USER: rafael.canelon@rhinometric.com
      SMTP_PASSWORD: ${SMTP_PASSWORD:-271211Rc$}
      SMTP_FROM: rafael.canelon@rhinometric.com
    ports:
      - "5000:5000"
    volumes:
      - ${HOME}/rhinometric_data_v2.2/license-server/logs:/app/logs
    networks:
      - rhinometric_network_v22
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    restart: unless-stopped

  license-ui:
    build:
      context: ./license-management-ui
      dockerfile: Dockerfile
    container_name: rhinometric-license-ui
    ports:
      - "8092:8092"
    networks:
      - rhinometric_network_v22
    depends_on:
      - license-server-v2
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    restart: unless-stopped

  postgres:
    image: postgres:15.10-alpine
    container_name: rhinometric-postgres
    environment:
      POSTGRES_USER: rhinometric
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rhinometric}
      POSTGRES_DB: rhinometric
    ports:
      - "5432:5432"
    volumes:
      - ${HOME}/rhinometric_data_v2.2/postgres:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - rhinometric_network_v22
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: rhinometric-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-rhinometric} --maxmemory 200mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ${HOME}/rhinometric_data_v2.2/redis:/data
    networks:
      - rhinometric_network_v22
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
    restart: unless-stopped

  api-proxy:
    build:
      context: ./api-proxy
      dockerfile: Dockerfile
    container_name: rhinometric-api-proxy
    environment:
      PORT: 8081
      PROMETHEUS_METRICS_ENABLED: "true"
    ports:
      - "8081:8081"
    volumes:
      - ./api-proxy/configs:/app/configs
    networks:
      - rhinometric_network_v22
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  #  TIER 4: ALERTING
  # ═══════════════════════════════════════════════════════════════════════

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rhinometric-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ${HOME}/rhinometric_data_v2.2/alertmanager:/alertmanager
    networks:
      - rhinometric_network_v22
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  #  TIER 6: EXPORTERS
  # ═══════════════════════════════════════════════════════════════════════

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: rhinometric-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - rhinometric_network_v22
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  #  TIER 8: REVERSE PROXY
  # ═══════════════════════════════════════════════════════════════════════

  nginx:
    image: nginx:1.27-alpine
    container_name: rhinometric-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${HOME}/rhinometric_data_v2.2/nginx/logs:/var/log/nginx
    networks:
      - rhinometric_network_v22
    depends_on:
      grafana:
        condition: service_healthy
      license-server-v2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

networks:
  rhinometric_network_v22:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

