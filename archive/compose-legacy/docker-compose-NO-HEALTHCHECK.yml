#
#  Complete observability stack with NEW v2.2.0 features:
#  ✓ 4 Pre-loaded Enterprise Dashboards
#  ✓ VeriVerde Sustainability Monitoring (ESG compliance)
#  ✓ Automated Backup & Restore (rmetricctl CLI)
#  ✓ AI Anomaly Detection (on-premise, local ML)
#  ✓ Executive Report Generation (PDF/Email)
#  ✓ Full GDPR/ENS compliance
#  ✓ Multi-platform support (macOS/Linux/Windows)
#  ✓ Optimized resources (~4.0 vCPUs, ~7GB RAM)
#
#  New v2.2.0 Services:
#  - rhinometric-veriverde: Energy & sustainability metrics exporter
#  - rhinometric-ai-anomaly: ML-based anomaly detection
#  - rhinometric-backup: Automated backup scheduler
#  - rhinometric-report: Executive report generator
#
#  Installation:
#    ./install-v2.2.sh
#
#  Manual Start:
#    docker compose -f docker-compose-v2.2.0.yml up -d
#
#  Backup CLI:
#    ./scripts/rmetricctl backup
#    ./scripts/rmetricctl restore backup_20250130_120000
#    ./scripts/rmetricctl list
