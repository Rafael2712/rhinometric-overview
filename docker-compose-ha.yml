version: '3.8'

networks:
  monitoring:
    driver: bridge

services:
  redis-cache:
    image: redis:alpine
    container_name: redis-cache
    networks:
      - monitoring
    expose:
      - "6379"

  grafana1:
    image: grafana/grafana:latest
    container_name: grafana1
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_ROOT_URL=http://localhost:8080/
      - GF_SESSION_PROVIDER=redis
      - GF_SESSION_PROVIDER_CONFIG=addr=redis-cache:6379,db=0,pool_size=10,ssl=false
      - GF_SECURITY_COOKIE_SECURE=false
    networks:
      - monitoring
    volumes:
      - grafana1-data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - redis-cache

  grafana2:
    image: grafana/grafana:latest
    container_name: grafana2
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_ROOT_URL=http://localhost:8080/
      - GF_SESSION_PROVIDER=redis
      - GF_SESSION_PROVIDER_CONFIG=addr=redis-cache:6379,db=0,pool_size=10,ssl=false
      - GF_SECURITY_COOKIE_SECURE=false
    networks:
      - monitoring
    volumes:
      - grafana2-data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - redis-cache

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.5.3
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./data/loki:/loki
    user: "0:0"           # evita problemas de permisos en host
    restart: unless-stopped

  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - monitoring
    depends_on:
      - grafana1
      - grafana2

volumes:
  grafana1-data:
  grafana2-data:
  prometheus-data: