apiVersion: 1

providers:
  - name: 'Default'
    orgId: 1
    folder: 'Mi Proyecto'
    folderUid: 'mi-proyecto'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      
  - name: 'Enterprise Dashboards'
    orgId: 1
    folder: 'Enterprise'
    folderUid: 'enterprise'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards/enterprise