[server]
protocol = http
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
root_url = http://localhost:3001

[security]
admin_user = admin
admin_password = rhinometric2024
secret_key = rhinometric_secret_key_v2_4_0
allow_embedding = true
cookie_secure = false
cookie_samesite = lax

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false

[plugins]
allow_loading_unsigned_plugins = rhinometric-api-connector
enable_alpha = true

[log]
mode = console
level = info

[log.console]
level = info
format = json

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[alerting]
enabled = true

[unified_alerting]
enabled = true

[feature_toggles]
enable = panelTitleSearch topnav
