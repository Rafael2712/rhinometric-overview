<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhinometric Dashboard Builder</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .container { max-width: 900px; margin: 40px auto; padding: 20px; }
    .header { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 24px; }
    .header h1 { color: #1a1a1a; font-size: 28px; margin-bottom: 8px; }
    .header p { color: #666; }
    .card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
    .form-group select, .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .template-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-top: 12px; }
    .template-card { padding: 16px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .template-card:hover { border-color: #4CAF50; box-shadow: 0 4px 12px rgba(76,175,80,0.2); }
    .template-card.selected { border-color: #4CAF50; background: #f1f8f4; }
    .template-card h3 { color: #333; font-size: 16px; margin-bottom: 8px; }
    .template-card .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { background: #e3f2fd; color: #1976d2; padding: 4px 10px; border-radius: 12px; font-size: 12px; }
    .btn { padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #4CAF50; color: white; }
    .btn-primary:hover { background: #45a049; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .alert { padding: 16px; border-radius: 6px; margin-bottom: 20px; }
    .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    .result-link { color: #1976d2; text-decoration: none; font-weight: 600; }
    .result-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_URL = 'http://localhost:8001';

    function DashboardBuilder() {
      const [templates, setTemplates] = useState([]);
      const [selectedTemplate, setSelectedTemplate] = useState('');
      const [dashboardTitle, setDashboardTitle] = useState('');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch(`${API_URL}/templates`)
          .then(res => res.json())
          .then(data => setTemplates(data.templates))
          .catch(err => console.error('Error loading templates:', err));
      }, []);

      const handleCreate = async () => {
        if (!selectedTemplate) {
          setError('Selecciona un template primero');
          return;
        }

        setLoading(true);
        setError(null);
        setResult(null);

        try {
          const response = await fetch(`${API_URL}/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              template: selectedTemplate,
              title: dashboardTitle || undefined
            })
          });

          const data = await response.json();

          if (response.ok) {
            setResult(data);
            setDashboardTitle('');
          } else {
            setError(data.error || 'Error al crear dashboard');
          }
        } catch (err) {
          setError(`Error de conexiĂłn: ${err.message}`);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="container">
          <div className="header">
            <h1>íľ¨ Dashboard Builder</h1>
            <p>Crea dashboards de Grafana sin escribir YAML - Rhinometric v2.5.0</p>
          </div>

          {error && (
            <div className="alert alert-error">
              âťŚ {error}
            </div>
          )}

          {result && (
            <div className="alert alert-success">
              âś… Dashboard creado exitosamente!{' '}
              <a href={result.url} target="_blank" className="result-link">
                Abrir en Grafana â†’
              </a>
            </div>
          )}

          <div className="card">
            <div className="form-group">
              <label>1. Selecciona un Template</label>
              <div className="template-grid">
                {templates.map(t => (
                  <div
                    key={t.id}
                    className={`template-card ${selectedTemplate === t.id ? 'selected' : ''}`}
                    onClick={() => setSelectedTemplate(t.id)}
                  >
                    <h3>{t.title}</h3>
                    <div className="tags">
                      {t.tags.map(tag => (
                        <span key={tag} className="tag">{tag}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="form-group">
              <label>2. TĂ­tulo del Dashboard (opcional)</label>
              <input
                type="text"
                placeholder="Dejar vacĂ­o para usar el nombre del template"
                value={dashboardTitle}
                onChange={(e) => setDashboardTitle(e.target.value)}
              />
            </div>

            <button
              className="btn btn-primary"
              onClick={handleCreate}
              disabled={!selectedTemplate || loading}
            >
              {loading ? 'âŹł Creando...' : 'âś¨ Crear en Grafana'}
            </button>
          </div>

          <div className="card">
            <h3 style={{ marginBottom: '12px', color: '#333' }}>â„ąď¸Ź InformaciĂłn</h3>
            <ul style={{ color: '#666', lineHeight: '1.8', paddingLeft: '20px' }}>
              <li>Los dashboards se crean automĂˇticamente en Grafana</li>
              <li>No necesitas conocer PromQL ni escribir YAML</li>
              <li>Todos los templates usan el datasource Prometheus</li>
              <li>Los dashboards son editables despuĂ©s de crearlos</li>
            </ul>
          </div>
        </div>
      );
    }

    ReactDOM.render(<DashboardBuilder />, document.getElementById('root'));
  </script>
</body>
</html>
