  #   description: "95th percentile request latency"
  #   query: 'histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))'
  #   enabled: false
  #   priority: "high"
  #
  # - name: "http_latency_p99"
  #   display_name: "HTTP P99 Latency"
  #   description: "99th percentile request latency"
  #   query: 'histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))'
  #   enabled: false
  #   priority: "high"

  # ========================================================================
  # DATABASE METRICS DISABLED - Sin postgres-exporter en v2.5.0
  # TODO v2.6.0: Habilitar cuando se añada postgres-exporter y pg_stat_statements
  # ========================================================================
  # - name: "postgres_connections"
  #   display_name: "PostgreSQL Active Connections"
  #   description: "Number of active database connections (aggregated)"
  #   query: 'sum(pg_stat_activity_count{state="active"})'
  #   enabled: false
  #   priority: "medium"
  #
  # - name: "postgres_query_duration"
  #   display_name: "PostgreSQL Query Duration"
  #   description: "Average query execution time"
  #   query: 'rate(pg_stat_statements_total_time[5m]) / rate(pg_stat_statements_calls[5m])'
  #   enabled: false
