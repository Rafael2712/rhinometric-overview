  # ========================================================================
  # - name: "redis_memory_usage"
  #   display_name: "Redis Memory Usage"
  #   description: "Redis memory usage in MB"
  #   query: 'redis_memory_used_bytes / 1024 / 1024'
  #   enabled: false
  #   priority: "medium"
  #
  # - name: "redis_hit_rate"
  #   display_name: "Redis Cache Hit Rate"
  #   description: "Redis cache hit ratio"
  #   query: 'rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))'
  #   enabled: false
  #   priority: "high"

  # =====================================================================
  # EXTERNAL WEBSITE MONITORING - rhinometric.com (via blackbox-exporter)
  # Metrics generated by job: blackbox-web-rhinometric
  # =====================================================================
  - name: "rhinometric_website_availability"
    display_name: "Rhinometric Website Availability"
    description: "Website availability score (1=up, 0=down) for rhinometric.com"
    query: 'probe_success{job="blackbox-web-rhinometric", instance="https://www.rhinometric.com/"}'
    enabled: true
    priority: "critical"
    check_interval: 60
    models:
      - statistical
    thresholds:
      warning: 0.5
      critical: 0
    sensitivity: "high"
    alert_on_any_anomaly: true

  - name: "rhinometric_website_response_time"
    display_name: "Rhinometric Website Response Time"
    description: "HTTP response time for rhinometric.com (processing phase)"
    query: 'probe_http_duration_seconds{job="blackbox-web-rhinometric", instance="https://www.rhinometric.com/", phase="processing"}'
    enabled: true
    priority: "high"
    check_interval: 120
    models:
      - isolation_forest
      - statistical
    thresholds:
      warning: 1.0
      critical: 3.0
    sensitivity: "medium"

  - name: "rhinometric_website_ssl_expiry"
    display_name: "Rhinometric Website SSL Expiry"
    description: "Days until SSL certificate expiration for rhinometric.com"
    query: '(probe_ssl_earliest_cert_expiry{job="blackbox-web-rhinometric", instance="https://www.rhinometric.com/"} - time()) / 86400'
    enabled: true
    priority: "critical"
    check_interval: 3600
    models:
      - statistical
    thresholds:
      warning: 30
      critical: 7
    sensitivity: "high"
    alert_on_any_anomaly: true

  - name: "rhinometric_website_dns_time"
    display_name: "Rhinometric Website DNS Lookup"
    description: "DNS resolution time for rhinometric.com"
    query: 'probe_dns_lookup_time_seconds{job="blackbox-web-rhinometric", instance="https://www.rhinometric.com/"}'
    enabled: true
    priority: "medium"
    check_interval: 300
    models:
      - statistical
    thresholds:
      warning: 0.1
      critical: 0.5
    sensitivity: "medium"

  # Custom Application Metrics
  - name: "license_validation_rate"
    display_name: "License Validation Rate"
    description: "License validations per second"
    query: 'rate(rhinometric_license_validations_total[5m])'
    enabled: true
    priority: "medium"
    models:
      - isolation_forest
      - statistical
    sensitivity: "low"
    
  - name: "license_expired_count"
    display_name: "Expired Licenses"
    description: "Number of expired licenses detected"
    query: 'rhinometric_license_expired_total'
    enabled: true
    priority: "critical"
    models:
      - statistical
    thresholds:
      warning: 1
      critical: 5
    sensitivity: "high"
    alert_on_any_anomaly: true

# Model Persistence
persistence:
  enabled: true
  directory: "/app/models"
  save_interval: 3600  # Save every hour
  max_model_age: 604800  # 7 days in seconds
  compression: true

# Metrics Export (for this service)
metrics_export:
  enabled: true
  port: 9090
  path: "/metrics"
  prefix: "rhinometric_anomaly_"

# Logging Configuration
logging:
  level: "${LOG_LEVEL:INFO}"
  format: "json"
  output: "stdout"
  log_anomalies: true
  log_predictions: false  # Can be verbose
  
# Feature Flags
features:
  enable_api: true
  enable_web_ui: false  # Future feature
  enable_notifications: false
  enable_auto_remediation: false  # Future feature
  enable_model_explanation: true  # SHAP values for explainability
