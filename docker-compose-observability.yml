version: '3.8'

services:
  # Base de datos
  postgres:
    image: postgres:15
    container_name: rhinometric-postgres
    environment:
      POSTGRES_DB: rhinometric_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhinometric123
    ports:
      - "5432:5432"
    networks:
      - observability
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache
  redis:
    image: redis:6-alpine
    container_name: rhinometric-redis
    ports:
      - "6379:6379"
    networks:
      - observability
    volumes:
      - redis_data:/data

  # API
  api:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: rhinometric-api
    environment:
      NODE_ENV: development
      DB_HOST: rhinometric-postgres
      DB_NAME: rhinometric_saas
      DB_USER: postgres
      DB_PASSWORD: rhinometric123
    ports:
      - "3001:3001"
    networks:
      - observability
    depends_on:
      - postgres
      - redis

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: rhinometric-prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    volumes:
      - prometheus_data:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: rhinometric-grafana
    ports:
      - "3003:3000"
    networks:
      - observability
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Loki para logs
  loki:
    image: grafana/loki:latest
    container_name: rhinometric-loki
    ports:
      - "3100:3100"
    networks:
      - observability
    volumes:
      - loki_data:/loki
      - ./config/loki-config.yml:/etc/loki/local-config.yml:ro

networks:
  observability:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
