name: Security Scanning

on:
  schedule:
    - cron: '0 2 * * 1' # Every Monday at 2 AM
  push:
    branches: [ main, develop, staging ]
    paths-ignore:
      - wordpress-theme-rinometry/**
      - rhinometric-theme.zip
      - .github/workflows/build-zip.yml
      - .github/workflows/deploy-wordpress-theme.yml
  pull_request:
    branches: [ main, staging ]
    paths-ignore:
      - wordpress-theme-rinometry/**
      - rhinometric-theme.zip
      - .github/workflows/build-zip.yml
      - .github/workflows/deploy-wordpress-theme.yml

permissions:
  contents: read
  actions: read
  security-events: write

env:
  NODE_VERSION: '16.20.2'

jobs:
  # ===========================
  # DEPENDENCY VULNERABILITY SCANNING
  # ===========================
  dependency-scan:
    name: 🔍 Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: 📦 Install dependencies
      run: |
        cd backend
        npm ci

    - name: 🔐 Run npm audit
      run: |
        cd backend
        npm audit --audit-level=moderate --json > audit-report.json || true

    - name: 📊 Upload audit report
      uses: actions/upload-artifact@v4
      with:
        name: npm-audit-report
        path: backend/audit-report.json

    - name: 🚨 Check for critical vulnerabilities
      run: |
        cd backend
        CRITICAL=$(npm audit --audit-level=critical --json | jq '.metadata.vulnerabilities.critical // 0')
        HIGH=$(npm audit --audit-level=high --json | jq '.metadata.vulnerabilities.high // 0')
        
        echo "Critical vulnerabilities: $CRITICAL"
        echo "High vulnerabilities: $HIGH"
        
        if [ "$CRITICAL" -gt 0 ]; then
          echo "🚨 Critical vulnerabilities found!"
          exit 1
        fi

  # ===========================
  # SNYK SECURITY SCANNING
  # ===========================
  snyk-scan:
    name: 🐍 Snyk Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --file=backend/package.json --sarif-file-output=snyk.sarif

    - name: 📊 Upload Snyk results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('snyk.sarif') != ''
      with:
        sarif_file: snyk.sarif

  # ===========================
  # DOCKER IMAGE SECURITY SCANNING
  # ===========================
  docker-security-scan:
    name: 🐳 Docker Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Build Docker image for scanning
      run: |
        cd backend
        docker build -t rhinometric-security-scan:latest .

    - name: 🔍 Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'rhinometric-security-scan:latest'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: 📊 Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: 'trivy-results.sarif'

    - name: 🔍 Run Trivy config scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: './infrastructure'
        format: 'sarif'
        output: 'trivy-config-results.sarif'

    - name: 📊 Upload Trivy config scan results
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('trivy-config-results.sarif') != ''
      with:
        sarif_file: 'trivy-config-results.sarif'

  # ===========================
  # STATIC CODE ANALYSIS
  # ===========================
  codeql-analysis:
    name: 🔍 CodeQL Analysis
    runs-on: ubuntu-latest
    
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🔍 Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: +security-and-quality

    - name: 🏗️ Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: 📊 Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

  # ===========================
  # SECRETS SCANNING
  # ===========================
  secrets-scan:
    name: 🔐 Secrets Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🧭 Compute TruffleHog base/head
      id: trufflehog-vars
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
        else
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
        fi
        if [ -z "$BASE" ] || [ "$BASE" = "$HEAD" ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "head=$HEAD" >> $GITHUB_OUTPUT
        fi

    - name: 🔍 Run TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      if: steps.trufflehog-vars.outputs.skip != 'true'
      with:
        path: ./
        base: ${{ steps.trufflehog-vars.outputs.base }}
        head: ${{ steps.trufflehog-vars.outputs.head }}
        extra_args: --debug --only-verified

  # ===========================
  # SECURITY REPORT GENERATION
  # ===========================
  security-report:
    name: 📋 Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, snyk-scan, docker-security-scan, codeql-analysis, secrets-scan]
    if: always()
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📊 Download audit reports
      uses: actions/download-artifact@v4
      with:
        name: npm-audit-report
        path: ./reports/

    - name: 📋 Generate security summary
      run: |
        mkdir -p reports
        cat > reports/security-summary.md << EOF
        # Security Scan Summary
        
        **Date:** $(date)
        **Repository:** ${{ github.repository }}
        **Branch:** ${{ github.ref_name }}
        **Commit:** ${{ github.sha }}
        
        ## Scan Results
        
        | Scan Type | Status |
        |-----------|--------|
        | Dependency Scan | ${{ needs.dependency-scan.result }} |
        | Snyk Security | ${{ needs.snyk-scan.result }} |
        | Docker Security | ${{ needs.docker-security-scan.result }} |
        | CodeQL Analysis | ${{ needs.codeql-analysis.result }} |
        | Secrets Scan | ${{ needs.secrets-scan.result }} |
        
        ## Recommendations
        
        - Review all failed scans in the Security tab
        - Update dependencies with known vulnerabilities
        - Address any secrets detected in the codebase
        - Monitor security advisories for used packages
        
        ---
        Generated by GitHub Actions Security Pipeline
        EOF

    - name: 📊 Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: reports/

    - name: 📢 Notify on security issues
      if: needs.dependency-scan.result == 'failure' || needs.snyk-scan.result == 'failure'
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#security'
        text: |
          🚨 **Security vulnerabilities detected!**
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          
          Please review the security scan results and take appropriate action.
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}