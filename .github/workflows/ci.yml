name: Rhinometric CI/CD Pipeline

on:
  push:
    branches: [main, dev, release/*]
    paths-ignore:
      - wordpress-theme-rinometry/**
      - rhinometric-theme.zip
      - .github/workflows/build-zip.yml
      - .github/workflows/deploy-wordpress-theme.yml
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - wordpress-theme-rinometry/**
      - rhinometric-theme.zip
      - .github/workflows/build-zip.yml
      - .github/workflows/deploy-wordpress-theme.yml
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ============================================================================
  # Job 1: Validate Configuration Files
  # ============================================================================
  validate-config:
    name: Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Compose
        run: |
          docker compose version
          docker --version
      
      - name: Validate docker-compose files
        run: |
          echo "🔍 Validating docker-compose configurations..."
          cd rhinometric-trial-v2.1.0-universal
          docker compose -f docker-compose-v2.1.0.yml config > /dev/null
          echo "✅ docker-compose-v2.1.0.yml is valid"
      
      - name: Check required files exist
        run: |
          echo "🔍 Checking required files..."
          test -f rhinometric-trial-v2.1.0-universal/.env.example || (echo "❌ .env.example missing" && exit 1)
          test -f rhinometric-trial-v2.1.0-universal/docker-compose-v2.1.0.yml || (echo "❌ docker-compose missing" && exit 1)
          test -f rhinometric-trial-v2.1.0-universal/install.sh || (echo "❌ install.sh missing" && exit 1)
          test -f rhinometric-trial-v2.1.0-universal/install.ps1 || (echo "❌ install.ps1 missing" && exit 1)
          echo "✅ All required files present"
  
  # ============================================================================
  # Job 2: Terraform Validation
  # ============================================================================
  terraform-validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.0
      
      - name: Terraform Format Check
        run: |
          echo "🔍 Checking Terraform formatting..."
          cd terraform/oracle-cloud
          terraform fmt -check -recursive || (echo "⚠️  Run 'terraform fmt -recursive' to fix formatting" && exit 1)
          echo "✅ Terraform files are formatted correctly"
      
      - name: Terraform Init
        run: |
          echo "🔍 Initializing Terraform..."
          cd terraform/oracle-cloud
          terraform init -backend=false
          echo "✅ Terraform initialized"
      
      - name: Terraform Validate
        run: |
          echo "🔍 Validating Terraform configuration..."
          cd terraform/oracle-cloud
          terraform validate
          echo "✅ Terraform configuration is valid"
  
  # ============================================================================
  # Job 3: Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for exposed secrets
        run: |
          echo "🔍 Scanning for exposed credentials..."
          
          # Check for common secret patterns
          if grep -r "password.*=" --include="*.md" --include="*.yml" --include="*.yaml" --exclude-dir=".git" --exclude="*.example" | grep -v "CHANGE" | grep -v "your_" | grep -v "\${"; then
            echo "❌ Found potential exposed credentials in committed files"
            exit 1
          fi
          
          # Check for hardcoded IPs
          if grep -r "admin/admin" --include="*.md" --exclude-dir=".git" --exclude="*.backup*"; then
            echo "⚠️  Warning: Found 'admin/admin' references in documentation"
          fi
          
          echo "✅ No obvious credentials exposed"
      
      - name: Check .env files are gitignored
        run: |
          echo "🔍 Verifying .env files are gitignored..."
          if git ls-files | grep "^\.env$"; then
            echo "❌ .env file is tracked in git! This is a security risk."
            exit 1
          fi
          echo "✅ .env files are properly gitignored"
  
  # ============================================================================
  # Job 4: Build License Server Docker Image
  # ============================================================================
  build-license-server:
    name: Build License Server
    runs-on: ubuntu-latest
    needs: [validate-config]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build License Server v2
        run: |
          echo "🔨 Building License Server v2 image..."
          cd rhinometric-trial-v2.1.0-universal/license-server-v2
          docker build -t rhinometric-license-server-v2:test .
          echo "✅ License Server image built successfully"
      
      - name: Test License Server container
        run: |
          echo "🧪 Testing License Server container..."
          docker run --rm --name license-test -d -p 5000:5000 \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            rhinometric-license-server-v2:test
          
          sleep 5
          
          # Check if container is running
          if docker ps | grep license-test; then
            echo "✅ License Server container started"
            docker stop license-test
          else
            echo "❌ License Server container failed to start"
            docker logs license-test
            exit 1
          fi
  
  # ============================================================================
  # Job 5: Build License UI Docker Image
  # ============================================================================
  build-license-ui:
    name: Build License Management UI
    runs-on: ubuntu-latest
    needs: [validate-config]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build License UI
        run: |
          echo "🔨 Building License Management UI image..."
          cd license-management-ui
          docker build -t rhinometric-license-ui:test .
          echo "✅ License UI image built successfully"
  
  # ============================================================================
  # Job 6: Integration Test (Full Stack)
  # ============================================================================
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build-license-server, build-license-ui]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create test environment
        run: |
          echo "🔧 Setting up test environment..."
          cd rhinometric-trial-v2.1.0-universal
          cp .env.example .env
          
          # Set test credentials
          sed -i 's/POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=test_password_123/' .env
          sed -i 's/REDIS_PASSWORD=.*/REDIS_PASSWORD=test_redis_123/' .env
          sed -i 's/GRAFANA_PASSWORD=.*/GRAFANA_PASSWORD=test_grafana_123/' .env
      
      - name: Start minimal stack
        run: |
          echo "🚀 Starting minimal test stack..."
          cd rhinometric-trial-v2.1.0-universal
          
          # Start only essential services for testing
          docker compose -f docker-compose-v2.1.0.yml up -d postgres redis
          
          echo "⏳ Waiting for services to be ready..."
          sleep 30
      
      - name: Check service health
        run: |
          echo "🔍 Checking service health..."
          cd rhinometric-trial-v2.1.0-universal
          
          # Check PostgreSQL
          docker compose -f docker-compose-v2.1.0.yml exec -T postgres pg_isready -U rhinometric || (echo "❌ PostgreSQL not ready" && exit 1)
          echo "✅ PostgreSQL is healthy"
          
          # Check Redis
          docker compose -f docker-compose-v2.1.0.yml exec -T redis redis-cli ping || (echo "❌ Redis not ready" && exit 1)
          echo "✅ Redis is healthy"
      
      - name: Cleanup
        if: always()
        run: |
          cd rhinometric-trial-v2.1.0-universal
          docker compose -f docker-compose-v2.1.0.yml down -v
  
  # ============================================================================
  # Job 7: Documentation Check
  # ============================================================================
  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check README files exist
        run: |
          echo "📚 Checking documentation..."
          test -f README.md || (echo "❌ Root README.md missing" && exit 1)
          test -f rhinometric-trial-v2.1.0-universal/README.md || (echo "❌ Package README missing" && exit 1)
          test -f terraform/README.md || (echo "❌ Terraform README missing" && exit 1)
          test -f terraform/oracle-cloud/README.md || (echo "❌ Oracle Cloud README missing" && exit 1)
          echo "✅ All required documentation present"
      
      - name: Check for broken markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/markdown-link-check-config.json'
        continue-on-error: true
  
  # ============================================================================
  # Job 8: Generate Build Report
  # ============================================================================
  build-report:
    name: Generate Build Report
    runs-on: ubuntu-latest
    needs: [validate-config, terraform-validate, security-scan, build-license-server, build-license-ui, integration-test, documentation-check]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "# 🦏 Rhinometric CI/CD Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Config Validation: ${{ needs.validate-config.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform Validation: ${{ needs.terraform-validate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build License Server: ${{ needs.build-license-server.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build License UI: ${{ needs.build-license-ui.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Documentation Check: ${{ needs.documentation-check.result }}" >> $GITHUB_STEP_SUMMARY
