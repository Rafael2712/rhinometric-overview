name: Deploy WordPress Theme

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/build-zip.yml
      - .github/workflows/deploy-wordpress-theme.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate required secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          WP_PATH: ${{ secrets.WP_PATH }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_CLI_ENABLED: ${{ secrets.WP_CLI_ENABLED }}
        run: |
          set -euo pipefail
          missing=0
          for var in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY WP_PATH WP_URL WP_CLI_ENABLED; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing. Add them in GitHub Actions secrets and re-run." >&2
            exit 1
          fi

      - name: Build theme zip
        run: |
          if [ ! -d web/wordpress-theme-rinometry ]; then
            echo "Missing web/wordpress-theme-rinometry directory" >&2
            exit 1
          fi
            sudo apt-get update
            sudo apt-get install -y gettext
          msgfmt -o web/wordpress-theme-rinometry/languages/rinometry-es_ES.mo \
            web/wordpress-theme-rinometry/languages/rinometry-es_ES.po
          rm -f rhinometric-theme.zip
          (cd web && zip -r ../rhinometric-theme.zip wordpress-theme-rinometry)

      - name: Upload theme zip
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "rhinometric-theme.zip"
          target: "/tmp"

      - name: Deploy and activate theme
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "Starting deploy on host ${HOSTNAME}"
            WP_PATH="${{ secrets.WP_PATH }}"
            WP_URL="${{ secrets.WP_URL }}"
            THEME_DIR="$WP_PATH/wp-content/themes"
            TMP_DIR="/tmp/wordpress-theme-rinometry"
            THEME_SLUG="wordpress-theme-rinometry"

            echo "Validating paths and inputs"
            if [ ! -f /tmp/rhinometric-theme.zip ]; then
              echo "Theme zip not found at /tmp/rhinometric-theme.zip" >&2
              exit 1
            fi
            if [ ! -d "$WP_PATH" ]; then
              echo "WP_PATH not found: $WP_PATH" >&2
              exit 1
            fi
            if ! sudo -n true 2>/dev/null; then
              echo "Sudo is required for theme deployment on this host." >&2
              exit 1
            fi

            echo "Installing theme files"
            sudo mkdir -p "$THEME_DIR"
            rm -rf "$TMP_DIR"
            unzip -o /tmp/rhinometric-theme.zip -d /tmp
            if command -v rsync >/dev/null 2>&1; then
              echo "Syncing theme with rsync"
              sudo rsync -a --delete "$TMP_DIR/" "$THEME_DIR/$THEME_SLUG/"
            else
              echo "rsync not found; falling back to cp -R"
              sudo rm -rf "$THEME_DIR/$THEME_SLUG"
              sudo mkdir -p "$THEME_DIR/$THEME_SLUG"
              sudo cp -R "$TMP_DIR/"* "$THEME_DIR/$THEME_SLUG/"
            fi

            if [ "${{ secrets.WP_CLI_ENABLED }}" = "true" ]; then
              echo "Locating WP-CLI"
              WP_BIN=""
              if command -v wp >/dev/null 2>&1; then
                WP_BIN="wp"
              elif [ -x /opt/bitnami/wp-cli/bin/wp ]; then
                WP_BIN="/opt/bitnami/wp-cli/bin/wp"
              elif [ -f /opt/bitnami/wordpress/wp-cli.phar ]; then
                WP_BIN="php /opt/bitnami/wordpress/wp-cli.phar"
              fi

              if [ -z "$WP_BIN" ]; then
                echo "WP-CLI not found in PATH or Bitnami default locations." >&2
                exit 1
              fi

              echo "Activating theme: $THEME_SLUG"
              sudo $WP_BIN theme activate "$THEME_SLUG" --path="$WP_PATH" --url="$WP_URL"

              ensure_page() {
                local slug="$1"
                local title="$2"
                local id
                id=$(sudo $WP_BIN post list --post_type=page --name="$slug" --field=ID --path="$WP_PATH" --url="$WP_URL" || true)
                if [ -z "$id" ]; then
                  echo "Creating page: $slug"
                  sudo $WP_BIN post create --post_type=page --post_status=publish --post_title="$title" --post_name="$slug" --path="$WP_PATH" --url="$WP_URL" >/dev/null
                else
                  echo "Page exists: $slug (ID: $id)"
                  sudo $WP_BIN post update "$id" --post_status=publish --post_title="$title" --path="$WP_PATH" --url="$WP_URL" >/dev/null
                fi
              }

              echo "Ensuring required pages exist"
              ensure_page "download" "Download"
              ensure_page "request-demo" "Request a Demo"
              ensure_page "roadmap" "Roadmap"
              ensure_page "contact" "Contact"
              ensure_page "platform" "Platform"
              ensure_page "observability-suite" "Observability Suite"
            else
              echo "WP_CLI_ENABLED is not true; skipping theme activation and page creation." >&2
              exit 1
            fi