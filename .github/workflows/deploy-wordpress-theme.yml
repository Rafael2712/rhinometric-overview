name: Deploy WordPress Theme

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - rhinometric-theme.zip
      - wordpress-theme-rinometry/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate required secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          WP_PATH: ${{ secrets.WP_PATH }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_CLI_ENABLED: ${{ secrets.WP_CLI_ENABLED }}
        run: |
          set -euo pipefail
          missing=0
          for var in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY WP_PATH WP_URL WP_CLI_ENABLED; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing. Add them in GitHub Actions secrets and re-run." >&2
            exit 1
          fi

      - name: Build theme zip
        run: |
          if [ ! -d wordpress-theme-rinometry ]; then
            echo "Missing wordpress-theme-rinometry directory" >&2
            exit 1
          fi
            sudo apt-get update
            sudo apt-get install -y gettext
            msgfmt -o wordpress-theme-rinometry/languages/rinometry-es_ES.mo \
            wordpress-theme-rinometry/languages/rinometry-es_ES.po
          rm -f rhinometric-theme.zip
          zip -r rhinometric-theme.zip wordpress-theme-rinometry

      - name: Upload theme zip
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "rhinometric-theme.zip"
          target: "/tmp"

      - name: Deploy and activate theme
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            THEME_DIR="${{ secrets.WP_PATH }}/wp-content/themes"
            TMP_DIR="/tmp/rhinometric-theme"
            if [ ! -f /tmp/rhinometric-theme.zip ]; then
              echo "Theme zip not found at /tmp/rhinometric-theme.zip" >&2
              exit 1
            fi
            if [ ! -d "${{ secrets.WP_PATH }}" ]; then
              echo "WP_PATH not found: ${{ secrets.WP_PATH }}" >&2
              exit 1
            fi
            if ! sudo -n true 2>/dev/null; then
              echo "Sudo is required for theme deployment on this host." >&2
              exit 1
            fi
            sudo mkdir -p "$THEME_DIR"
            rm -rf "$TMP_DIR"
            unzip -o /tmp/rhinometric-theme.zip -d /tmp
            sudo rsync -a --delete "$TMP_DIR/wordpress-theme-rinometry/" "$THEME_DIR/wordpress-theme-rinometry/"
            if [ "${{ secrets.WP_CLI_ENABLED }}" = "true" ] && command -v wp >/dev/null 2>&1; then
              sudo wp theme activate wordpress-theme-rinometry --path="${{ secrets.WP_PATH }}" --url="${{ secrets.WP_URL }}"
            fi