name: Deploy WordPress Theme

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - rhinometric-theme.zip
      - wordpress-theme-rinometry/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            wordpress-theme-rinometry
          sparse-checkout-cone-mode: false

      - name: Build theme zip
        run: |
          if [ ! -d wordpress-theme-rinometry ]; then
            echo "Missing wordpress-theme-rinometry directory" >&2
            exit 1
          fi
          rm -f rhinometric-theme.zip
          zip -r rhinometric-theme.zip wordpress-theme-rinometry

      - name: Upload theme zip
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "rhinometric-theme.zip"
          target: "/tmp"

      - name: Deploy and activate theme
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            THEME_DIR="${{ secrets.WP_PATH }}/wp-content/themes"
            TMP_DIR="/tmp/rhinometric-theme"
            if [ ! -f /tmp/rhinometric-theme.zip ]; then
              echo "Theme zip not found at /tmp/rhinometric-theme.zip" >&2
              exit 1
            fi
            if [ ! -d "${{ secrets.WP_PATH }}" ]; then
              echo "WP_PATH not found: ${{ secrets.WP_PATH }}" >&2
              exit 1
            fi
            if ! sudo -n true 2>/dev/null; then
              echo "Sudo is required for theme deployment on this host." >&2
              exit 1
            fi
            sudo mkdir -p "$THEME_DIR"
            rm -rf "$TMP_DIR"
            unzip -o /tmp/rhinometric-theme.zip -d /tmp
            sudo rsync -a --delete "$TMP_DIR/wordpress-theme-rinometry/" "$THEME_DIR/wordpress-theme-rinometry/"
            if [ "${{ secrets.WP_CLI_ENABLED }}" = "true" ] && command -v wp >/dev/null 2>&1; then
              sudo wp theme activate wordpress-theme-rinometry --path="${{ secrets.WP_PATH }}" --url="${{ secrets.WP_URL }}"
            fi