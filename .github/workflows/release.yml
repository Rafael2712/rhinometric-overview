name: Release Management

on:
  push:
    tags: ['v*']
  release:
    types: [published]

env:
  NODE_VERSION: '16.20.2'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================
  # RELEASE VALIDATION
  # ===========================
  validate-release:
    name: 🔍 Validate Release
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🏷️ Validate tag format
      run: |
        if [[ $GITHUB_REF =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "✅ Valid semver tag: ${GITHUB_REF#refs/tags/}"
        else
          echo "❌ Invalid tag format. Use semver (v1.2.3)"
          exit 1
        fi

    - name: 📋 Extract release info
      id: release
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "major=$(echo $VERSION | cut -d. -f1 | sed 's/v//')" >> $GITHUB_OUTPUT
        echo "minor=$(echo $VERSION | cut -d. -f2)" >> $GITHUB_OUTPUT
        echo "patch=$(echo $VERSION | cut -d. -f3)" >> $GITHUB_OUTPUT

    outputs:
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}

  # ===========================
  # PRODUCTION RELEASE BUILD
  # ===========================
  build-release:
    name: 🏗️ Build Release
    runs-on: ubuntu-latest
    needs: validate-release
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🏗️ Build and push release image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate-release.outputs.version }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.validate-release.outputs.major }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NODE_VERSION=${{ env.NODE_VERSION }}
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}
          VERSION=${{ needs.validate-release.outputs.version }}

  # ===========================
  # PRODUCTION DEPLOYMENT
  # ===========================
  deploy-release:
    name: 🌟 Deploy Release
    runs-on: ubuntu-latest
    needs: [validate-release, build-release]
    environment: 
      name: production
      url: https://api.rhinometric.com
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🚀 Deploy to production
      run: |
        echo "🌟 Deploying release ${{ needs.validate-release.outputs.version }} to production"
        echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate-release.outputs.version }}"
        
        # SSH deployment to Oracle Cloud will be implemented here
        # mkdir -p ~/.ssh
        # echo "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        # chmod 600 ~/.ssh/id_rsa
        # ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts
        
        # ssh opc@${{ secrets.ORACLE_HOST }} << EOF
        #   cd ~/rhinometric/infrastructure
        #   ./deploy-multi-env.sh production ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate-release.outputs.version }}
        # EOF

    - name: 🔍 Post-deployment verification
      run: |
        echo "Running post-deployment verification for release ${{ needs.validate-release.outputs.version }}"
        # Add comprehensive production tests here

  # ===========================
  # RELEASE NOTIFICATIONS
  # ===========================
  notify-release:
    name: 📢 Notify Release
    runs-on: ubuntu-latest
    needs: [validate-release, deploy-release]
    if: always()
    
    steps:
    - name: 📢 Slack notification
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ needs.deploy-release.result }}
        channel: '#releases'
        text: |
          🚀 **PRODUCTION RELEASE** ${{ needs.deploy-release.result }}
          
          **Version:** ${{ needs.validate-release.outputs.version }}
          **Environment:** Production
          **URL:** https://api.rhinometric.com
          **Commit:** ${{ github.sha }}
          
          ${{ needs.deploy-release.result == 'success' && '✅ Release deployed successfully!' || '❌ Release deployment failed!' }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

    - name: 📧 Email notification
      uses: dawidd6/action-send-mail@v3
      if: failure()
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚨 Production Release Failed - ${{ needs.validate-release.outputs.version }}"
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: "Rhinometric CI/CD <noreply@rhinometric.com>"
        body: |
          Production release ${{ needs.validate-release.outputs.version }} has failed.
          
          Please check the GitHub Actions logs for more information.
          
          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}