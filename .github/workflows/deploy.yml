name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and Test
        run: |
          docker build -t rhinometric/platform:${{ github.sha }} .
          export LICENSE_SECRET='test'
          python3 tools/generate_license.py --customer Test --type trial
      - name: Push to Registry
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push rhinometric/platform:${{ github.sha }}
