name: Deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - wordpress-theme-rinometry/**
      - rhinometric-theme.zip
      - .github/workflows/build-zip.yml
      - .github/workflows/deploy-wordpress-theme.yml
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          docker build -t rhinometric/platform:${{ github.sha }} .
          export LICENSE_SECRET='test'
          python3 tools/generate_license.py --customer Test --type trial
      - name: Push to Registry
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push rhinometric/platform:${{ github.sha }}
