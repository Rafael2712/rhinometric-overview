name: Deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - wordpress-theme-rinometry/**
      - rhinometric-theme.zip
      - .github/workflows/build-zip.yml
      - .github/workflows/deploy-wordpress-theme.yml
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip Docker deployment
        run: echo "Docker steps removed; this workflow no longer builds or pushes images."
