name: Read SMTP Debug Logs

on:
  workflow_dispatch:

jobs:
  read-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Read server error logs for SMTP debug output
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "========== SEARCHING FOR SMTP DEBUG LOGS =========="
            echo ""

            echo "--- 1. Checking PHP error_log locations ---"
            for f in \
              /opt/bitnami/php/logs/php-fpm.log \
              /opt/bitnami/apache/logs/error_log \
              /opt/bitnami/apache2/logs/error_log \
              /var/log/apache2/error.log \
              /var/log/php-fpm/error.log \
              /var/log/php_errors.log \
              /tmp/php_errors.log; do
              if sudo test -f "$f"; then
                echo "FOUND: $f ($(sudo wc -l < "$f") lines)"
              fi
            done
            echo ""

            echo "--- 2. Checking WP debug.log ---"
            WP_PATH="${{ secrets.WP_PATH }}"
            if sudo test -f "$WP_PATH/wp-content/debug.log"; then
              echo "FOUND: $WP_PATH/wp-content/debug.log"
              echo "--- Last 200 lines of debug.log ---"
              sudo tail -200 "$WP_PATH/wp-content/debug.log"
            else
              echo "NOT FOUND: $WP_PATH/wp-content/debug.log"
            fi
            echo ""

            echo "--- 3. Searching all logs for SMTP/REQ-3B7A ---"
            for f in \
              /opt/bitnami/php/logs/php-fpm.log \
              /opt/bitnami/apache/logs/error_log \
              /opt/bitnami/apache2/logs/error_log \
              /var/log/apache2/error.log \
              /var/log/php-fpm/error.log \
              /var/log/php_errors.log \
              /tmp/php_errors.log \
              "$WP_PATH/wp-content/debug.log"; do
              if sudo test -f "$f"; then
                MATCHES=$(sudo grep -c -i "SMTP\|REQ-3B7A\|rhinometric_send_mail\|phpmailer\|wp_mail" "$f" 2>/dev/null || echo "0")
                if [ "$MATCHES" -gt 0 ]; then
                  echo ""
                  echo "===== $f ($MATCHES matches) ====="
                  sudo grep -i "SMTP\|REQ-3B7A\|rhinometric_send_mail\|phpmailer\|wp_mail\|mail()\|250 \|AUTH\|STARTTLS\|EHLO\|MAIL FROM\|RCPT TO\|DATA\|QUIT" "$f" | tail -100
                fi
              fi
            done
            echo ""

            echo "--- 4. Checking wp-config.php for WP_DEBUG settings ---"
            sudo grep -i "WP_DEBUG\|WP_DEBUG_LOG\|WP_DEBUG_DISPLAY" "$WP_PATH/wp-config.php" 2>/dev/null || echo "WP_DEBUG settings not found"
            echo ""

            echo "--- 5. Last 50 lines of ALL available log files ---"
            for f in \
              /opt/bitnami/php/logs/php-fpm.log \
              /opt/bitnami/apache/logs/error_log \
              /opt/bitnami/apache2/logs/error_log; do
              if sudo test -f "$f"; then
                echo ""
                echo "===== TAIL $f ====="
                sudo tail -50 "$f"
              fi
            done
