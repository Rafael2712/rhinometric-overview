name: Auto-create PR for feature branches

on:
  push:
    branches:
      - 'feat/**'

jobs:
  create_pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          # Use the built-in token provided to the runner for creating PRs.
          # Removed optional REPO_PAT fallback to avoid relying on repo secrets.
          token: ${{ github.token }}
          base: main
          branch: ${{ github.ref_name }}
          title: "Auto PR: ${{ github.ref_name }}"
          body: |
            Este PR fue creado automáticamente por el workflow.

            - Rama: ${{ github.ref_name }}
            - Evento: push

          labels: automated, auto-pr
