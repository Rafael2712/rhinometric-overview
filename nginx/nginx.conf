# Rhinometric Nginx Reverse Proxy Configuration
# Author: Rafael Canelón
# Date: 29 enero 2026
# Purpose: Single entry point for Rhinometric platform (on-prem ready)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Security headers (basic)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================
    # UPSTREAMS (Docker service names)
    # ============================================
    
    upstream console_frontend {
        server rhinometric-console-frontend:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream console_backend {
        server rhinometric-console-backend:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream grafana {
        server rhinometric-grafana:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ============================================
    # SERVER BLOCK - HTTP (port 80)
    # ============================================
    
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        # Server name: ANY (agnóstico - funciona con IP o hostname)
        server_name _;
        
        # Root location placeholder
        root /usr/share/nginx/html;
        index index.html;

        # ============================================
        # LOCATION: Console Frontend (/)
        # ============================================
        
        location / {
            proxy_pass http://console_frontend;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Websocket support (si el frontend lo necesita)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Console Backend API (/api/)
        # ============================================
        
        location /api/ {
            proxy_pass http://console_backend;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Importante: mantener /api/ en el path al backend
            # El backend espera rutas como /api/health, /api/alerts, etc.
            
            # Timeouts (APIs pueden tardar más)
            proxy_connect_timeout 90s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;
            
            # Buffering deshabilitado para streaming de respuestas
            proxy_buffering off;
            
            # Websocket support (para SSE o websockets del backend)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Grafana (/grafana/)
        # Con Basic Auth como capa adicional
        # ============================================
        
        location /grafana/ {
            # Basic Auth: proxy-admin (capa adicional antes de login de Grafana)
            auth_basic "Rhinometric Grafana Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            # Rewrite: eliminar /grafana del path antes de pasar a Grafana
            # Grafana servirá desde / pero nosotros lo exponemos en /grafana/
            rewrite ^/grafana/(.*) /$1 break;
            
            proxy_pass http://grafana;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Importante para Grafana con subpath
            proxy_set_header X-Forwarded-Prefix /grafana;
            
            # Timeouts (dashboards pueden tardar)
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Websocket support (Grafana live features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Grafana API (sin trailing slash)
        # Necesario para que JS de Grafana funcione correctamente
        # ============================================
        
        location /grafana {
            return 301 /grafana/;
        }

        # ============================================
        # LOCATION: Health check de Nginx
        # ============================================
        
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================
        # LOCATION: Deny access to hidden files
        # ============================================
        
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================================
        # ERROR PAGES
        # ============================================
        
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
