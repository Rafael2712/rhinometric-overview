# Rhinometric Nginx Reverse Proxy Configuration
# Author: Rafael Canelón
# Date: 29 enero 2026
# Purpose: Single entry point for Rhinometric platform (on-prem ready)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version
    server_tokens off;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # ============================================
    # RATE LIMITING ZONES
    # ============================================
    
    # API general: 30 req/segundo por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    
    # Login/auth: 5 req/minuto por IP (protección brute-force)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    
    # Grafana admin: 10 req/segundo por IP
    limit_req_zone $binary_remote_addr zone=grafana_limit:10m rate=10r/s;

    # ============================================
    # SECURITY HEADERS (Enhanced)
    # ============================================
    
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # HSTS (activate when HTTPS is enabled)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy (disable unnecessary features)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy (incremental — safe for SPA + Keycloak + Grafana embeds)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://console-staging.rhinometric.com; frame-src 'self' https://console-staging.rhinometric.com; frame-ancestors 'self';" always;

    # ============================================
    # UPSTREAMS (Docker service names)
    # ============================================
    
    upstream console_frontend {
        server rhinometric-console-frontend:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream console_backend {
        server rhinometric-console-backend:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream grafana {
        server rhinometric-grafana:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream keycloak {
        server rhinometric-keycloak:8080 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    # ============================================
    # SERVER BLOCK - HTTP (port 80)
    # ============================================
    
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        # Server name: console.rhinometric.com
        server_name console.rhinometric.com;
        
        # Root location placeholder
        root /usr/share/nginx/html;
        index index.html;

        # ============================================
        # LOCATION: Console Frontend (/)
        # ============================================
        
        location / {
            proxy_pass http://console_frontend;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Websocket support (si el frontend lo necesita)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Console Backend API (/api/)
        # ============================================
        

        # ============================================
        # BLOCK: Swagger / OpenAPI docs in production
        # ============================================

        location = /docs {
            return 404;
        }
        location = /redoc {
            return 404;
        }
        location = /openapi.json {
            return 404;
        }

        # ============================================
        # BLOCK: /metrics and /health from public access
        # Internal-only: used by Prometheus and Docker healthchecks
        # ============================================

        location = /metrics {
            return 404;
        }

        location = /health {
            return 404;
        }

        # ============================================
        # BLOCK: Internal service-to-service routes
        # ============================================

        location /internal/ {
            return 404;
        }

        location /api/internal/ {
            return 404;
        }

        # V2 Anomaly Engine API (additive — V1.1)
        location /api/v2/ {
            proxy_pass http://console_backend/api/v2/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 60s;
            proxy_connect_timeout 30s;
        }

        location /api/ {
            # Rate limiting: 30 req/s, burst de 10 adicionales
            limit_req zone=api_limit burst=10 nodelay;
            
            proxy_pass http://console_backend;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Importante: mantener /api/ en el path al backend
            # El backend espera rutas como /api/health, /api/alerts, etc.
            
            # Timeouts (APIs pueden tardar más)
            proxy_connect_timeout 90s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;
            
            # Buffering deshabilitado para streaming de respuestas
            proxy_buffering off;
            
            # Websocket support (para SSE o websockets del backend)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Auth endpoints con rate limiting estricto
        # ============================================
        
        location ~ ^/api/(login|register) {
            # Rate limiting: 5 req/minuto (protección brute-force)
            limit_req zone=auth_limit burst=2 nodelay;
            
            proxy_pass http://console_backend;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts cortos para auth
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ============================================
        # LOCATION: Keycloak OIDC (/auth/)
        # Proxy ONLY auth endpoints, NOT admin console
        # ============================================

        location /auth/ {
            # Rate limit Keycloak auth endpoints
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://keycloak/auth/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
            proxy_busy_buffers_size 16k;
        }

        # Block direct access to Keycloak admin console and admin REST API
        location ~ ^/auth/admin {
            default_type text/plain;
            return 403 "Forbidden\n";
        }

        # Block Keycloak health/metrics endpoints from public access
        location ~ ^/auth/(health|metrics) {
            return 404;
        }

        # Block Keycloak master realm from public access
        location ~ ^/auth/realms/master {
            return 404;
        }

        # ============================================
        # LOCATION: Grafana Panel Embeds (/grafana/d-solo/)
        # ALLOW — used by PanelRenderer iframes in Console
        # ============================================

        location /grafana/d-solo/ {
            proxy_pass http://grafana;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Auth proxy: embed as admin (read-only solo panels)
            proxy_set_header X-WEBAUTH-USER "admin";

            # Allow iframe embedding
            proxy_hide_header X-Frame-Options;

            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Grafana Static Assets (/grafana/public/)
        # ALLOW — JS/CSS/fonts required by embedded panels
        # ============================================

        location /grafana/public/ {
            proxy_pass http://grafana;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-WEBAUTH-USER "admin";

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ============================================
        # LOCATION: Grafana API (/grafana/api/)
        # ALLOW — data queries required by embedded panels
        # ============================================

        location /grafana/api/ {
            proxy_pass http://grafana;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-WEBAUTH-USER "admin";

            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # No buffering — streaming datasource responses
            proxy_buffering off;

            # Websocket support (Grafana live/query)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Grafana CATCH-ALL (/grafana/)
        # BLOCK — prevents direct public access to Grafana UI
        # Admins: use /admin/grafana/ (Basic Auth protected)
        # ============================================

        location /grafana/ {
            default_type text/plain;
            return 403 "Forbidden: Direct Grafana access is disabled. Use the Rhinometric Console.\n";
        }

        location = /grafana {
            default_type text/plain;
            return 403 "Forbidden: Direct Grafana access is disabled. Use the Rhinometric Console.\n";
        }

        # ============================================
        # LOCATION: Grafana Admin (/admin/grafana/)
        # Con Basic Auth como capa adicional
        # ============================================
        
        location /admin/grafana/ {
            # Rate limiting para admin
            limit_req zone=grafana_limit burst=20 nodelay;
            
            # Basic Auth: proxy-admin (capa adicional antes de login de Grafana)
            auth_basic "Rhinometric Grafana Admin Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            # NO rewrite - Grafana con SERVE_FROM_SUB_PATH maneja el path internamente
            proxy_pass http://grafana;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts (dashboards pueden tardar)
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Websocket support (Grafana live features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Grafana API (sin trailing slash)
        # Necesario para que JS de Grafana funcione correctamente
        # ============================================
        
        location /admin/grafana {
            return 301 /admin/grafana/;
        }

        # ============================================
        # LOCATION: BLOCK direct access to internal services
        # ============================================
        
        location ~ ^/(prometheus|loki|jaeger|alertmanager|tempo) {
            deny all;
            return 403;
        }

        # ============================================
        # LOCATION: Health check de Nginx
        # ============================================
        
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================
        # LOCATION: Deny access to hidden files
        # ============================================
        
        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================================
        # ERROR PAGES
        # ============================================
        
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ============================================
    # SERVER BLOCK - HTTPS (port 443) — READY TO ACTIVATE
    # Uncomment this block + the redirect above when SSL certs are available
    # ============================================
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name console.rhinometric.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # Enable HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... copy all location blocks from port 80 server above ...
    # }
    #
    # To activate HTTPS:
    # 1. Place certs at ./nginx/ssl/fullchain.pem and ./nginx/ssl/privkey.pem
    # 2. Add "443:443" to docker-compose-nginx.yml ports
    # 3. Add "./nginx/ssl:/etc/nginx/ssl:ro" to volumes
    # 4. Uncomment the HTTPS server block above
    # 5. Add redirect in port 80 server: return 301 https://$host$request_uri;
    # 6. docker-compose -f docker-compose-nginx.yml up -d
}
