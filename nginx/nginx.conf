# Rhinometric Nginx Reverse Proxy Configuration
# Author: Rafael Canelón
# Date: 29 enero 2026
# Purpose: Single entry point for Rhinometric platform (on-prem ready)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # ============================================
    # RATE LIMITING ZONES
    # ============================================
    
    # API general: 30 req/segundo por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    
    # Login/auth: 5 req/minuto por IP (protección brute-force)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    
    # Grafana admin: 10 req/segundo por IP
    limit_req_zone $binary_remote_addr zone=grafana_limit:10m rate=10r/s;

    # ============================================
    # SECURITY HEADERS (Enhanced)
    # ============================================
    
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy (disable unnecessary features)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy (ajustar según necesidades)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

    # ============================================
    # UPSTREAMS (Docker service names)
    # ============================================
    
    upstream console_frontend {
        server rhinometric-console-frontend:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream console_backend {
        server rhinometric-console-backend:8105 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream grafana {
        server rhinometric-grafana:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ============================================
    # SERVER BLOCK - HTTP (port 80)
    # ============================================
    
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        # Server name: ANY (agnóstico - funciona con IP o hostname)
        server_name _;
        
        # Root location placeholder
        root /usr/share/nginx/html;
        index index.html;

        # ============================================
        # LOCATION: Console Frontend (/)
        # ============================================
        
        location / {
            proxy_pass http://console_frontend;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Websocket support (si el frontend lo necesita)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Console Backend API (/api/)
        # ============================================
        
        location /api/ {
            # Rate limiting: 30 req/s, burst de 10 adicionales
            limit_req zone=api_limit burst=10 nodelay;
            
            proxy_pass http://console_backend;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Importante: mantener /api/ en el path al backend
            # El backend espera rutas como /api/health, /api/alerts, etc.
            
            # Timeouts (APIs pueden tardar más)
            proxy_connect_timeout 90s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;
            
            # Buffering deshabilitado para streaming de respuestas
            proxy_buffering off;
            
            # Websocket support (para SSE o websockets del backend)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Auth endpoints con rate limiting estricto
        # ============================================
        
        location ~ ^/api/(login|auth|register) {
            # Rate limiting: 5 req/minuto (protección brute-force)
            limit_req zone=auth_limit burst=2 nodelay;
            
            proxy_pass http://console_backend;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts cortos para auth
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ============================================
        # LOCATION: Grafana Embed for Console (/grafana/)
        # Auth Proxy mode - auto-sign-in as viewer
        # ============================================
        
        location /grafana/ {
            # Strip /grafana prefix when proxying to Grafana
            rewrite ^/grafana/(.*) /$1 break;
            
            proxy_pass http://grafana;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # AUTH PROXY: Inject user header - Grafana will trust this
            proxy_set_header X-WEBAUTH-USER "viewer";
            
            # Remove X-Frame-Options to allow embedding
            proxy_hide_header X-Frame-Options;
            
            # Timeouts (dashboards pueden tardar)
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Websocket support (Grafana live features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Grafana Admin (/admin/grafana/)
        # Con Basic Auth como capa adicional
        # ============================================
        
        location /admin/grafana/ {
            # Rate limiting para admin
            limit_req zone=grafana_limit burst=20 nodelay;
            
            # Basic Auth: proxy-admin (capa adicional antes de login de Grafana)
            auth_basic "Rhinometric Grafana Admin Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            # NO rewrite - Grafana con SERVE_FROM_SUB_PATH maneja el path internamente
            proxy_pass http://grafana;
            
            # Headers necesarios
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts (dashboards pueden tardar)
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Websocket support (Grafana live features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # LOCATION: Grafana API (sin trailing slash)
        # Necesario para que JS de Grafana funcione correctamente
        # ============================================
        
        location /admin/grafana {
            return 301 /admin/grafana/;
        }

        # ============================================
        # LOCATION: BLOCK direct access to internal services
        # ============================================
        
        location ~ ^/(prometheus|loki|jaeger|alertmanager|tempo) {
            deny all;
            return 403;
        }

        # ============================================
        # LOCATION: Health check de Nginx
        # ============================================
        
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================
        # LOCATION: Deny access to hidden files
        # ============================================
        
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================================
        # ERROR PAGES
        # ============================================
        
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
