version: '3.8'

# ============================================================================
# RHINOMETRIC v2.5.0 - CORE ON-PREMISE STACK
# ============================================================================
# Stack mínimo vendible para producción
# Incluye: Observabilidad + IA + Console UI (puerto 3002) + Licencias + Backups
# Excluye: Webhook collectors, database collectors de demo
# ============================================================================

services:
  # ========================================
  # DATABASES & CACHE
  # ========================================
  postgres:
    image: postgres:15.10-alpine
    container_name: rhinometric-postgres
    environment:
      POSTGRES_USER: rhinometric
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rhinometric}
      POSTGRES_DB: rhinometric
    ports:
      - "5432:5432"
    volumes:
      - ${HOME}/rhinometric_data_v2.2/postgres:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhinometric"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: rhinometric-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-rhinometric} --maxmemory 200mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - ${HOME}/rhinometric_data_v2.2/redis:/data
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

  # ========================================
  # LICENSE MANAGEMENT (ON-PREMISE)
  # ========================================
  license-server-v2:
    build:
      context: ./license-server-v2
      dockerfile: Dockerfile
    container_name: rhinometric-license-server-v2
    environment:
      DATABASE_URL: postgresql://rhinometric:${POSTGRES_PASSWORD:-rhinometric}@postgres:5432/rhinometric_licenses
      REDIS_URL: redis://:${REDIS_PASSWORD:-rhinometric}@redis:6379
      PYTHONUNBUFFERED: "1"
      SMTP_HOST: smtp.zoho.eu
      SMTP_PORT: "465"
      SMTP_USER: rafael.canelon@rhinometric.com
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: rafael.canelon@rhinometric.com
    ports:
      - "5000:5000"
    volumes:
      - ${HOME}/rhinometric_data_v2.2/license-server/logs:/app/logs
    networks:
      - rhinometric_network_v22
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    restart: unless-stopped

  # ========================================
  # OBSERVABILITY - CORE COMPONENTS
  # ========================================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rhinometric-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus-v2.2.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
      - ./licenses:/opt/rhinometric/license:ro
      - ./security:/security:ro
      - ./entrypoint-prometheus-licensed.sh:/entrypoint-licensed.sh:ro
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1536M
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: rhinometric-loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ${HOME}/rhinometric_data_v2.2/loki:/loki
      - ./licenses:/opt/rhinometric/license:ro
      - ./security:/security:ro
      - ./entrypoint-loki-licensed.sh:/entrypoint-licensed.sh:ro
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rhinometric-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "true"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - ${HOME}/rhinometric_data_v2.2/jaeger:/badger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14317:4317"   # OTLP gRPC
      - "14318:4318"   # OTLP HTTP
      - "14268:14268"  # Jaeger HTTP
      - "14250:14250"  # Jaeger gRPC
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: rhinometric-blackbox-exporter
    volumes:
      - ./config/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9115/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: rhinometric-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      # CRITICAL: ROOT_URL must be empty or http://rhinometric-grafana:3000 for internal access
      GF_SERVER_ROOT_URL: ""
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_SERVER_DOMAIN: 89.167.6.43
      GF_SERVER_ENFORCE_DOMAIN: "false"
      GF_SERVER_ENABLE_GZIP: "true"
      GF_INSTALL_PLUGINS: ""
      GF_SERVER_NAME: Rhinometric Observability Platform
      GF_BRANDING_TITLE: Rhinometric
      GF_BRANDING_FOOTER: Powered by Rhinometric - Trial Version (180 days)
      GF_BRANDING_FAVICON: public/img/fav32.png
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_PATHS_PLUGINS: /var/lib/grafana/plugins
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: rhinometric-dashboard-builder-iframe,rhinometric-api-connector-iframe
      # Anonymous access with ADMIN role for testing
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: Main Org.
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Security settings for embedding
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_SECURITY_COOKIE_SECURE: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana-plugins-simple/rhinometric-dashboard-builder:/var/lib/grafana/plugins/rhinometric-dashboard-builder-iframe:ro
      - ./grafana-plugins-simple/rhinometric-api-connector:/var/lib/grafana/plugins/rhinometric-api-connector-iframe:ro
      - ./grafana-branding:/branding:ro
      - ./grafana-branding/apply-branding.sh:/docker-entrypoint-initdb.d/apply-branding.sh:ro
      - ./licenses:/opt/rhinometric/license:ro
      - ./security:/security:ro
      - ./entrypoint-grafana-licensed.sh:/entrypoint-licensed.sh:ro
    networks:
      - rhinometric_network_v22
    depends_on:
      - prometheus
      - loki
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 800M
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: rhinometric-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./config/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - rhinometric_network_v22
    depends_on:
      - prometheus
      - loki
      - jaeger
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otel-collector-config.yml"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: rhinometric-promtail
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rhinometric_network_v22
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "promtail", "--version"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rhinometric-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - ${HOME}/rhinometric_data_v2.2/alertmanager:/alertmanager
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/YOUR/WEBHOOK/URL}
      SMTP_HOST: ${SMTP_HOST:-smtp.zoho.eu}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-rafael.canelon@rhinometric.com}
      SMTP_PASS: ${SMTP_PASSWORD}
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

  # ========================================
  # EXPORTERS - SYSTEM METRICS
  # ========================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: rhinometric-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - rhinometric_network_v22
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: rhinometric-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - rhinometric_network_v22
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
    restart: unless-stopped

  # ========================================
  # AI ANOMALY DETECTION
  # ========================================
  rhinometric-ai-anomaly:
    build:
      context: ./rhinometric-ai-anomaly
      dockerfile: Dockerfile
    container_name: rhinometric-ai-anomaly
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      ALERTMANAGER_URL: http://alertmanager:9093
      GRAFANA_URL: https://grafana.rhinometric.com
      DOCS_BASE_URL: https://grafana.rhinometric.com
      CHECK_INTERVAL_SECONDS: "600"
      LOOKBACK_HOURS: "24"
      LOG_LEVEL: INFO
      CONFIG_PATH: /app/config.yaml
      DB_PATH: /app/data/ai_anomaly.db
      BASELINE_REFRESH_INTERVAL: 1h
      BASELINE_EMA_ALPHA: "0.1"
      BASELINE_MIN_SAMPLES: "20"
    ports:
      - "8085:8085"
      - "9091:9090"
    volumes:
      - ${HOME}/rhinometric_data_v2.2/ai-anomaly/models:/app/models
      - ${HOME}/rhinometric_data_v2.2/ai-anomaly/data:/app/data
      - ./rhinometric-ai-anomaly/config.yaml:/app/config.yaml:ro
    networks:
      - rhinometric_network_v22
    depends_on:
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

  # ========================================
  # RHINOMETRIC CONSOLE - UI PRINCIPAL (puerto 3002)
  # ========================================
  rhinometric-console-backend:
    build:
      context: ./rhinometric-console/backend
      dockerfile: Dockerfile
    container_name: rhinometric-console-backend
    ports:
      - "8105:8105"
    environment:
      API_TITLE: "Rhinometric Console API Gateway"
      API_VERSION: "2.5.0"
      API_PREFIX: "/api"
      SECRET_KEY: "${SECRET_KEY:-your-secret-key-change-in-production-min-32-chars}"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      CORS_ORIGINS: '["http://localhost:3002","http://rhinometric-console-frontend:3002"]'
      PROMETHEUS_URL: "http://prometheus:9090"
      AI_ANOMALY_URL: "http://rhinometric-ai-anomaly:8085"
      LICENSE_VALIDATOR_URL: "http://54.197.192.198:5000"
      RHINOMETRIC_LICENSE_KEY: "DC67oXWd93slMMKSvsMVl3U1-pmiirCRvvBuXDwPH-Y"
      ALERTMANAGER_URL: "http://alertmanager:9093"
      GRAFANA_URL: "http://grafana:3000"
      LOKI_URL: "http://loki:3100"
      JAEGER_URL: "http://jaeger:16686"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      DATABASE_URL: "postgresql://rhinometric:${POSTGRES_PASSWORD:-rhinometric}@postgres:5432/rhinometric"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "rhinometric-console-backend"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      DISABLE_AUTH: "true"
    volumes:
      - ${HOME}/rhinometric_data_v2.2/console-backend/logs:/app/logs
    networks:
      - rhinometric_network_v22
    depends_on:
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
      rhinometric-ai-anomaly:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8105/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  rhinometric-console-frontend:
    build:
      context: ./rhinometric-console/frontend
      dockerfile: Dockerfile
    container_name: rhinometric-console-frontend
    ports:
      - "3002:3002"
    networks:
      - rhinometric_network_v22
    depends_on:
      rhinometric-console-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    restart: unless-stopped

  # ========================================
  # INFRASTRUCTURE
  # ========================================
  nginx:
    image: nginx:1.27-alpine
    container_name: rhinometric-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-core-v2.5.0.conf:/etc/nginx/nginx.conf:ro
      - ${HOME}/rhinometric_data_v2.2/nginx/logs:/var/log/nginx
    environment:
      NGINX_RHINOMETRIC_VERSION: Core-v2.5.0
    networks:
      - rhinometric_network_v22
    depends_on:
      grafana:
        condition: service_healthy
      rhinometric-console-frontend:
        condition: service_healthy
      license-server-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:80/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

  # ========================================
  # BACKUP SERVICE
  # ========================================
  rhinometric-backup:
    build:
      context: ./rhinometric-backup
      dockerfile: Dockerfile
    container_name: rhinometric-backup
    environment:
      BACKUP_SCHEDULE: "0 2 * * *"
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_COMPONENTS: prometheus,loki,jaeger,grafana
      RUN_IMMEDIATE: "false"
    volumes:
      - ${HOME}/rhinometric_data_v2.2:/data:ro
      - ${HOME}/rhinometric_backups:/backups
      - ./scripts/rmetricctl:/usr/local/bin/rmetricctl:ro
    networks:
      - rhinometric_network_v22
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    restart: unless-stopped

networks:
  rhinometric_network_v22:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

volumes:
  grafana-data:
  prometheus-data:
