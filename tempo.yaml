server:
  http_listen_port: 3200

distributor:
  receivers:                           # Configuración para recibir trazas
    jaeger:                            # Receptor Jaeger
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_binary:
          endpoint: 0.0.0.0:6832
        thrift_compact:
          endpoint: 0.0.0.0:6831
    zipkin:
      endpoint: 0.0.0.0:9411
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317
    opencensus:
      endpoint: 0.0.0.0:55678

ingester:
  max_block_duration: 5m               # Bloque máximo de duración
  
compactor:
  compaction:
    block_retention: 1h                # Retener bloques por 1 hora

storage:
  trace:
    backend: local                     # Usar almacenamiento local
    local:
      path: /tmp/tempo/traces
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 100                 # Aumentar workers para mejor rendimiento
      queue_depth: 10000