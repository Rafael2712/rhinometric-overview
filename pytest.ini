[pytest]
# RHINOMETRIC v2.3.0 - pytest configuration

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -ra
    --cov=.
    --cov-report=html:tests/results/coverage-html
    --cov-report=term-missing
    --cov-report=json:tests/results/coverage.json
    --html=tests/results/pytest-report.html
    --self-contained-html
    --junitxml=tests/results/junit.xml

# Coverage options
[coverage:run]
source = .
omit = 
    tests/*
    venv/*
    .venv/*
    */site-packages/*
    */dist-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = tests/results/coverage-html

# Markers
markers =
    crypto: Cryptography and RSA tests
    hwid: Hardware ID detection tests
    validator: License validator tests
    monitor: License monitor and alert tests
    installer: Installer script tests
    docker: Docker services tests
    slow: Tests that take significant time
    integration: Integration tests across components
    asyncio: Async tests using asyncio

# Timeout for tests (in seconds)
timeout = 300

# Minimum Python version
minversion = 3.8

# Console output
console_output_style = progress

# Log options
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/results/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
