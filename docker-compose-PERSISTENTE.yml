version: '3.8'

# 🔒 RHINOMETRIC SAAS - CONFIGURACIÓN PERSISTENTE COMPLETA
# ✅ Todos los datos se mantienen al reiniciar contenedores
# ✅ Dashboards se cargan automáticamente 
# ✅ Datasources se configuran automáticamente
# ✅ Métricas se mantienen por 30 días

services:
  # PostgreSQL - Base de datos principal PERSISTENTE
  rhinometric-postgres:
    image: postgres:15
    container_name: rhinometric-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rhinometric_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rhinometric2024
    ports:
      - "5432:5432"
    volumes:
      - rhinometric_postgres_data:/var/lib/postgresql/data
      - ./backend/setup-tables.sql:/docker-entrypoint-initdb.d/setup-tables.sql
    networks:
      - rhinometric-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache PERSISTENTE
  rhinometric-redis:
    image: redis:7-alpine
    container_name: rhinometric-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rhinometric_redis_data:/data
    networks:
      - rhinometric-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Grafana - Dashboards PERSISTENTES con auto-provisioning
  rhinometric-grafana:
    image: grafana/grafana:latest
    container_name: rhinometric-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=
      - GF_PROVISIONING_PATH=/etc/grafana/provisioning
    ports:
      - "3003:3000"
    volumes:
      - rhinometric_grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - rhinometric-network
    depends_on:
      - rhinometric-prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus - Métricas PERSISTENTES con scraping automático
  rhinometric-prometheus:
    image: prom/prometheus:latest
    container_name: rhinometric-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - rhinometric_prometheus_data:/prometheus
  rhinometric_loki_data:
    driver: local
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--log.level=info'
    networks:
      - rhinometric-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Loki - Logs PERSISTENTES
  rhinometric-loki:
    image: grafana/loki:latest
    container_name: rhinometric-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
  rhinometric_tempo_data:
    driver: local
    networks:
      - rhinometric-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Rhinometric - CON MÉTRICAS PERSISTENTES
  rhinometric-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rhinometric-api
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DB_HOST=rhinometric-postgres
      - DB_PORT=5432
      - DB_NAME=rhinometric_dev
      - DB_USER=postgres
      - DB_PASSWORD=rhinometric2024
      - REDIS_HOST=rhinometric-redis
      - REDIS_PORT=6379
      - API_VERSION=v1
    ports:
      - "3001:3001"
    depends_on:
      rhinometric-postgres:
        condition: service_healthy
      rhinometric-redis:
        condition: service_healthy
    networks:
      - rhinometric-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


  # 🔍 TEMPO - DISTRIBUTED TRACING ENTERPRISE
  rhinometric-tempo:
    image: grafana/tempo:2.3.0
    container_name: rhinometric-tempo
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200"     # Tempo HTTP
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14268:14268"   # Jaeger ingest
    volumes:
      - ./infrastructure/tempo/tempo.yml:/etc/tempo.yml:ro
      - rhinometric_tempo_data:/var/tempo
    networks:
      - rhinometric-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ✅ VOLÚMENES PERSISTENTES - SE MANTIENEN AL REINICIAR
volumes:
  rhinometric_postgres_data:
    driver: local
  rhinometric_redis_data:
    driver: local  
  rhinometric_grafana_data:
    driver: local
  rhinometric_prometheus_data:
  rhinometric_loki_data:
    driver: local
    driver: local
  rhinometric_tempo_data:
    driver: local

# ✅ RED INTERNA - COMUNICACIÓN ENTRE SERVICIOS
networks:
  rhinometric-network:
    driver: bridge
    name: rhinometric-network